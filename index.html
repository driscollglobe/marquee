    border-top:1px solid var(--line);padding-top:12px;margin-top:4px}
  .rd-total b{font-weight:600}

  /* ── factory brief (compact capacity line in lineup tab) ── */
  .factory-brief{font-family:var(--mono);font-size:11px;color:var(--dim);
    padding:0 0 12px;border-bottom:1px solid var(--line);margin-bottom:14px}

  /* ── chart ── */
  svg.chart{width:100%;height:150px;display:block}

  /* ── log ── */
  .log{font-family:var(--mono);font-size:12px;line-height:1.55}
  .log .e{padding:7px 0;border-bottom:1px solid var(--line);color:var(--dim)}
  .log .e:last-child{border-bottom:none}
  .log .e b{color:var(--hi);font-weight:600}
  .log .e .q{color:var(--dimmer);margin-right:8px}

  /* ── advance ── */
  .advance{position:sticky;bottom:14px;margin-top:6px;z-index:5}
  #advBtn{width:100%;font-family:var(--sans);font-weight:800;font-size:16px;
    letter-spacing:.08em;text-transform:uppercase;color:#10141C;background:var(--amber);
    border:none;border-radius:12px;padding:16px;cursor:pointer;
    box-shadow:0 6px 22px rgba(242,163,60,.28)}
  #advBtn:hover{filter:brightness(1.06)} #advBtn:active{transform:translateY(1px)}
  .gameover{text-align:center;padding:24px;border:1px solid var(--red);border-radius:12px;background:rgba(229,96,94,.08)}
  .gameover h3{margin:0 0 6px;color:var(--red);letter-spacing:.05em}
  .restart-btn{margin-top:14px;font-family:var(--mono);font-size:12px;background:transparent;
    color:var(--hi);border:1px solid var(--line);border-radius:8px;padding:9px 16px;cursor:pointer}
  .restart-btn:hover{border-color:var(--amber);color:var(--amber)}
  .hint{font-family:var(--mono);font-size:11px;color:var(--dimmer);margin-top:12px;line-height:1.65}

  /* ── goal banner ── */
  #goalBanner{font-family:var(--mono);font-size:11px;color:var(--dim);
    padding:0 0 14px;border-bottom:1px solid var(--line);margin-bottom:18px}
  #goalBanner b{font-weight:600}

  /* ── end screen ── */
  .endcard{border-radius:12px;padding:22px 24px;border:1px solid var(--line)}
  .endcard.win{border-color:var(--green);background:rgba(79,208,138,.06)}
  .endcard.bankrupt{border-color:var(--red);background:rgba(229,96,94,.06)}
  .endcard.timeout{border-color:var(--dimmer);background:rgba(92,99,110,.06)}
  .endcard h3{margin:0 0 4px;font-size:22px;font-weight:800;letter-spacing:.04em}
  .endcard .sub{font-family:var(--mono);font-size:11px;color:var(--dim);margin-bottom:16px}
  .score-val{font-family:var(--mono);font-size:36px;font-weight:600;color:var(--amber);
    line-height:1;margin-bottom:16px}
  .score-val small{font-size:13px;color:var(--dim);font-weight:400;margin-left:4px}
  .stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px 16px;
    margin-bottom:18px;font-family:var(--mono);font-size:11px}
  .stat-grid .sk{color:var(--dim);margin-bottom:2px}
  .stat-grid .sv{font-size:14px;font-weight:600;color:var(--hi)}
  .endstory{font-family:var(--sans);font-size:14px;font-style:italic;color:var(--hi);
    line-height:1.5;margin:4px 0 16px;padding-left:12px;border-left:2px solid var(--amber)}
  .enddecisive{font-family:var(--mono);font-size:11px;color:var(--dim);margin:-6px 0 16px}
  .enddecisive span{color:var(--amber);text-transform:uppercase;letter-spacing:.1em;font-size:9px;margin-right:6px}
  .end-actions{display:flex;gap:8px;flex-wrap:wrap}
  .end-actions button{font-family:var(--mono);font-size:12px;border-radius:8px;
    padding:10px 16px;cursor:pointer;border:1px solid var(--line);background:transparent;
    color:var(--hi);transition:.12s}
  .end-actions button:hover{border-color:var(--amber);color:var(--amber)}
  .end-actions .primary-end{background:var(--amber);color:#10141C;border-color:var(--amber);font-weight:700}
  .end-actions .primary-end:hover{filter:brightness(1.08);color:#10141C}

  /* ── world view — the single unified live surface ── */
  .world-view{position:relative;width:100%;height:clamp(340px,calc(100vh - 360px),560px);
    border-radius:12px;overflow:hidden;background:#0C0F15;border:1px solid var(--line);margin-bottom:14px}
  .world-view.world-armed{border-color:rgba(242,163,60,.65)!important;
    box-shadow:0 0 0 3px rgba(242,163,60,.18)}
  #worldCanvas{position:absolute;inset:0;width:100%;height:100%;display:block}
  .world-toolbar{position:absolute;bottom:0;left:0;right:0;
    background:rgba(21,23,28,.86);backdrop-filter:blur(6px);
    padding:9px 14px;border-top:1px solid var(--line);
    display:flex;gap:8px;align-items:center;flex-wrap:wrap;z-index:3}

  /* ── world inspector popup + hover tooltip (fixed overlays) ── */
  .world-inspector{position:fixed;background:rgba(26,29,36,.97);border:1px solid var(--line);
    border-radius:11px;padding:13px 14px;width:248px;
    font-family:var(--mono);font-size:11px;z-index:200;pointer-events:auto;
    box-shadow:0 6px 22px rgba(0,0,0,.5);overflow-y:auto;max-height:80vh}
  .world-tooltip{position:fixed;background:rgba(21,23,28,.93);border:1px solid var(--line);
    border-radius:6px;padding:5px 9px;font-family:var(--mono);font-size:10px;
    pointer-events:none;z-index:201;white-space:nowrap}

  /* ── campus builder UI (build toolbar + inspector) ── */
  .wbuild-btn{font-family:var(--mono);font-size:12px;font-weight:600;
    display:inline-flex;align-items:center;gap:6px;
    background:var(--amber);color:#10141C;border:none;border-radius:8px;padding:8px 12px;
    cursor:pointer;transition:.12s;white-space:nowrap}
  .wbuild-btn.on{background:transparent;color:var(--amber);border:1px solid var(--amber)}
  .wbuild-btn:hover{filter:brightness(1.05)}
  .wbuild-btn:disabled{opacity:.35;cursor:not-allowed}
  .wbuild-btn span{font-weight:400;font-size:11px}
  .wbuild-hint{font-family:var(--mono);font-size:10px;color:var(--dimmer);line-height:1.6;flex:1;min-width:160px}
  .wbuild-hint b{color:var(--hi)}
  .winsp-empty{font-family:var(--mono);font-size:11px;color:var(--dimmer);padding:6px 0}
  .winsp-name{font-weight:700;font-size:14px;margin-bottom:10px}
  .winsp-lvl{font-family:var(--mono);font-size:10px;color:var(--amber);margin-left:6px}
  .winsp-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px 12px;margin-bottom:12px}
  .winsp-grid>div{display:flex;flex-direction:column}
  .winsp-grid .wk{font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--dim)}
  .winsp-grid .wv{font-family:var(--mono);font-size:15px;font-weight:600;color:var(--hi);margin-top:2px}
  .winsp-actions{display:flex;gap:6px;flex-wrap:wrap}
  .winsp-note{font-family:var(--mono);font-size:9px;color:var(--dimmer);margin-top:9px;letter-spacing:.04em}

  /* ── dashboard tabs ── */
  .dashboard{margin-bottom:14px}
  .dash-tabs{display:flex;border-bottom:1px solid var(--line)}
  .dash-tab{font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;
    background:transparent;color:var(--dim);border:none;border-bottom:2px solid transparent;
    padding:9px 16px;cursor:pointer;transition:.12s;margin-bottom:-1px}
  .dash-tab:hover{color:var(--hi)}
  .dash-tab.active{color:var(--amber);border-bottom-color:var(--amber)}
  .dash-panel{background:var(--panel);border:1px solid var(--line);border-top:none;
    border-radius:0 0 12px 12px;padding:18px;max-height:520px;overflow-y:auto}

  /* ── launch screen ── */
  #launchOverlay,#studioOverlay{position:fixed;inset:0;z-index:100;background:rgba(10,12,18,.94);
    display:none;align-items:center;justify-content:center;padding:20px}
  .studio-actions{display:flex;flex-direction:column;gap:8px;margin-top:6px}
  .studio-actions .btn{align-self:flex-start}
  .btn.locked{opacity:.85;border-style:dashed;color:var(--dim)}
  .no-model.locked{border-left:2px solid var(--amber);padding-left:9px}
  .launch-card{background:var(--panel);border:1px solid var(--line);border-radius:16px;
    padding:28px 32px;max-width:560px;width:100%;max-height:90vh;overflow-y:auto}
  .launch-title{font-weight:800;font-size:20px;letter-spacing:.04em;margin-bottom:3px}
  .launch-sub{font-family:var(--mono);font-size:11px;color:var(--dim);
    letter-spacing:.14em;text-transform:uppercase;margin-bottom:22px}
  .lnch-sec{margin-bottom:18px}
  .lnch-sec-lbl{font-family:var(--mono);font-size:9px;letter-spacing:.2em;
    text-transform:uppercase;color:var(--dim);margin-bottom:8px}
  .lnch-opts{display:flex;gap:7px;flex-wrap:wrap}
  .lnch-btn{font-family:var(--mono);font-size:12px;background:var(--panel2);
    color:var(--dim);border:1px solid var(--line);border-radius:8px;
    padding:7px 14px;cursor:pointer;transition:.12s;text-align:left;line-height:1.3}
  .lnch-btn:hover{color:var(--hi);border-color:rgba(255,255,255,.2)}
  .lnch-btn.sel{background:rgba(242,163,60,.12);color:var(--amber);border-color:var(--amber)}
  .lnch-btn:disabled{opacity:.3;cursor:not-allowed}
  .eng-card{padding:9px 13px;min-width:92px}
  .eng-card .en{font-size:15px;font-weight:600;line-height:1;color:inherit;display:block;margin-bottom:3px}
  .eng-card .ec{font-size:9px;color:var(--dim);line-height:1.5;display:block}
  .lnch-btn.sel .ec{color:rgba(242,163,60,.7)}
  .lnch-price-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
  .lnch-price-v{font-family:var(--mono);font-size:22px;font-weight:600;color:var(--amber)}
  .lnch-price-k{font-family:var(--mono);font-size:10px;color:var(--dim);letter-spacing:.1em;text-transform:uppercase}
  .lnch-cost-note{font-family:var(--mono);font-size:10px;color:var(--dimmer);margin-top:6px}
  .lnch-launch-btn{width:100%;font-family:var(--sans);font-weight:800;font-size:15px;
    letter-spacing:.08em;text-transform:uppercase;color:#10141C;background:var(--amber);
    border:none;border-radius:10px;padding:14px;cursor:pointer;
    box-shadow:0 4px 18px rgba(242,163,60,.28);margin-top:6px}
  .lnch-launch-btn:hover{filter:brightness(1.06)}

  /* ── tutorial card ── */
  #tutCard{position:fixed;bottom:80px;right:18px;z-index:50;
    background:var(--panel);border:1px solid rgba(242,163,60,.4);border-radius:10px;
    padding:12px 14px;min-width:196px;font-family:var(--mono);font-size:10px;
    box-shadow:0 4px 16px rgba(0,0,0,.4);transition:opacity .35s}
  #tutCard.tut-fading{opacity:0;pointer-events:none}
  .tut-head{display:flex;justify-content:space-between;align-items:center;
    font-weight:600;letter-spacing:.1em;text-transform:uppercase;font-size:9px;
    color:var(--amber);margin-bottom:8px}
  .tut-dismiss{background:none;border:none;color:var(--dimmer);cursor:pointer;
    font-size:14px;padding:0;line-height:1}
  .tut-dismiss:hover{color:var(--hi)}
  .tut-item{display:flex;gap:7px;align-items:baseline;padding:2px 0;color:var(--dim)}
  .tut-item.tut-done{color:var(--green)}
  .tut-check{flex-shrink:0}
</style>
</head>
<body>

<header>
  <div class="brandmark">
    <div class="nm">Marque<span class="dot">.</span></div>
    <div class="sub">Auto Company Sim · 1990–2010</div>
  </div>
  <div class="clock" id="clock">Q1 · 1990</div>
  <div class="run-ctl">
    <button id="newRunBtn">↻ New Run</button>
    <button id="continueBtn">Continue Run</button>
  </div>
  <div class="cluster" id="cluster"></div>
</header>
<!-- unified world canvas — the primary build and watch surface -->
<div class="world-view" id="worldView">
  <canvas id="worldCanvas"></canvas>
  <div class="world-toolbar" id="worldMenu"></div>
</div>
<div id="goalBanner"></div>

<!-- dashboard tabs — secondary panels -->
<div class="dashboard">
  <div class="dash-tabs">
    <button class="dash-tab active" data-tab="lineup" onclick="setDashTab('lineup')">Lineup</button>
    <button class="dash-tab" data-tab="rd" onclick="setDashTab('rd')">R&amp;D</button>
    <button class="dash-tab" data-tab="market" onclick="setDashTab('market')">Market</button>
    <button class="dash-tab" data-tab="log" onclick="setDashTab('log')">Log</button>
  </div>
  <div class="dash-panel" id="dashLineup">
    <div class="factory-brief" id="factoryBrief"></div>
    <div id="segments"></div>
    <div class="hint">Design a car per segment: pick engine + trim, set price, advance each quarter. Engine matters: V8 wins Coupe buyers on performance; I4 wins Sedan on efficiency. Rivals react every quarter. Refresh to reset novelty before it fades.</div>
  </div>
  <div class="dash-panel" id="dashRD" style="display:none"><div id="rd"></div></div>
  <div class="dash-panel" id="dashMarket" style="display:none">
    <svg class="chart" id="chart" viewBox="0 0 320 150" preserveAspectRatio="none"></svg>
    <div class="leg" id="chartleg"></div>
  </div>
  <div class="dash-panel" id="dashLog" style="display:none">
    <div class="log" id="log"></div>
  </div>
</div>

<div class="advance">
  <button id="advBtn">Advance Quarter ▸</button>
</div>

<!-- launch screen overlay — shown on new game, hidden after first car is designed -->
<div id="launchOverlay"></div>
<!-- Design Studio overlay — the in-game car-design flow, opened from the studio building -->
<div id="studioOverlay"></div>
<!-- first-run tutorial checklist — dismissible, localStorage-persisted -->
<div id="tutCard" style="display:none"></div>
<!-- world inspector popup and tooltip — fixed-position, positioned by updateInspectorPopup() -->
<div class="world-inspector" id="worldInspector" style="display:none"></div>
<div class="world-tooltip" id="worldTooltip" style="display:none"></div>
<script>
/* ── global state ─────────────────────────────────────────────────────────── */
let st;
let pendingRD = { eng:50, eff:30, mfg:40 };
let pendingFactory = false;
let studioSel = null;   // { segId, engId, trimId } while a design is in progress in the Studio overlay
let launchSel = { segId:'sedan', engId:'I4', trimId:'mid' };
let launchObjId = 'share';
let _lastCash = 0, _lastShare = 0, _lastBrand = 0;
const SAVE_KEY = 'marque.save.v4';

const { newGame, advance, segShares, playerDesign, playerRefresh, playerRetire,
        quoteDesign, objectiveStatus, makeObjective, OBJECTIVES, endRecap,
        SEGS, ENGINES, TRIMS, C } = MarqueSim;

/* ── save / load (A7) ─────────────────────────────────────────────────────── */
function saveGame(){
  try {
    const campus = (typeof MarqueWorld!=='undefined') ? MarqueWorld.getCampus() : null;
    localStorage.setItem(SAVE_KEY, JSON.stringify({ st, campus, schemaVersion:4 }));
  } catch(e){}
  refreshRunButtons();
}
function hasSave(){ try { return !!localStorage.getItem(SAVE_KEY); } catch(e){ return false; } }
function loadGame(){
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if(!raw) return false;
    const data = JSON.parse(raw);
    if(!data || data.schemaVersion !== 4) return false;   // wrong schema → start fresh
    st = data.st;
    if(typeof MarqueWorld!=='undefined') MarqueWorld.loadCampus(data.campus || null);
    studioSel = null; pendingFactory = false;
    if(st.difficulty) launchDiff = st.difficulty;
    applyCampusToSim();
    _lastCash = st.companies.find(c=>c.player).cash;
    _lastShare = st.lastOverall*100;
    _lastBrand = st.companies.find(c=>c.player).brand*100;
    if(typeof MarqueWorld!=='undefined') MarqueWorld.setSimState(st);
    render();
    return true;
  } catch(e){ console.error('loadGame error', e); return false; }
}

/* ── campus ↔ sim bridge (PART B, the explicit input hook) ─────────────────── */
function applyCampusToSim(){
  if(typeof MarqueWorld==='undefined' || !st) return;
  const inputs = MarqueWorld.deriveCampusInputs(MarqueWorld.getCampus());
  st.companies.find(c=>c.player).factory.capacity = inputs.capacity;
}
// campus → design gating. The world reports studio presence/level; the shell reads
// it to decide whether in-game design/redesign is allowed (and how cheap refreshes are).
function studioInfo(){
  if(typeof MarqueWorld==='undefined') return { present:false, level:0 };
  return MarqueWorld.deriveCampusInputs(MarqueWorld.getCampus()).designStudio;
}
function hasStudio(){ return studioInfo().present; }
function studioLevel(){ return studioInfo().level; }
function initCampus(){
  MarqueWorld.init(document.getElementById('worldCanvas'), {
    menuEl: document.getElementById('worldMenu'),
    inspectorEl: document.getElementById('worldInspector'),
    getCash: () => st ? st.companies.find(c=>c.player).cash : 0,
    onSpend: (amt) => { if(st) st.companies.find(c=>c.player).cash -= amt; },
    onChange: () => { applyCampusToSim(); render(); saveGame(); },
    onArmChange: (armed) => document.getElementById('worldView').classList.toggle('world-armed', armed),
    onStudioOpen: () => openStudio(studioSel ? studioSel.segId : null),
    getStudioStatus: () => studioSel ? ('Designing ' + (SEGS.find(s=>s.id===studioSel.segId)?.name||'')) : 'Idle',
    getActiveModels: () => {
      if(!st) return [];
      const player = st.companies.find(c=>c.player);
      return player.models.filter(m=>m.active).map(m=>{
        const s = SEGS.find(sg=>sg.id===m.segId)||{name:m.segId,refPrice:25};
        return { segId:m.segId, name:s.name, price:m.price,
                 floor:+(m.cost*1.02).toFixed(1), ceil:+(s.refPrice*1.65).toFixed(1),
                 nov:Math.round(m.novelty*100) };
      });
    },
    onHoverTip: (html, cx, cy) => {
      const tt = document.getElementById('worldTooltip');
      if(!html){ tt.style.display='none'; return; }
      const rect = document.getElementById('worldCanvas').getBoundingClientRect();
      tt.innerHTML = html; tt.style.display='block';
      tt.style.left = (rect.left+cx+14)+'px';
      tt.style.top  = (rect.top+cy-28)+'px';
    },
    onInspectorUpdated: (selId) => updateInspectorPopup(selId),
  });
}
// arm the Design Studio build tool and bring the campus into view (the one-click
// path offered by the locked state in segment cards)
function armStudioBuild(){
  if(typeof MarqueWorld!=='undefined') MarqueWorld.toggleBuild('studio');
  const wv = document.getElementById('worldView');
  if(wv) wv.scrollIntoView({ behavior:'smooth', block:'center' });
}
function refreshRunButtons(){
  const cont = document.getElementById('continueBtn');
  if(cont) cont.disabled = !hasSave();
}

/* ── dashboard tab switching ────────────────────────────────────────────── */
function setDashTab(tab){
  document.querySelectorAll('.dash-tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));
  ['dashLineup','dashRD','dashMarket','dashLog'].forEach(id=>{
    const el=document.getElementById(id); if(el) el.style.display='none';
  });
  const map={lineup:'dashLineup',rd:'dashRD',market:'dashMarket',log:'dashLog'};
  const target=document.getElementById(map[tab]||'dashLineup');
  if(target) target.style.display='block';
}

/* ── world inspector popup positioning ──────────────────────────────────── */
function updateInspectorPopup(selId){
  const popup = document.getElementById('worldInspector');
  if(!selId){ popup.style.display='none'; return; }
  if(typeof MarqueWorld==='undefined'){ popup.style.display='none'; return; }
  const pos = MarqueWorld.getSelectedBuildingScreenPos();
  if(!pos){ popup.style.display='none'; return; }
  const rect = document.getElementById('worldCanvas').getBoundingClientRect();
  popup.style.display='block';
  const pageX=rect.left+pos.x, pageY=rect.top+pos.y;
  const popW=260;
  let left=pageX+14;
  if(left+popW>window.innerWidth-8) left=pageX-popW-14;
  popup.style.left=Math.max(4,left)+'px';
  popup.style.top=Math.max(4,Math.min(pageY-24,window.innerHeight-240))+'px';
}

/* ── model price update from world inspector ────────────────────────────── */
function worldSetModelPrice(segId, price){
  if(!st) return;
  const m=st.companies.find(c=>c.player).models.find(m=>m.segId===segId&&m.active);
  if(m){ m.price=price; saveGame(); }
}

/* ── formatting ─────────────────────────────────────────────────────────── */
function fmtM(v){
  const a=Math.abs(v);
  return a>=1000 ? (v/1000).toFixed(2).replace(/\.?0+$/,'')+'B' : Math.round(v)+'M';
}
function deltaHtml(now, prev, money){
  const d=now-prev; if(Math.abs(d)<0.01) return `<span class="dim">—</span>`;
  const cls=d>0?'up':'down', ar=d>0?'▲':'▼';
  const txt=money?'$'+fmtM(Math.abs(d)):Math.abs(d).toFixed(1);
  return `<span class="${cls}">${ar} ${txt}</span>`;
}
function carSVG(hex){
  return `<svg viewBox="0 0 40 20" fill="${hex}"><path d="M2 14 Q3 9 9 8 L13 4 Q15 2 20 2 L27 2 Q31 2 33 6 L37 8 Q39 9 38 13 L38 15 Q38 16 36 16 L4 16 Q2 16 2 14 Z"/><circle cx="11" cy="16" r="3" fill="#15171C"/><circle cx="30" cy="16" r="3" fill="#15171C"/></svg>`;
}
function engHP(e){ return Math.round(120 + e.perf * 400); }
function engFuel(e){
  if(e.name==='EV') return '~110 MPGe';
  return Math.round(17 + e.eff * 22) + ' mpg';
}

/* ── launch screen ─────────────────────────────────────────────────────── */
function renderLaunchScreen(){
  const ov = document.getElementById('launchOverlay');
  ov.style.display = 'flex';

  const s = SEGS.find(sg => sg.id === launchSel.segId);
  const validEngs = Object.entries(ENGINES)
    .filter(([id,e]) => e.fits.includes(launchSel.segId) && C.startYear >= e.unlock);

  // ensure selected engine is valid for current bodystyle
  if(!validEngs.find(([id]) => id === launchSel.engId)) {
    launchSel.engId = validEngs[0][0];
  }

  const eng  = ENGINES[launchSel.engId];
  const trim = TRIMS[launchSel.trimId];
  const estCost   = +(s.baseCost + eng.costAdd + trim.costAdd).toFixed(1);

  const floorPr   = +(estCost * 1.02).toFixed(1);
  const ceilPr    = +(s.refPrice * 1.65).toFixed(1);
  const designCost = quoteDesign(st, launchSel.segId, launchSel.engId, launchSel.trimId).designCost;

  ov.innerHTML = `<div class="launch-card">

    <div class="launch-sub">Pick a difficulty &amp; goal, then design your first car</div>

    <div class="lnch-sec">

          <span class="en" style="font-size:13px">${d.label}</span>

    <div class="lnch-sec">

      <div class="lnch-opts">
        ${Object.values(OBJECTIVES).map(o=>`<button class="lnch-btn eng-card${launchObjId===o.id?' sel':''}"
          style="flex:1 1 46%;min-width:200px"

        </button>`).join('')}

    </div>

    <div class="lnch-sec">
      <div class="lnch-sec-lbl">Bodystyle (your founding segment — no tooling fee)</div>
      <div class="lnch-opts">

          onclick="setLaunchSel('${sg.id}',null,null)">${sg.name}</button>`).join('')}

        ${validEngs.map(([id,e])=>`<button class="lnch-btn eng-card${launchSel.engId===id?' sel':''}"
          onclick="setLaunchSel(null,'${id}',null)">

    <div class="lnch-sec">
      <div class="lnch-sec-lbl">Trim</div>
      <div class="lnch-opts">
        ${Object.entries(TRIMS).map(([id,t])=>`<button class="lnch-btn${launchSel.trimId===id?' sel':''}"

    <div class="lnch-sec">
      <div class="lnch-sec-lbl">Launch price</div>
      <div class="lnch-price-row">
        <span class="lnch-price-k">Your price</span>
        <span class="lnch-price-v" id="lnchPv">$${defPrice.toFixed(1)}k</span>
      </div>
      <input type="range" id="lnchPr" min="${floorPr}" max="${ceilPr}" step="0.1" value="${defPrice}"
        oninput="document.getElementById('lnchPv').textContent='$'+parseFloat(this.value).toFixed(1)+'k'">
      <div class="lnch-cost-note">Unit cost $${estCost}k · Design cost $${designCost}M of your $${Math.round(st.companies[0].cash)}M cash</div>

function setLaunchSel(segId, engId, trimId){
  if(segId !== null){
    launchSel.segId = segId;
    // reset engine to first valid for new bodystyle if current doesn't fit
    const valid = Object.keys(ENGINES).filter(id => ENGINES[id].fits.includes(segId) && C.startYear >= ENGINES[id].unlock);
    if(!valid.includes(launchSel.engId)) launchSel.engId = valid[0] || 'I4';
  }
  if(engId  !== null) launchSel.engId  = engId;
  if(trimId !== null) launchSel.trimId = trimId;
  renderLaunchScreen();
}

function setLaunchObj(id){
  launchObjId = id;
  st.objective = makeObjective(id);
  applyDifficulty(st, launchDiff);   // re-apply: objective change resets targetShare
  renderLaunchScreen();
}

function confirmLaunch(){
  const pr = document.getElementById('lnchPr');
  const price = pr ? parseFloat(pr.value) : null;
  st.objective = makeObjective(launchObjId);
  const result = playerDesign(st, launchSel.segId, launchSel.engId, launchSel.trimId, price);
  if(!result.ok){
    // shouldn't happen at launch (player always has enough cash) but guard
    alert(result.reason); return;
  }
  st.launchFlow = false;
  document.getElementById('launchOverlay').style.display = 'none';
  if(typeof MarqueWorld!=='undefined') MarqueWorld.setSimState(st);
  render();
  saveGame();
}

/* ── render ─────────────────────────────────────────────────────────────── */
function render(){
  updateTutorial();
  if(st.launchFlow){ renderLaunchScreen(); return; }

  const player = st.companies.find(c=>c.player);
  document.getElementById('clock').innerHTML = `Q<b>${st.quarter}</b> · ${st.year}`;
  document.title = `MARQUE · Q${st.quarter} ${st.year}`;

  const ov = st.lastOverall*100;
  const showDelta = st.tick > 0;
  const dash = '<span class="dim">—</span>';
  document.getElementById('cluster').innerHTML = `
    <div class="gauge"><div class="lbl">Cash</div>
      <div class="val">$${fmtM(player.cash)}</div>
      <div class="delta">${showDelta ? deltaHtml(player.cash,_lastCash,true) : dash}</div></div>
    <div class="gauge"><div class="lbl">Market Share</div>
      <div class="val">${ov.toFixed(1)}<small style="font-size:13px;color:var(--dim)">%</small></div>
      <div class="delta">${showDelta ? deltaHtml(ov,_lastShare,false) : dash}</div></div>
    <div class="gauge"><div class="lbl">Brand</div>
      <div class="val">${Math.round(player.brand*100)}</div>
      <div class="delta">${showDelta ? deltaHtml(player.brand*100,_lastBrand,false) : dash}</div></div>
    <div class="gauge"><div class="lbl">Last Q Profit</div>
      <div class="val ${st.lastProfit>=0?'up':'down'}">${st.lastProfit>=0?'+':'-'}$${fmtM(Math.abs(st.lastProfit))}</div>
      <div class="delta" style="color:var(--dimmer);font-size:10px;font-family:var(--mono)">net of R&amp;D + overhead</div></div>`;
  _lastCash=player.cash; _lastShare=ov; _lastBrand=player.brand*100;

  renderGoalBanner();

  const advWrap = document.querySelector('.advance');

  }
  if(typeof MarqueWorld!=='undefined') MarqueWorld.renderPanels();

/* ── segment cards ─────────────────────────────────────────────────────── */
function renderSegments(){
  const player = st.companies.find(c=>c.player);
  const wrap = document.getElementById('segments');
  wrap.innerHTML = '';

  SEGS.forEach(s => {
    const pm = player.models.find(m=>m.segId===s.id&&m.active);
    const shares = segShares(s.id, st);
    const studioHere = hasStudio();

    const div = document.createElement('div');
    div.className = 'seg';
    let html = `<div class="seg-head">
      <div class="seg-name">${s.name}</div>
      <div class="seg-meta">${s.demand}k units/q · ref $${s.refPrice}k</div>
    </div>`;

    /* current model block */
    if(pm){
      const sh = shares['you'];
      const shPct = sh ? Math.round(sh.share*100) : 0;
      const margin = (pm.price - pm.cost).toFixed(1);
      const nov = Math.round(pm.novelty*100);
      const novColor = nov>60?'var(--green)':nov>35?'var(--amber)':'var(--red)';
      const floorPrice = +(pm.cost*1.02).toFixed(1);
      const ceilPrice  = +(s.refPrice*1.65).toFixed(1);
      const isHalo = pm.segId==='coupe' && (pm.engId==='V8'||pm.engId==='V12');
      html += `<div class="model-row">
        <div class="model-badge">
          <div class="eng">${ENGINES[pm.engId].name}</div>
          <div class="trm">${TRIMS[pm.trimId].name} · $${pm.cost}k/unit</div>
          <div class="nov-bar"><i style="width:${nov}%;background:${novColor}"></i></div>
          <div class="nov-lbl">Novelty ${nov}%</div>
          ${pm.recallQ>0?`<span class="recall-badge">⚠ Recall (${pm.recallQ}q)</span>`:''}
          ${isHalo?`<div class="halo-badge">★ Halo · +brand/q</div>`:''}
        </div>
        <div class="price-ctl">
          <div class="price-row"><span class="k">Your price</span>
            <span class="v" id="pv-${s.id}">$${pm.price.toFixed(1)}k</span></div>
          <input type="range" id="pr-${s.id}"
            min="${floorPrice}" max="${ceilPrice}" step="0.1" value="${pm.price}">
          <div class="share-proj" id="sp-${s.id}">
            Proj. share <b>${shPct}%</b> · margin $${margin}k/car
          </div>
        </div>
      </div>`;

      /* car icons row */
      const myE = shares['you'];
      const units = myE ? Math.round(s.demand * myE.share) : 0;
      const nCars = Math.min(Math.round(units/8), 16);
      let carsHtml = '';
      for(let i=0;i<nCars;i++) carsHtml += carSVG('#F2A33C');
      html += `<div class="cars" id="cars-${s.id}">${carsHtml}<span class="units">${units>0?units+'k units':''}</span></div>`;

      const refreshCost = refreshCostFor(s);
      const redesignBtn = studioHere
        ? `<button class="btn" onclick="openStudio('${s.id}')">Redesign in Studio ▸</button>`
        : `<button class="btn locked" onclick="armStudioBuild()" title="Build a Design Studio to redesign">🔒 Build a Studio to redesign</button>`;
      html += `<div class="seg-actions">
        ${redesignBtn}
        <button class="btn" onclick="doRefresh('${s.id}')" ${player.cash<refreshCost?'disabled':''}>
          Refresh $${refreshCost}M</button>
        <button class="btn danger" onclick="doRetire('${s.id}')">Retire</button>
      </div>`;
    } else {
      const isNewSeg = !(player.launchedSegs && player.launchedSegs[s.id]);
      const toolNote = isNewSeg
        ? `<span style="color:var(--red)">Entering ${s.name} needs <b>$${C.segmentLaunchCost}M</b> in plant tooling, on top of the design.</span>`
        : `You've tooled ${s.name} before — re-entry is just the design cost.`;
      if(studioHere){
        html += `<div class="no-model">No model in this segment. ${toolNote}</div>`;
        html += `<div class="seg-actions">
          <button class="btn primary" onclick="openStudio('${s.id}')">Develop in Studio ▸</button>
        </div>`;
      } else {
        html += `<div class="no-model locked">No model yet. <b>Build a Design Studio</b> to develop new models. ${toolNote}</div>`;
        html += `<div class="seg-actions">
          <button class="btn primary" onclick="armStudioBuild()">+ Build a Design Studio</button>
        </div>`;
      }
    }

    /* competitor share bar */
    const ordered = [...st.companies].sort((a,b)=>a.player?-1:b.player?1:0);
    html += `<div class="sharebar" id="sharebar-${s.id}">
      ${ordered.map(co=>{
        const e=shares[co.id]; const pct=e?(e.share*100).toFixed(1):'0';
        return `<span style="width:${pct}%;background:${co.hex}" title="${co.name} ${pct}%"></span>`;
      }).join('')}
    </div>
    <div class="leg" id="leg-${s.id}">
      ${ordered.map(co=>{
        const e=shares[co.id]; const pct=e?Math.round(e.share*100):0;
        const m=co.models.find(m=>m.segId===s.id&&m.active);
        return `<span class="it"><span class="sw" style="background:${co.hex}"></span>${co.name} ${pct}%${m&&!co.player?' ('+ENGINES[m.engId].name+')':''}</span>`;
      }).join('')}
    </div>`;

    div.innerHTML = html;
    wrap.appendChild(div);

    /* bind price slider — syncs projection text, sharebar, legend, car icons */
    const slider = div.querySelector(`#pr-${s.id}`);
    if(slider){
      slider.addEventListener('change', saveGame);
      slider.addEventListener('input', e => {
        if(!pm) return;
        pm.price = parseFloat(e.target.value);
        document.getElementById(`pv-${s.id}`).textContent = `$${pm.price.toFixed(1)}k`;

        // update share projection text for all segments (price in one seg doesn't affect others,
        // but this keeps deltas consistent if player has multiple sliders open)
        SEGS.forEach(ss => {
          const el = document.getElementById(`sp-${ss.id}`); if(!el) return;
          const sh2 = segShares(ss.id, st)['you'];
          const mm  = player.models.find(m=>m.segId===ss.id&&m.active);
          if(!mm) return;
          el.innerHTML = `Proj. share <b>${sh2?Math.round(sh2.share*100):0}%</b> · margin $${(mm.price-mm.cost).toFixed(1)}k/car`;
        });

        // sync this segment's sharebar, legend, and car icons in lockstep
        const sharesNow = segShares(s.id, st);
        const ord2 = [...st.companies].sort((a,b)=>a.player?-1:b.player?1:0);

        const sbEl = document.getElementById(`sharebar-${s.id}`);
        if(sbEl) sbEl.innerHTML = ord2.map(co=>{
          const en=sharesNow[co.id]; const pct=en?(en.share*100).toFixed(1):'0';
          return `<span style="width:${pct}%;background:${co.hex}" title="${co.name} ${pct}%"></span>`;
        }).join('');

        const legEl = document.getElementById(`leg-${s.id}`);
        if(legEl) legEl.innerHTML = ord2.map(co=>{
          const en=sharesNow[co.id]; const pct=en?Math.round(en.share*100):0;
          const m2=co.models.find(m=>m.segId===s.id&&m.active);
          return `<span class="it"><span class="sw" style="background:${co.hex}"></span>${co.name} ${pct}%${m2&&!co.player?' ('+ENGINES[m2.engId].name+')':''}</span>`;
        }).join('');

        const carsEl = document.getElementById(`cars-${s.id}`);
        if(carsEl){
          const myE = sharesNow['you'];
          const u = myE ? Math.round(s.demand * myE.share) : 0;
          const nc = Math.min(Math.round(u/8), 16);
          let ch = '';
          for(let i=0;i<nc;i++) ch += carSVG('#F2A33C');
          carsEl.innerHTML = ch + `<span class="units">${u>0?u+'k units':''}</span>`;
        }
      });
    }
  });
}

/* ── R&D ──────────────────────────────────────────────────────────────── */
function rdLabBonuses(){
  if(typeof MarqueWorld==='undefined') return { eng:0, eff:0, mfg:0 };
  const b = MarqueWorld.deriveCampusInputs(MarqueWorld.getCampus()).rdBonuses;
  return { eng:b.eng||0, eff:b.eff||0, mfg:b.mfg||0 };
}
function renderRD(){
  const player = st.companies.find(c=>c.player);
  const labBonuses = rdLabBonuses();
  const branches = [
    { k:'eng', name:'Powertrain',
      sub:'performance + quality · reduces recall risk',
      pct: () => (1-Math.exp(-player.rd.eng/C.rdEffort)),
      effect: () => {
        const prog = 1-Math.exp(-player.rd.eng/C.rdEffort);
        const q = Math.round((0.50 + C.qualityCap*prog)*100);
        return `Quality ${q}% · recall risk ↓ with quality`;
      }
    },
    { k:'eff', name:'Reliability',
      sub:'fuel economy and range across all models',
      pct: () => (1-Math.exp(-player.rd.eff/C.rdEffort)),
      effect: () => {
        const prog = 1-Math.exp(-player.rd.eff/C.rdEffort);
        const bonus = Math.round(C.effBonusCap*prog*100);
        return `Efficiency bonus +${bonus}%`;
      }
    },
    { k:'mfg', name:'Manufacturing',
      sub:'lowers unit production cost per car',
      pct: () => (1-Math.exp(-player.rd.mfg/C.rdEffort)),
      effect: () => {
        const prog = 1-Math.exp(-player.rd.mfg/C.rdEffort);
        const cut = Math.round(C.mfgCostCut*prog*100);
        return `Cost reduction ${cut}%`;
      }
    },
  ];
  const wrap = document.getElementById('rd'); wrap.innerHTML = '';
  branches.forEach(b => {
    const div = document.createElement('div'); div.className = 'rd';
    const pct = Math.round(b.pct()*100);
    const branchBonus = labBonuses[b.k] || 0;
    const labLine = branchBonus>0
      ? `<div class="rd-effect" style="color:var(--green)">+$${branchBonus}M/q from R&D Lab</div>` : '';
    div.innerHTML = `
      <div class="row">
        <span class="k">${b.name}<small>${b.sub}</small></span>
        <span class="v" id="rdv-${b.k}">$${pendingRD[b.k]}M</span>
      </div>
      <input type="range" id="rds-${b.k}" min="0" max="130" step="5" value="${pendingRD[b.k]}">
      <div class="statbar"><i style="width:${pct}%"></i></div>
      <div class="rd-effect">${b.effect()}</div>${labLine}`;
    wrap.appendChild(div);
    div.querySelector(`#rds-${b.k}`).addEventListener('input', e => {
      pendingRD[b.k] = parseInt(e.target.value);
      document.getElementById(`rdv-${b.k}`).textContent = `$${pendingRD[b.k]}M`;
      const el = document.getElementById('rdtot');
      if(el){
        const manual = pendingRD.eng+pendingRD.eff+pendingRD.mfg;
        const totalLab = labBonuses.eng+labBonuses.eff+labBonuses.mfg;
        el.textContent = `$${manual+totalLab}M`;
      }
    });
  });
  const tot = document.createElement('div'); tot.className = 'rd-total';
  const rdManual = pendingRD.eng+pendingRD.eff+pendingRD.mfg;
  const totalLabBonus = labBonuses.eng+labBonuses.eff+labBonuses.mfg;
  const rdGrandTotal = rdManual + totalLabBonus;
  tot.innerHTML = `<span class="dim">Total this quarter</span>`
    + `<b id="rdtot">$${rdGrandTotal}M</b>`
    + (totalLabBonus>0 ? `<span class="dim" style="font-size:10px;margin-left:8px">($${rdManual}M manual + $${totalLabBonus}M lab)</span>` : '');
  wrap.appendChild(tot);
}

/* ── factory brief — compact summary at top of Lineup tab ─────────────── */
function renderFactory(){
  const el = document.getElementById('factoryBrief');
  if(!el || !st) return;
  const player = st.companies.find(c=>c.player);
  const cap = player.factory.capacity;
  const projDemand = SEGS.reduce((sum,s)=>{
    const sh = segShares(s.id,st)['you']; return sum+(sh?sh.units:0);
  },0);
  const bottleneck = projDemand > cap*0.92;
  const activeCount = player.models.filter(m=>m.active).length;
  const overhead = Math.round(C.overheadBase + C.overheadPerModel*activeCount + Math.round(C.capacityCarry*cap));
  el.innerHTML = `Factory: <b>${cap}k</b>/q · Proj: <b style="color:${bottleneck?'var(--red)':'var(--hi)'}">${Math.round(projDemand)}k</b>`
    + ` · Overhead: <b>$${overhead}M</b>/q`
    + (bottleneck?` &nbsp;<span style="color:var(--red)">⚠ capacity throttling sales</span>`:'')
    + ` &nbsp;<span style="color:var(--dimmer)">— build/upgrade Assembly Plants to expand</span>`;
}

/* ── chart ────────────────────────────────────────────────────────────── */
function renderChart(){
  const svg = document.getElementById('chart');
  const W=320,H=150,pad=4,n=st.history.length;
  if(n<1){svg.innerHTML='';return;}
  let out='';
  [.25,.5,.75].forEach(g=>{
    const y=(pad+(1-g)*(H-2*pad)).toFixed(1);
    out+=`<line x1="0" y1="${y}" x2="${W}" y2="${y}" stroke="var(--line)" stroke-width="0.7"/>`;
  });
  st.companies.forEach(c=>{
    const pts = st.history.map((p,i)=>{
      const x = n===1?W/2:pad+(i/(n-1))*(W-2*pad);
      const y = pad+(1-(p[c.id]||0))*(H-2*pad);
      return `${x.toFixed(1)},${y.toFixed(1)}`;
    }).join(' ');
    out+=`<polyline points="${pts}" fill="none" stroke="${c.hex}"
      stroke-width="${c.player?2.4:1.4}" stroke-linejoin="round" stroke-linecap="round"
      opacity="${c.player?1:.8}"/>`;
    const last=st.history[n-1];
    const lx=(n===1?W/2:W-pad).toFixed(1);
    const ly=(pad+(1-(last[c.id]||0))*(H-2*pad)).toFixed(1);
    out+=`<circle cx="${lx}" cy="${ly}" r="${c.player?3:2}" fill="${c.hex}"/>`;
  });
  svg.innerHTML=out;
  document.getElementById('chartleg').innerHTML=st.companies.map(c=>
    `<span class="it"><span class="sw" style="background:${c.hex}"></span>${c.name} ${Math.round((c.lastShareOverall||0)*100)}%</span>`
  ).join('');
}

/* ── log ─────────────────────────────────────────────────────────────── */
function renderLog(){
  document.getElementById('log').innerHTML = st.log.map(e=>
    `<div class="e"><span class="q">${e.label}</span>${e.html}</div>`
  ).join('');
}

/* ── Design Studio overlay — the home of in-game design/redesign ─────────── */
// Gated on a built Design Studio. The founding launch uses its own overlay and is
// never gated; everything after it routes through here, opened from the studio
// building (click or inspector) or from the segment-card pointers.
function defaultDesignFor(segId){
  const player = st.companies.find(c=>c.player);
  const pm = player.models.find(m=>m.segId===segId&&m.active);
  const validEngs = Object.keys(ENGINES).filter(id=>ENGINES[id].fits.includes(segId)&&st.year>=ENGINES[id].unlock);
  return { segId,
           engId:  pm ? pm.engId  : validEngs[Math.floor(validEngs.length/2)],
           trimId: pm ? pm.trimId : 'mid' };
}
function openStudio(segId){
  if(!hasStudio()){ armStudioBuild(); return; }   // safety: no studio → route to building one
  studioSel = segId ? defaultDesignFor(segId) : null;
  if(typeof MarqueWorld!=='undefined') MarqueWorld.renderPanels();   // refresh inspector status
  renderStudioOverlay();
}
function studioPickSeg(segId){ studioSel = defaultDesignFor(segId); renderStudioOverlay(); }
function studioSetDesign(engId, trimId){
  if(!studioSel) return;
  studioSel.engId = engId; studioSel.trimId = trimId;
  renderStudioOverlay();
}
function studioBackToSegs(){ studioSel = null; renderStudioOverlay(); }
function closeStudio(){
  studioSel = null;
  document.getElementById('studioOverlay').style.display = 'none';
  if(typeof MarqueWorld!=='undefined') MarqueWorld.renderPanels();
  render();
}
function studioConfirm(){
  if(!studioSel) return;
  const result = playerDesign(st, studioSel.segId, studioSel.engId, studioSel.trimId);
  if(!result.ok){ alert(result.reason); return; }
  studioSel = null;
  document.getElementById('studioOverlay').style.display = 'none';
  if(typeof MarqueWorld!=='undefined') MarqueWorld.renderPanels();
  render();
  saveGame();
}

function renderStudioOverlay(){
  const ov = document.getElementById('studioOverlay');
  ov.style.display = 'flex';
  const player = st.companies.find(c=>c.player);
  const lvl = studioLevel();
  const perk = lvl>=2
    ? `<span style="color:var(--green)">Level 2 · refreshes 30% cheaper + restore to 94% novelty</span>`
    : `<span class="dim">Level 1 · upgrade the Studio for 30% off refreshes + stronger novelty restore</span>`;

  // segment chooser — always shown; the picked segment expands the engine/trim/price form
  const segCards = SEGS.map(sg=>{
    const m = player.models.find(mm=>mm.segId===sg.id&&mm.active);
    const sub = m ? `${ENGINES[m.engId].name} · ${TRIMS[m.trimId].name} · redesign`
                  : (!(player.launchedSegs&&player.launchedSegs[sg.id]) ? `empty · +$${C.segmentLaunchCost}M tooling` : `empty · re-entry`);
    const sel = studioSel && studioSel.segId===sg.id;
    return `<button class="lnch-btn eng-card${sel?' sel':''}" style="flex:1 1 46%;min-width:190px"
      onclick="studioPickSeg('${sg.id}')">
      <span class="en" style="font-size:13px">${sg.name}${m?'':' <span style="color:var(--amber)">·new</span>'}</span>
      <span class="ec">${sub}</span>
    </button>`;
  }).join('');

  let form = '';
  if(studioSel){
    const s = SEGS.find(sg=>sg.id===studioSel.segId);
    const eng = ENGINES[studioSel.engId];
    const validEngs = Object.entries(ENGINES).filter(([id,e])=>e.fits.includes(s.id)&&st.year>=e.unlock);
    if(!validEngs.find(([id])=>id===studioSel.engId)) studioSel.engId = validEngs[0][0];
    const q         = quoteDesign(st, s.id, studioSel.engId, studioSel.trimId);
    const estCost   = (s.baseCost + ENGINES[studioSel.engId].costAdd + TRIMS[studioSel.trimId].costAdd).toFixed(1);
    const estPrice  = (s.refPrice + ENGINES[studioSel.engId].costAdd*0.55 + TRIMS[studioSel.trimId].priceAdd).toFixed(1);
    const canAfford = player.cash >= q.total;
    const toolingLine = q.launchCost>0
      ? ` &middot; <b style="color:var(--red)">+$${q.launchCost}M tooling</b> to enter ${s.name}` : '';
    form = `
      <div class="lnch-sec">
        <div class="lnch-sec-lbl">Engine</div>
        <div class="lnch-opts">
          ${validEngs.map(([id,e])=>`<button class="lnch-btn eng-card${studioSel.engId===id?' sel':''}"
            onclick="studioSetDesign('${id}','${studioSel.trimId}')">
            <span class="en">${e.name}</span>
            <span class="ec">~${engHP(e)} hp · ${engFuel(e)}${e.costAdd>0?' · +$'+e.costAdd+'k/unit':''}</span>
          </button>`).join('')}
        </div>
      </div>
      <div class="lnch-sec">
        <div class="lnch-sec-lbl">Trim</div>
        <div class="lnch-opts">
          ${Object.entries(TRIMS).map(([id,t])=>`<button class="lnch-btn${studioSel.trimId===id?' sel':''}"
            onclick="studioSetDesign('${studioSel.engId}','${id}')">${t.name}${t.featAdd>0?' · +features':''}</button>`).join('')}
        </div>
      </div>
      <div class="lnch-cost-note">
        Design cost <b>$${q.designCost}M</b>${toolingLine} · unit cost $${estCost}k · est. price ~$${estPrice}k
        &nbsp;·&nbsp; of your $${Math.round(player.cash)}M cash
      </div>
      <div class="studio-actions">
        <button class="lnch-launch-btn" onclick="studioConfirm()" ${canAfford?'':'disabled'}>
          ${player.models.find(m=>m.segId===s.id&&m.active)?'Redesign':'Develop'} ${s.name} · $${q.total}M ▸</button>
        <button class="btn" onclick="studioBackToSegs()">← Choose another model</button>
      </div>`;
  }

  ov.innerHTML = `<div class="launch-card">
    <div class="launch-title">Design Studio</div>
    <div class="launch-sub">${perk}</div>
    <div class="lnch-sec">
      <div class="lnch-sec-lbl">Which model?</div>
      <div class="lnch-opts">${segCards}</div>
    </div>
    ${form}
    <div style="text-align:right;margin-top:10px">
      <button class="btn" onclick="closeStudio()">Close</button>
    </div>
  </div>`;
}

/* ── refresh cost (with Design Studio L2 discount) ──────────────────────── */
function refreshCostFor(s){
  const base = Math.round(C.refreshBase * s.refPrice/22);
  return studioLevel()>=2 ? Math.round(base*0.70) : base;
}
function doRefresh(segId){
  const s = SEGS.find(x=>x.id===segId);
  const result = playerRefresh(st, segId);   // sim deducts the full base cost
  if(!result.ok){ alert(result.reason); return; }
  if(studioLevel()>=2){
    // L2 perk 1: refund the 30% cost discount shell-side (sim stays untouched)
    const credit = result.cost - refreshCostFor(s);
    if(credit>0) st.companies.find(c=>c.player).cash += credit;
    // L2 perk 2: restore novelty to 94% instead of sim's default 86%
    const m = st.companies.find(c=>c.player).models.find(m=>m.segId===segId&&m.active);
    if(m) m.novelty = 0.94;
  }
  render();
  saveGame();
}
function doRetire(segId){
  if(!confirm('Retire this model? You will have no presence in this segment.')) return;
  playerRetire(st, segId);
  render();
  saveGame();
}
function doAdvance(){
  try {
    applyCampusToSim();   // input hook: campus-derived capacity feeds the sim
    // campus R&D Lab adds to all three R&D branches this quarter
    const campusRD = (typeof MarqueWorld!=='undefined')
      ? MarqueWorld.deriveCampusInputs(MarqueWorld.getCampus()).rdBonuses
      : {};
    advance(st, { rd:{ eng: pendingRD.eng + (campusRD.eng||0),
                       eff: pendingRD.eff + (campusRD.eff||0),
                       mfg: pendingRD.mfg + (campusRD.mfg||0) },
                  factoryUpgrade:false });
    studioSel=null;
    if(typeof MarqueWorld!=='undefined') MarqueWorld.setSimState(st);
    if(typeof MarqueWorld!=='undefined'){
      MarqueWorld.applyProduction(MarqueWorld.getCampus(), st.lastUnits);
      MarqueWorld.renderPanels();
    }
    render();
    saveGame();
  } catch(e){
    console.error('Advance error:', e);
    alert('Something went wrong advancing the quarter. Try refreshing. Details: '+e.message);
  }
}
function renderGoalBanner(){
  const obj = st.objective;
  const stat = objectiveStatus(st);
  const deadline = (obj.deadlineYear - C.startYear)*4 + obj.deadlineQuarter;
  const current  = (st.year - C.startYear)*4 + st.quarter;
  const qleft = Math.max(0, deadline - current);
  const color = stat.met ? 'var(--green)' : (qleft <= 4 ? 'var(--red)' : 'var(--amber)');
  document.getElementById('goalBanner').innerHTML =
    `Goal — <b style="color:var(--hi)">${stat.name}</b> by Q${obj.deadlineQuarter}&nbsp;${obj.deadlineYear}`
    + ` &nbsp;·&nbsp; <span style="color:${color}">${stat.detail}</span>`
    + ` &nbsp;·&nbsp; ${qleft} quarter${qleft!==1?'s':''} left`;
}

function renderEndScreen(){
  const player = st.companies.find(c=>c.player);
  const obj = st.objective;
  const reason = st.overReason;
  const cls = reason==='win'?'win':reason==='bankrupt'?'bankrupt':'timeout';
  const objName = (OBJECTIVES[obj.id]||OBJECTIVES.share).name;
  const headline = reason==='win' ? 'Goal achieved.' : reason==='bankrupt' ? 'Insolvent.' : 'Time\'s up.';
  const sub = reason==='win'
    ? `You completed ${objName}${diffLabel} by Q${st.quarter} ${st.year}.`
    : reason==='bankrupt'
    ? `Cash hit zero in Q${st.quarter} ${st.year}${diffLabel}. The board wound the company down.`
    : `Deadline reached without completing ${objName}${diffLabel}.`;
  const headColor = reason==='win'?'var(--green)':reason==='bankrupt'?'var(--red)':'var(--dim)';
  const keepBtn = st.won ? `<button onclick="keepBuilding()">Keep building →</button>` : '';
  const diffLabel = (st.difficulty && DIFFICULTY[st.difficulty]) ? ` · ${DIFFICULTY[st.difficulty].label}` : '';
  const recap = endRecap(st);
  const bestSellerVal = recap.bestSeller
    ? `${recap.bestSeller.label} <small style="color:var(--dim)">${(recap.bestSeller.units/1000).toFixed(2)}M</small>` : '—';
  return `<div class="endcard ${cls}">
    <h3 style="color:${headColor}">${headline}</h3>
    <div class="sub">${sub}</div>
    <div class="endstory">“${recap.story}”</div>
    <div class="score-val">${st.score.toLocaleString()}<small>score</small></div>
    <div class="stat-grid">
      <div><div class="sk">Final share</div><div class="sv">${(st.lastOverall*100).toFixed(1)}%</div></div>
      <div><div class="sk">Peak share</div><div class="sv">${(st.peakShare*100).toFixed(1)}%</div></div>
      <div><div class="sk">Cash</div><div class="sv">$${fmtM(player.cash)}</div></div>
      <div><div class="sk">Cars built</div><div class="sv">${(st.totalUnits/1000).toFixed(2)}M</div></div>
      <div><div class="sk">Brand</div><div class="sv">${Math.round(player.brand*100)}</div></div>
      <div><div class="sk">Best-seller</div><div class="sv" style="font-size:12px">${bestSellerVal}</div></div>
    </div>
    <div class="enddecisive"><span>Decisive factor</span> ${recap.decisive}.</div>
    <div class="end-actions">
      <button class="primary-end" onclick="startNew()">Play again</button>
      ${keepBtn}
      <button id="copyResultBtn" onclick="copyResult()">Copy result</button>
    </div>
  </div>`;
}

function keepBuilding(){ st.over = false; render(); saveGame(); }

/* ── tutorial checklist ─────────────────────────────────────────────────── */
const TUTORIAL_KEY = 'marque.tutorial.v1';
const TUTORIAL_STEPS = [
  { label:'Design your founding car',
    check: ()=> st && !st.launchFlow },
  { label:'Place a Design Studio',
    check: ()=> hasStudio() },
  { label:'Build an R&D Lab',
    check: ()=> typeof MarqueWorld!=='undefined' &&
                MarqueWorld.getCampus().objects.some(o=>o.type==='rdlab') },
  { label:'Advance your first quarter',
    check: ()=> st && st.tick >= 1 },
];
function isTutDismissed(){ try{ return !!localStorage.getItem(TUTORIAL_KEY); }catch(e){ return false; } }
function dismissTutorial(){
  try{ localStorage.setItem(TUTORIAL_KEY,'1'); }catch(e){}
  const el=document.getElementById('tutCard');
  if(el){ el.classList.add('tut-fading'); setTimeout(()=>{ el.style.display='none'; el.classList.remove('tut-fading'); },380); }
}
function updateTutorial(){
  if(isTutDismissed()) return;
  const el=document.getElementById('tutCard');
  if(!el || !st) return;
  const allDone = TUTORIAL_STEPS.every(s=>s.check());
  if(allDone){ setTimeout(dismissTutorial, 1100); return; }
  const items = TUTORIAL_STEPS.map(s=>{
    const done=s.check();
    return `<div class="tut-item${done?' tut-done':''}"><span class="tut-check">${done?'✓':'○'}</span>${s.label}</div>`;
  }).join('');
  el.style.display='block';
  el.innerHTML=`<div class="tut-head">Getting started
    <button class="tut-dismiss" onclick="dismissTutorial()" title="Dismiss">✕</button></div>${items}`;
}

/* ── end-of-run result card ─────────────────────────────────────────────── */
function buildResultText(){
  const player = st.companies.find(c=>c.player);
  const obj = OBJECTIVES[(st.objective&&st.objective.id)] || OBJECTIVES.share;
  const reason = st.overReason;
  const outcome = reason==='win'?'WIN':reason==='bankrupt'?'BANKRUPT':'TIMEOUT';
  const recap = endRecap(st);
  const peakPct = (st.peakShare*100).toFixed(1);
  const best = recap.bestSeller
    ? `${recap.bestSeller.label} (${(recap.bestSeller.units/1000).toFixed(1)}M units)` : '—';
  const diffLabel = (st.difficulty && DIFFICULTY[st.difficulty])
    ? ' · '+DIFFICULTY[st.difficulty].label : '';
  return [
    `MARQUE · ${player.name} · ${obj.name}${diffLabel}`,
    `${outcome} in Q${st.quarter} ${st.year} · Peak share ${peakPct}%`,
    `Best-seller: ${best}`,
    `${recap.decisive}.`,
    `"${recap.story}"`,
  ].join('\n');
}
function copyResult(){
  const text = buildResultText();
  navigator.clipboard.writeText(text).then(()=>{
    const btn=document.getElementById('copyResultBtn');
    if(btn){ btn.textContent='Copied!'; setTimeout(()=>{ btn.textContent='Copy result'; },2000); }
  }).catch(()=>{ prompt('Copy this result:', text); });
}

/* ── difficulty ─────────────────────────────────────────────────────────── */
let launchDiff = 'standard';
const DIFFICULTY = {
  relaxed:  { label:'Relaxed',  startCash:600, shareTarget:0.28, desc:'More cash · 28% share goal' },
  standard: { label:'Standard', startCash:450, shareTarget:0.33, desc:'Balanced · 33% share goal' },
  hard:     { label:'Hard',     startCash:300, shareTarget:0.38, desc:'Tight budget · 38% share goal' },
};
function applyDifficulty(state, diff){
  const d = DIFFICULTY[diff] || DIFFICULTY.standard;
  const player = state.companies.find(c=>c.player);
  player.cash = d.startCash;
  if(state.objective && state.objective.targetShare != null) state.objective.targetShare = d.shareTarget;
  state.difficulty = diff;
}
function setDifficulty(id){
  launchDiff = id;
  applyDifficulty(st, id);
  renderLaunchScreen();
}

function startNew(){
  studioSel=null; pendingFactory=false;
  pendingRD={eng:50,eff:30,mfg:40};
  _lastCash=0; _lastShare=0; _lastBrand=0;
  launchSel={ segId:'sedan', engId:'I4', trimId:'mid' };
  launchObjId='share';
  st=newGame();
  applyDifficulty(st, launchDiff);
  if(typeof MarqueWorld!=='undefined') MarqueWorld.resetCampus();
  applyCampusToSim();
  render();
}

/* boot — resume the saved run if there is one, otherwise start fresh */
initCampus();
if(!loadGame()) startNew();
refreshRunButtons();

document.getElementById('newRunBtn').onclick = () => {
  if(st && !st.over && !st.launchFlow &&
     !confirm('Start a new run? Your current run stays saved until you launch the new one.')) return;
  startNew();
};
document.getElementById('continueBtn').onclick = () => {
  if(!loadGame()) alert('No saved run found.');
};
</script>
