<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MARQUE · Auto Company Sim</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script>
/* marque-sim.js — MARQUE simulation engine, era 1994–2010
   Pure JS, no DOM. Exposes window.MarqueSim.
   State is mutated in-place; serialise with JSON.stringify.        */

const MarqueSim = (() => {
'use strict';

// ── tunables ─────────────────────────────────────────────────────────────────
// Balance philosophy (see BALANCE_NOTES.md): margins are thin, fixed costs
// scale with the size of the company, and covering the whole market is a real
// multi-year financial commitment — so cash compounds slowly and the share
// goal is earned by out-developing rivals over time, not by mere presence.
const C = {
  startYear: 1990, startCash: 450,   // +50M runway so 1st 6q aren't a cash hole
  // operating costs — overhead is no longer a flat fee; it grows with the
  // company so a sprawling, high-capacity automaker carries real burden.
  overheadBase: 40,          // $M/q fixed corporate cost
  overheadPerModel: 26,      // $M/q per active model (was 30 — saves ~$4–12M/q early)
  capacityCarry: 0.20,       // $M/q per k-unit of standing capacity
  noveltyDecay: 0.90,
  designBase: 30,            // $M + engine/trim adders (was 16 — tooling is real)
  segmentLaunchCost: 130,    // $M one-time to ENTER a new segment (plant/tooling)
  refreshBase: 26,           // $M, scales with seg.refPrice/22
  capacityStart: 180,        // k units / quarter
  capacityStep: 55,
  capacityUpgradeCost: 130,  // $M
  rdEffort: 1150,            // higher → R&D pays off slower, feels expensive early
  qualityCap: 0.44, featCap: 0.40,
  effBonusCap: 0.18, perfBonusCap: 0.20,
  mfgCostCut: 0.12,          // was 0.28 — cost cuts no longer balloon margins
  // Skill expression: share is a softmax over appeal^gamma, so a genuinely
  // better product wins decisively more share (gamma>1) instead of the field
  // bunching at ~25%. Brand is responsive — it BUILDS fast when your product
  // (quality + freshness + halo) leads the field, and fades slowly when you coast.
  appealGamma: 1.7,          // share = softmax over appeal^gamma (skill → decisive share)
  gammaRampQ: 22,            // gamma ramps 1→appealGamma over these quarters: an early
                             // market is bunched near parity, then a superior product
                             // pulls away — so no one runs away to a win before ~1994
  brandRiseRate: 0.075,      // brand climbs toward its target at this rate when leading
  brandFallRate: 0.030,      // and erodes at this (slower) rate when behind/coasting
  // Shareholder dividend sweep: excess cash above a healthy operating reserve
  // is returned to owners each quarter. The objective is market share, not a
  // cash pile — this keeps the numbers legible, makes idle hoarding pointless,
  // and stops a profitable company from ballooning into the stratosphere. It
  // never touches cash you actually need: early play sits below the reserve and
  // pays nothing, and the reserve always covers design + launch + a full R&D
  // quarter.
  cashReserveSoft: 650,      // $M — sweep only takes cash above this
  dividendRate: 0.45,        // fraction of the excess returned each quarter
  haloBump: 0.008,           // per-quarter brand gain from V8/V12 coupe (tunable)
  recallRiskBase: 0.014,
  recallDuration: 3,
  recallHitMin: 26, recallHitMax: 70,
};

// ── engines ───────────────────────────────────────────────────────────────────
const ENGINES = {
  I4:     { name:'I4',     perf:0.20, eff:0.72, costAdd:0,    fits:['sedan','suv','pickup'], unlock:1990 },
  V6:     { name:'V6',     perf:0.44, eff:0.54, costAdd:2.5,  fits:['sedan','suv','pickup','coupe'], unlock:1990 },
  V8:     { name:'V8',     perf:0.68, eff:0.34, costAdd:5.5,  fits:['sedan','suv','pickup','coupe'], unlock:1990 },
  V12:    { name:'V12',    perf:0.88, eff:0.17, costAdd:13.0, fits:['coupe'], unlock:1992 },
  hybrid: { name:'Hybrid', perf:0.38, eff:0.84, costAdd:7.5,  fits:['sedan','suv'], unlock:1997 },
  ev:     { name:'EV',     perf:0.47, eff:0.94, costAdd:12.0, fits:['sedan'], unlock:2001 },
};

const TRIMS = {
  base: { name:'Base', featAdd:0.00, costAdd:0,   priceAdd:0   },
  mid:  { name:'Mid',  featAdd:0.14, costAdd:2.5, priceAdd:3.2 },
  high: { name:'High', featAdd:0.26, costAdd:5.8, priceAdd:8.0 },
};

// ── segments ──────────────────────────────────────────────────────────────────
const SEGS = [
  { id:'sedan',  name:'Sedan',  demand:230, refPrice:22, spread:4.2, baseCost:19.5,
    w:{ price:.32, quality:.17, brand:.11, eff:.16, feat:.09, perf:.05, nov:.10 } },
  { id:'suv',    name:'SUV',    demand:165, refPrice:37, spread:7.2, baseCost:33.0,
    w:{ price:.16, quality:.18, brand:.22, eff:.07, feat:.17, perf:.12, nov:.08 } },
  { id:'pickup', name:'Pickup', demand:140, refPrice:31, spread:5.8, baseCost:27.0,
    w:{ price:.20, quality:.14, brand:.15, eff:.09, feat:.12, perf:.22, nov:.08 } },
  { id:'coupe',  name:'Coupe',  demand: 85, refPrice:36, spread:6.8, baseCost:30.5,
    w:{ price:.08, quality:.12, brand:.20, eff:.03, feat:.14, perf:.30, nov:.13 } },
];

const PERSONAS = {
  player:      { priceBias:0,    rdBias:{eng:.33,eff:.33,mfg:.34}, prefEng:{sedan:'I4',suv:'V6',pickup:'V6',coupe:'V8'}, prefTrim:'mid' },
  value:       { priceBias:-.10, rdBias:{eng:.20,eff:.30,mfg:.50}, prefEng:{sedan:'I4',suv:'I4',pickup:'I4',coupe:'V6'}, prefTrim:'base' },
  premium:     { priceBias:+.16, rdBias:{eng:.45,eff:.15,mfg:.40}, prefEng:{sedan:'V6',suv:'V8',pickup:'V8',coupe:'V8'}, prefTrim:'high' },
  performance: { priceBias:+.06, rdBias:{eng:.60,eff:.10,mfg:.30}, prefEng:{sedan:'V8',suv:'V8',pickup:'V8',coupe:'V12'}, prefTrim:'mid' },
};

// ── seeded RNG (mulberry32, serialisable) ─────────────────────────────────────
function rand(st) {
  st.rngState = (st.rngState + 0x6D2B79F5) >>> 0;
  let t = Math.imul(st.rngState ^ st.rngState >>> 15, 1 | st.rngState);
  t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
  return ((t ^ t >>> 14) >>> 0) / 4294967296;
}

// ── helpers ───────────────────────────────────────────────────────────────────
const clamp = (v,a,b) => Math.max(a, Math.min(b,v));
const lerp  = (a,b,t) => a + (b-a)*t;
const getSeg = id => SEGS.find(s => s.id===id);

function modelBaseCost(segId, engId, trimId) {
  return +(getSeg(segId).baseCost + ENGINES[engId].costAdd + TRIMS[trimId].costAdd).toFixed(1);
}

function makeModel(segId, engId, trimId, persona) {
  const s = getSeg(segId);
  const per = PERSONAS[persona] || PERSONAS.player;
  const price = +(s.refPrice*(1+per.priceBias) + ENGINES[engId].costAdd*0.55 + TRIMS[trimId].priceAdd).toFixed(1);
  return {
    segId, engId, trimId,
    price,
    cost: modelBaseCost(segId, engId, trimId),
    quality: 0.50,
    feat: clamp(0.50 + TRIMS[trimId].featAdd, 0, 1),
    novelty: 0.74,
    recallQ: 0,
    active: true,
    lastShare: 0, lastUnits: 0, totalUnits: 0,
  };
}

// ── appeal ────────────────────────────────────────────────────────────────────
const logistic  = x => 1/(1+Math.exp(x));
const priceScore = (price, s) => logistic((price - s.refPrice) / s.spread);

function coPerf(co, engId) {
  return clamp(ENGINES[engId].perf + C.perfBonusCap*(1-Math.exp(-co.rd.eng/C.rdEffort)), 0, 1);
}
function coEff(co, engId) {
  return clamp(ENGINES[engId].eff + C.effBonusCap*(1-Math.exp(-co.rd.eff/C.rdEffort)), 0, 1);
}

function appeal(m, s, co) {
  const w = s.w;
  const a = w.price   * priceScore(m.price, s)
          + w.quality * m.quality
          + w.brand   * co.brand
          + w.eff     * coEff(co, m.engId)
          + w.feat    * m.feat
          + w.perf    * coPerf(co, m.engId)
          + w.nov     * m.novelty
          - (m.recallQ > 0 ? 0.12 : 0);
  return Math.max(0.01, a);
}

// How good a company's lineup actually is right now: quality + freshness, with a
// genuine-prestige bump for a halo coupe. Drives the responsive brand model.
function productStrength(co) {
  const ms = co.models.filter(m=>m.active);
  if (!ms.length) return 0.30;
  let s = 0;
  ms.forEach(m => { s += 0.62*m.quality + 0.38*m.novelty; });
  s /= ms.length;
  if (ms.find(m => m.segId==='coupe' && (m.engId==='V8'||m.engId==='V12'))) s += 0.06;
  return clamp(s, 0, 1);
}

// returns { [coId]: { share, units } } for a segment. Share is a softmax over
// appeal^gamma — a clearly better product takes decisively more share, instead of
// the whole field bunching near an even split.
function segShares(segId, st) {
  const s = getSeg(segId);
  // gamma ramps from 1 (even, parity-ish market) up to appealGamma as the decade
  // matures, so product superiority pulls away over time rather than instantly.
  const g = 1 + (C.appealGamma - 1) * Math.min(1, (st.tick||0) / C.gammaRampQ);
  const entries = st.companies
    .map(co => ({ co, m: co.models.find(m => m.segId===segId && m.active) }))
    .filter(e => e.m);
  if (!entries.length) return {};
  entries.forEach(e => { e.w = Math.pow(appeal(e.m, s, e.co), g); });
  const tot = entries.reduce((sum,e) => sum + e.w, 0);
  const dm = (st.demandMult && st.demandMult[segId]) || 1;   // current demand multiplier
  const out = {};
  entries.forEach(e => { out[e.co.id] = { share: e.w/tot, units: s.demand*dm*(e.w/tot) }; });
  return out;
}

// ── R&D ───────────────────────────────────────────────────────────────────────
function applyRD(co) {
  const g   = (prog, cap) => cap*(1-Math.exp(-prog/C.rdEffort));
  const qGain = 0.50 + g(co.rd.eng, C.qualityCap);
  const fGain = 0.50 + g(co.rd.eng*0.6, C.featCap);
  const mMult = 1 - C.mfgCostCut*(1-Math.exp(-co.rd.mfg/C.rdEffort));
  co.models.filter(m=>m.active).forEach(m => {
    m.quality = clamp(Math.max(m.quality, qGain), 0, 1);
    m.feat    = clamp(Math.max(m.feat, fGain + TRIMS[m.trimId].featAdd), 0, 1);
    m.cost    = +(modelBaseCost(m.segId, m.engId, m.trimId) * mMult).toFixed(1);
  });
}

// ── player immediate actions ──────────────────────────────────────────────────
// These take effect right away; projections update; rivals respond next Advance.

// Cost to put a car on sale = design/tooling for the model, PLUS a one-time
// plant/tooling launch cost the first time you ENTER a segment you've never
// occupied. Your founding segment (your first ever model) uses the plant you
// start with, so it carries no launch surcharge. This makes covering the whole
// market a deliberate, multi-year investment rather than a free land-grab.
function designCostOf(engId, trimId) {
  return Math.round(C.designBase + ENGINES[engId].costAdd*1.4 + TRIMS[trimId].costAdd*1.8);
}
function segmentLaunchCostFor(player, segId) {
  if (!player.launchedSegs) player.launchedSegs = {};
  const isNewSeg   = !player.launchedSegs[segId];
  const isFirstEver = Object.keys(player.launchedSegs).length === 0;
  return (isNewSeg && !isFirstEver) ? C.segmentLaunchCost : 0;
}

// What a prospective design would cost right now (for the UI). Tells the player
// up-front whether they're paying the one-time plant/tooling launch surcharge.
function quoteDesign(st, segId, engId, trimId) {
  const player = st.companies.find(c=>c.player);
  const designCost = designCostOf(engId, trimId);
  const launchCost = segmentLaunchCostFor(player, segId);
  return { designCost, launchCost, total: designCost + launchCost, isNewSegment: launchCost > 0 };
}

function playerDesign(st, segId, engId, trimId, price) {
  const player = st.companies.find(c=>c.player);
  const designCost = designCostOf(engId, trimId);
  const launchCost = segmentLaunchCostFor(player, segId);
  const total = designCost + launchCost;
  if (player.cash < total) return { ok:false, reason:'Not enough cash.' };
  const existing = player.models.find(m => m.segId===segId && m.active);
  if (existing) existing.active = false;
  player.cash -= total;
  if (!player.launchedSegs) player.launchedSegs = {};
  player.launchedSegs[segId] = true;
  const m = makeModel(segId, engId, trimId, 'player');
  if (price != null) m.price = price;
  player.models.push(m);
  applyRD(player); // boost new model with existing R&D
  return { ok:true, cost: total, designCost, launchCost, model: m };
}

function playerRefresh(st, segId, costOverride) {
  const player = st.companies.find(c=>c.player);
  const s = getSeg(segId);
  // costOverride lets the shell charge the actual (e.g. Studio-L2-discounted) price
  // up front — one pricing path, no charge-the-base-then-refund.
  const cost = (costOverride!=null) ? Math.round(costOverride) : Math.round(C.refreshBase * s.refPrice/22);
  if (player.cash < cost) return { ok:false, reason:'Not enough cash.' };
  const m = player.models.find(m2 => m2.segId===segId && m2.active);
  if (!m) return { ok:false, reason:'No active model.' };
  player.cash -= cost;
  m.novelty = 0.86;
  return { ok:true, cost };
}

function playerRetire(st, segId) {
  const m = st.companies.find(c=>c.player).models.find(m2 => m2.segId===segId && m2.active);
  if (m) m.active = false;
}

// ── stochastic events (seeded → reproducible per seed; never Math.random) ──────
// Secular era trends: the 1990s→2000s shift toward SUVs/trucks and away from
// sedans/coupes. Each segment also takes a small seeded yearly wobble, so the
// market drifts differently from seed to seed and year to year.
const SEG_TREND = { sedan:-0.008, suv:+0.016, pickup:+0.006, coupe:-0.006 };

function rollEvents(st, events) {
  // cost shock eases back toward normal every quarter
  st.costShockMult = +(1 + (st.costShockMult - 1) * 0.65).toFixed(3);
  if (Math.abs(st.costShockMult - 1) < 0.012) st.costShockMult = 1;
  // expire finished rival price wars
  st.companies.forEach(co => { if (co.priceWar && st.tick >= co.priceWar.until) co.priceWar = null; });

  st.lastEvents = []; st.lastEventTags = [];
  if (st.quarter !== 1) return;     // the rest roll once a year, at the start of a year

  // 1. demand drift: secular trend + a ±3% seeded wobble per segment
  SEGS.forEach(s => {
    const wobble = (rand(st) - 0.5) * 0.06;
    st.demandMult[s.id] = +clamp(st.demandMult[s.id]*(1 + SEG_TREND[s.id]) + wobble, 0.6, 1.7).toFixed(3);
  });

  // 2. a segment boom year (occasional)
  if (rand(st) < 0.20) {
    const s = SEGS[Math.floor(rand(st) * SEGS.length)];
    st.demandMult[s.id] = +clamp(st.demandMult[s.id]*1.22, 0.6, 1.9).toFixed(3);
    const e = `<b>${s.name} boom.</b> Demand for ${s.name.toLowerCase()}s is surging this year.`;
    events.push(e); st.lastEvents.push(e); st.lastEventTags.push({ kind:'boom', seg:s.id });
  }

  // 3. supply-cost shock (occasional, only once the industry is established so a
  //    fragile start-up isn't wiped out) — a margin squeeze that eases in a
  //    couple of quarters, never a solvency event for a sound company.
  if (st.year >= 1993 && rand(st) < 0.15) {
    st.costShockMult = +(1.02 + rand(st)*0.035).toFixed(3);
    const e = `<b>Supply shock.</b> Material costs jump — unit costs up ~${Math.round((st.costShockMult-1)*100)}% until it eases.`;
    events.push(e); st.lastEvents.push(e); st.lastEventTags.push({ kind:'shock' });
  }

  // 4. rival strategy pivot (occasional): a price war, or a halo-coupe push
  if (rand(st) < 0.22) {
    const rivals = st.companies.filter(c => !c.player);
    const co = rivals[Math.floor(rand(st) * rivals.length)];
    if (rand(st) < 0.55) {
      const s = SEGS[Math.floor(rand(st) * SEGS.length)];
      co.priceWar = { seg:s.id, until: st.tick + 5 };
      const e = `<b>${co.name}</b> opens a <b>price war</b> in ${s.name}.`;
      events.push(e); st.lastEvents.push(e); st.lastEventTags.push({ kind:'pricewar', seg:s.id, who:co.name });
    } else {
      const has = co.models.find(m => m.active && m.segId==='coupe' && (m.engId==='V8'||m.engId==='V12'));
      if (!has && st.year >= ENGINES.V8.unlock) {
        const existing = co.models.find(m => m.active && m.segId==='coupe');
        if (existing) existing.active = false;
        co.models.push(makeModel('coupe','V8', PERSONAS[co.persona].prefTrim, co.persona));
        applyRD(co);
        const e = `<b>${co.name}</b> launches a V8 <b>halo coupe</b> to chase prestige.`;
        events.push(e); st.lastEvents.push(e); st.lastEventTags.push({ kind:'halo', who:co.name });
      }
    }
  }
}

// ── rival AI ──────────────────────────────────────────────────────────────────
function rivalTick(co, st, events) {
  const per = PERSONAS[co.persona];
  const rdBudget = clamp(co.cash * 0.22, 0, 160);
  co.cash -= rdBudget;
  co.rd.eng += rdBudget * per.rdBias.eng;
  co.rd.eff += rdBudget * per.rdBias.eff;
  co.rd.mfg += rdBudget * per.rdBias.mfg;
  applyRD(co);

  // snapshot prices before adjustments so we can detect meaningful cuts
  const prevPrices = {};
  co.models.filter(m=>m.active).forEach(m => prevPrices[m.segId] = m.price);
  let firedPriceCut = false;  // only one price-cut headline per rival per quarter

  SEGS.forEach(s => {
    let m = co.models.find(m2 => m2.segId===s.id && m2.active);
    if (!m) {
      const eng = per.prefEng[s.id];
      if (!eng||!ENGINES[eng].fits.includes(s.id)||st.year<ENGINES[eng].unlock) return;
      co.models.push(makeModel(s.id, eng, per.prefTrim, co.persona));
      events.push(`<b>${co.name}</b> launches a ${ENGINES[eng].name} ${s.name}.`);
      return;
    }
    if (m.lastShare < 0.17) m.price = +(m.price*0.970).toFixed(1);
    else if (m.lastShare > 0.38) m.price = +(m.price*1.016).toFixed(1);
    if (co.persona==='value')       m.price = +(m.price*0.995).toFixed(1);
    if (co.persona==='premium')     m.price = +(m.price*1.004).toFixed(1);
    if (co.priceWar && co.priceWar.seg===s.id) m.price = +(m.price*0.95).toFixed(1);  // aggressive undercut
    const floor = m.cost*1.04, ceil = s.refPrice*(co.persona==='premium'?1.55:1.32);
    m.price = clamp(m.price, floor, ceil);
    if (!firedPriceCut && prevPrices[s.id] && m.price < prevPrices[s.id] * 0.97 && m.lastShare < 0.22) {
      events.push(`<b>${co.name}</b> cuts prices in ${s.name} to fight for share.`);
      firedPriceCut = true;
    }
    if (m.novelty < 0.40 && rand(st) < 0.30) {
      m.novelty = 0.78; co.cash -= C.refreshBase;
      events.push(`<b>${co.name}</b> refreshes its ${s.name} lineup.`);
    }
  });
  // Brand is updated uniformly for ALL companies in advance() step 6b (the
  // responsive model), so rivals no longer adjust brand here.
}

// ── advance one quarter ───────────────────────────────────────────────────────
// decisions = { rd:{eng,eff,mfg}, factoryUpgrade:bool }
// Prices are already set on models directly; design/refresh/retire happened already.
function advance(st, decisions) {
  if (st.over) return st;
  const player = st.companies.find(c=>c.player);
  const events = [];

  // 0. world events (demand drift, booms, cost shocks, rival pivots) — seeded,
  //    rolled before rivals act so a pivot takes effect this quarter.
  rollEvents(st, events);

  // 1. factory upgrade
  if (decisions.factoryUpgrade && player.cash >= C.capacityUpgradeCost) {
    player.cash -= C.capacityUpgradeCost;
    player.factory.capacity += C.capacityStep;
    events.push(`Factory expanded to <b>${player.factory.capacity}k</b> units/q.`);
  }

  // 2. R&D
  const rdSpend = decisions.rd.eng + decisions.rd.eff + decisions.rd.mfg;
  player.cash -= rdSpend;
  player.rd.eng += decisions.rd.eng;
  player.rd.eff += decisions.rd.eff;
  player.rd.mfg += decisions.rd.mfg;
  applyRD(player);

  // 3. rivals
  st.companies.filter(c=>!c.player).forEach(co => rivalTick(co, st, events));

  // 4. market resolution. Appeal → share is computed for everyone; the player
  //    can only BUILD up to factory capacity, allocated PROPORTIONALLY across
  //    active models so no segment is starved by ordering. Rivals are abstract
  //    incumbents with no capacity constraint.
  let playerProfit = 0, playerUnits = 0;
  const playerDemand = {};   // segId → unconstrained demand (k units)
  let totalDemand = 0;
  SEGS.forEach(s => {
    const shares = segShares(s.id, st);
    st.companies.forEach(co => {
      const e = shares[co.id]; if (!e) return;
      const m = co.models.find(m2 => m2.segId===s.id && m2.active); if (!m) return;
      m.lastShare = e.share;
      if (!co.player) m.lastUnits = e.units;
    });
    const pe = shares['you'];
    if (pe) { playerDemand[s.id] = pe.units; totalDemand += pe.units; }
  });
  const cap  = player.factory.capacity;
  const fill = totalDemand > cap ? cap / totalDemand : 1;   // proportional throttle
  st.lastCapFill   = +fill.toFixed(3);
  st.lastDemand    = Math.round(totalDemand);
  SEGS.forEach(s => {
    const m = player.models.find(m2 => m2.segId===s.id && m2.active); if (!m) return;
    const units = (playerDemand[s.id] || 0) * fill;
    m.lastUnits = units;
    m.totalUnits = (m.totalUnits || 0) + units;                      // lifetime nameplate sales
    playerProfit += units * (m.price - m.cost * st.costShockMult);   // supply shocks bite margin
    playerUnits  += units;
  });

  // 5. operating costs — overhead scales with the size of the company, so a
  //    sprawling, high-capacity automaker carries real fixed burden. R&D is a
  //    real P&L cost too.
  const activeCount = player.models.filter(m=>m.active).length;
  const overhead = C.overheadBase
                 + C.overheadPerModel * activeCount
                 + C.capacityCarry   * player.factory.capacity;
  st.lastOverhead = Math.round(overhead);
  playerProfit -= overhead;
  playerProfit -= rdSpend;
  // cash: rdSpend was pre-deducted above; add it back so the net hit is
  // exactly -overhead -rdSpend (plus the unit margins computed above).
  player.cash += playerProfit + rdSpend;
  st.lastProfit = playerProfit; st.lastUnits = playerUnits;
  st.totalUnits += playerUnits;

  // 6. novelty decay + recalls (rand() order preserved → still deterministic)
  const recallEvents = [];
  st.companies.forEach(co => {
    co.models.filter(m=>m.active).forEach(m => {
      m.novelty = clamp(m.novelty * C.noveltyDecay, 0.04, 1);
      if (m.recallQ > 0) m.recallQ--;
      const risk = C.recallRiskBase*(1 - m.quality);
      if (rand(st) < risk && m.recallQ===0) {
        m.recallQ = C.recallDuration;
        co.brand = clamp(co.brand - 0.06, 0, 1);
        if (co.player) {
          const hit = Math.round(C.recallHitMin + (C.recallHitMax-C.recallHitMin)*(1-m.quality));
          player.cash -= hit;
          recallEvents.push(`<b>Recall.</b> Defect in ${getSeg(m.segId).name} costs $${hit}M and hits brand.`);
        }
      }
    });
  });

  // 6b. responsive brand. Each company's brand chases a target set by how good its
  //     lineup is RELATIVE TO THE FIELD: lead on product (quality, freshness, halo)
  //     and hold share, and brand climbs fast; coast and let models age, and it
  //     stagnates and slips. This is the main way skill separates from the pack.
  const strength = {};
  st.companies.forEach(co => { strength[co.id] = productStrength(co); });
  const fieldStr = st.companies.reduce((a,co)=>a+strength[co.id],0) / st.companies.length;
  st.companies.forEach(co => {
    const lead = strength[co.id] - fieldStr;                 // + = ahead of the field
    const target = clamp(0.20 + 0.55*strength[co.id] + 0.80*lead
                         + ((co.lastShareOverall||0.25)-0.25)*0.40, 0, 0.98);
    const rate = target > co.brand ? C.brandRiseRate : C.brandFallRate;
    co.brand = clamp(lerp(co.brand, target, rate), 0, 1);
    if (co.persona==='premium')     co.brand = clamp(co.brand+0.002,  0, 1);
    if (co.persona==='performance') co.brand = clamp(co.brand+0.0015, 0, 1);
    // halo coupe: a V8/V12 coupe lifts brand further for whoever runs one
    const haloCoupe = co.models.find(m => m.active && m.segId==='coupe' && (m.engId==='V8'||m.engId==='V12'));
    if (haloCoupe) {
      const haloBoost = C.haloBump * coPerf(co, haloCoupe.engId);
      co.brand = clamp(co.brand + haloBoost, 0, 1);
      if (co.player) st.lastHaloBonus = +(haloBoost * 100).toFixed(3);
    } else if (co.player) {
      st.lastHaloBonus = 0;
    }
  });
  events.push(...recallEvents);

  // 6.5 shareholder dividend sweep — excess capital above the reserve goes back
  //     to owners, so cash can't be hoarded and profits don't balloon.
  st.lastDividend = 0;
  if (player.cash > C.cashReserveSoft) {
    const sweep = (player.cash - C.cashReserveSoft) * C.dividendRate;
    player.cash -= sweep;
    st.lastDividend = Math.round(sweep);
  }

  // 7. clock advance
  st.tick++; st.quarter++; if (st.quarter>4){st.quarter=1;st.year++;}
  recordHistory(st);
  pushLog(st, events);
  // win / lose / timeout — order matters
  const obj = st.objective;
  if (player.cash < 0) {
    st.over = true; st.overReason = 'bankrupt';
  } else if (!st.won && objectiveMet(st)) {
    st.over = true; st.won = true; st.overReason = 'win';
  } else if (st.year > obj.deadlineYear ||
             (st.year === obj.deadlineYear && st.quarter > obj.deadlineQuarter)) {
    st.over = true; st.overReason = 'timeout';
  }
  if (st.over) {
    st.score = Math.round(st.peakShare*1000 + player.cash/5 + player.brand*100 + (st.won ? 500 : 0));
  }
  return st;
}

// ── history + log ─────────────────────────────────────────────────────────────
function recordHistory(st) {
  const totals = {}; let grand = 0;
  st.companies.forEach(c => totals[c.id] = 0);
  SEGS.forEach(s => {
    const sh = segShares(s.id, st);
    st.companies.forEach(c => {
      const e = sh[c.id]; if (!e) return;
      totals[c.id] += e.units; grand += e.units;
    });
  });
  if (!grand) grand = 1;
  const pt = {};
  st.companies.forEach(c => {
    pt[c.id] = totals[c.id]/grand;
    c.lastShareOverall = pt[c.id]||0;
  });
  st.history.push(pt);
  if (st.history.length > 32) st.history.shift();
  st.lastOverall = pt['you']||0;
  if (st.peakShare !== undefined) st.peakShare = Math.max(st.peakShare, st.lastOverall);
}

// A "what changed" + "what to consider next" briefing tied to REAL events this
// quarter (recalls, capacity caps, rival cuts, halo, novelty, share swings),
// not generic filler. Returns { changed, next }.
function computeInsights(st, events) {
  const player = st.companies.find(c=>c.player);
  const active = player.models.filter(m=>m.active);
  const segName = id => getSeg(id).name;

  const curOverall  = st.lastOverall;
  const prevOverall = st.history.length>=2 ? (st.history[st.history.length-2]['you']||curOverall) : curOverall;
  const dShare = (curOverall - prevOverall)*100;

  const freshRecall = active.find(m => m.recallQ === C.recallDuration);
  const capped      = st.lastCapFill < 0.97;
  const rivalCut    = events.some(e => e.indexOf('cuts prices') >= 0);
  const stale       = active.find(m => m.novelty < 0.36);
  const missing     = SEGS.filter(s => !active.find(m => m.segId===s.id));
  const maxRival    = Math.max(...st.companies.filter(c=>!c.player).map(c=>c.brand));
  const brandLeader = st.companies.filter(c=>!c.player).sort((a,b)=>b.brand-a.brand)[0];
  const thin        = active.find(m => (m.price - m.cost) < 1.6);
  const target      = Math.round((st.objective.targetShare||0.33)*100);
  const inSeg       = id => active.some(m => m.segId===id);

  // most player-relevant world event this year (from Task-2 event tags)
  const dm = st.demandMult || {};
  let eventLine = null;
  for (const tg of (st.lastEventTags || [])) {
    if (tg.kind==='boom') {
      eventLine = inSeg(tg.seg)
        ? `<b>${segName(tg.seg)} demand is booming</b> this year — your ${segName(tg.seg)} is placed to ride it.`
        : `<b>${segName(tg.seg)} demand is booming</b> this year — and you don't sell one.`;
      break;
    }
    if (tg.kind==='pricewar' && inSeg(tg.seg)) {
      eventLine = `<b>${tg.who}'s price war</b> in ${segName(tg.seg)} is squeezing your margins there.`; break;
    }
    if (tg.kind==='halo') { eventLine = `<b>${tg.who} launched a halo coupe</b> — your brand edge just narrowed.`; break; }
    if (tg.kind==='shock') { eventLine = `A <b>supply shock</b> lifted unit costs across the board this quarter.`; break; }
  }
  // the market's fastest-growing segment (for forward-looking advice)
  const grow = SEGS.slice().sort((a,b)=>(dm[b.id]||1)-(dm[a.id]||1))[0];
  const growMult = dm[grow.id] || 1;

  // ── what changed ──
  let changed;
  if (freshRecall) {
    changed = `A <b>recall</b> in your ${segName(freshRecall.segId)} dented brand and cost cash.`;
  } else if (capped) {
    changed = `Demand outran the plant — you built only <b>${Math.round(st.lastCapFill*100)}%</b> of your orders.`;
  } else if (eventLine) {
    changed = eventLine;
  } else if (rivalCut) {
    changed = `A rival <b>cut prices</b> to claw back share this quarter.`;
  } else if (Math.abs(dShare) >= 0.6) {
    changed = `Your overall share ${dShare>0?'rose to':'slipped to'} <b>${(curOverall*100).toFixed(1)}%</b>.`;
  } else if (st.lastHaloBonus > 0) {
    changed = `Your coupe <b>halo</b> lifted brand again — now ${Math.round(player.brand*100)}.`;
  } else if (stale) {
    changed = `Your ${segName(stale.segId)} is starting to feel <b>dated</b>.`;
  } else {
    changed = `A steady quarter — overall share held near <b>${(curOverall*100).toFixed(1)}%</b>.`;
  }

  // ── what to consider next ──
  let next, nextRoute;
  if (st.lastCapFill < 0.95) {
    next = `Expand capacity — you're leaving sales on the table.`;
    nextRoute = 'plant';
  } else if (stale) {
    next = `Refresh your <b>${segName(stale.segId)}</b> before novelty drags it down.`;
    nextRoute = 'redesign:' + stale.segId;
  } else if (missing.length && player.cash >= C.designBase + C.segmentLaunchCost + 40) {
    next = `You're absent from <b>${missing[0].name}</b> — entering it would widen your reach.`;
    nextRoute = 'design:' + missing[0].id;
  } else if (growMult > 1.15 && !inSeg(grow.id)) {
    next = `<b>${grow.name}</b> is the market's fastest-growing segment and you don't sell one.`;
    nextRoute = 'design:' + grow.id;
  } else if (growMult > 1.15 && (segShares(grow.id, st)['you']||{share:1}).share < curOverall) {
    next = `Lean into <b>${grow.name}</b> — it's growing fast and you under-index there.`;
    nextRoute = 'seg:' + grow.id;
  } else if (maxRival - player.brand > 0.08) {
    next = `Brand trails <b>${brandLeader.name}</b> — quality R&D or a V8/V12 coupe would close it.`;
    nextRoute = 'rd';
  } else if (thin) {
    next = `Margins are thin in <b>${segName(thin.segId)}</b> — mfg R&D or a small price rise helps.`;
    nextRoute = 'rd';
  } else if (curOverall >= (st.objective.targetShare||1)*0.9) {
    next = `You're closing on the <b>${target}%</b> goal — keep the lineup fresh and hold share.`;
    nextRoute = null;
  } else {
    next = `Solid footing — keep investing in product and brand to pull ahead.`;
    nextRoute = null;
  }
  return { changed, next, nextRoute };
}

function pushLog(st, events) {
  const player = st.companies.find(c=>c.player);
  const ins = computeInsights(st, events);
  const ev = [];

  // lead with the briefing
  ev.push(`<b>›</b> ${ins.changed}`);
  ev.push(`<b>→</b> ${ins.next}`);

  // one rival headline for colour
  ev.push(...events);
  const rivals = st.companies.filter(c=>!c.player);
  const mover = rivals[st.tick % rivals.length];
  const s = SEGS[st.tick % SEGS.length];
  const rm = mover.models.find(m=>m.segId===s.id&&m.active);
  if (rm) {
    const pct = Math.round(rm.lastShare*100);
    let headline;
    if (pct >= 38 && mover.persona === 'value') {
      headline = `<b>${mover.name}</b> owns ${s.name} on volume — ${pct}% share at $${rm.price.toFixed(1)}k. Thin margin, unstoppable cadence.`;
    } else if (pct >= 38 && mover.persona === 'premium') {
      headline = `<b>${mover.name}</b> dominates ${s.name} at $${rm.price.toFixed(1)}k — fat margins, ${pct}% share. Brand is doing the heavy lifting.`;
    } else if (pct >= 38 && mover.persona === 'performance') {
      headline = `<b>${mover.name}</b> locks up ${s.name} — ${ENGINES[rm.engId].name} at $${rm.price.toFixed(1)}k, ${pct}% share. The V8 bet is paying off.`;
    } else if (pct >= 38) {
      headline = `<b>${mover.name}</b> dominates ${s.name} — ${ENGINES[rm.engId].name} at $${rm.price.toFixed(1)}k, ${pct}% share.`;
    } else if (pct <= 14 && mover.persona === 'value') {
      headline = `<b>${mover.name}</b> is bleeding share in ${s.name} (${pct}%) — dropped to $${rm.price.toFixed(1)}k. Still undercutting, still losing ground.`;
    } else if (pct <= 14 && mover.persona === 'premium') {
      headline = `<b>${mover.name}</b> is thin in ${s.name} (${pct}%) — holding $${rm.price.toFixed(1)}k despite the slide. Won't chase volume.`;
    } else if (pct <= 14 && mover.persona === 'performance') {
      headline = `<b>${mover.name}</b> is off the pace in ${s.name} (${pct}%) — ${ENGINES[rm.engId].name} at $${rm.price.toFixed(1)}k isn't pulling buyers.`;
    } else if (pct <= 14) {
      headline = `<b>${mover.name}</b> is bleeding share in ${s.name} (${pct}%) — slashed to $${rm.price.toFixed(1)}k.`;
    } else if (mover.persona === 'value' && rm.price < s.refPrice * 0.92) {
      headline = `<b>${mover.name}</b> undercuts the field in ${s.name} — $${rm.price.toFixed(1)}k, ${pct}% share. They're buying it one margin point at a time.`;
    } else if (mover.persona === 'premium' && rm.price > s.refPrice * 1.2) {
      headline = `<b>${mover.name}</b> prices its ${s.name} ${ENGINES[rm.engId].name} at $${rm.price.toFixed(1)}k — premium positioning, ${pct}% share.`;
    } else if (mover.persona === 'performance' && (rm.engId === 'V8' || rm.engId === 'V12')) {
      headline = `<b>${mover.name}</b> doubles down on the ${ENGINES[rm.engId].name} in ${s.name} — $${rm.price.toFixed(1)}k, ${pct}% share. Efficiency be damned.`;
    } else {
      headline = `<b>${mover.name}</b> holds ${s.name} at $${rm.price.toFixed(1)}k (${pct}% share).`;
    }
    ev.push(headline);
  }

  // result line, with the dividend sweep surfaced when it fires
  const pl = st.lastProfit;
  let result = `Q result: <b>${pl>=0?'+':''}$${Math.round(pl)}M</b> · cash $${Math.round(player.cash)}M`;
  if (st.lastDividend > 0) result += ` (returned $${st.lastDividend}M to shareholders)`;
  result += '.';
  ev.push(result);

  st.log.unshift({ label:`Q${st.quarter}'${String(st.year).slice(2)}`, html:ev.join(' '), next:ins.next, nextRoute:ins.nextRoute });
  if (st.log.length > 8) st.log.pop();
}

// ── objectives ────────────────────────────────────────────────────────────────
// Selectable victory conditions. The objective stored on state is pure data
// (so it serialises for save/load); all logic lives in these functions keyed
// by objective id.
const OBJECTIVES = {
  share:       { id:'share',       name:'Market Leader',      blurb:'Reach 33% overall market share by 2000 — out-build the field.' },
  volume:      { id:'volume',      name:'Volume King',        blurb:'Sell 7 million cars (cumulative) by 2000 — a high-volume value play.' },
  performance: { id:'performance', name:'Performance Legend', blurb:'Brand 70+ and 25% of the Coupe segment by 2000 — a halo brand.' },
  fullline:    { id:'fullline',    name:'Full-Line Automaker',blurb:'All four segments, brand 62+, 25% share, profitable, by 2000.' },
  tech:        { id:'tech',        name:'Electric Pioneer',   blurb:'Field a Hybrid and an EV and hold 25% share — by 2005 (the long game).' },
};

function makeObjective(id) {
  const base = { id, deadlineYear:2000, deadlineQuarter:4 };
  if (id === 'share')  base.targetShare = 0.33;     // responsive curve → higher ceilings
  if (id === 'volume') base.targetUnits = 7000;     // thousands of cars (7M) sold cumulatively
  if (id === 'tech')   base.deadlineYear = 2005;    // longer horizon so Hybrid/EV matter
  return base;
}

function coupeShareOf(st, coId) {
  const sh = segShares('coupe', st)[coId];
  return sh ? sh.share : 0;
}
function hasEngine(p, engId) { return p.models.some(m => m.active && m.engId === engId); }

function objectiveMet(st) {
  const p = st.companies.find(c=>c.player);
  const o = st.objective;
  switch (o.id) {
    // Volume King: raw cumulative units — rewards a high-volume value/capacity play,
    // not share. A premium low-volume maker can't reach it.
    case 'volume':      return st.totalUnits >= (o.targetUnits || 7000);
    case 'performance': return p.brand >= 0.70 && coupeShareOf(st, 'you') >= 0.25;
    case 'fullline': {
      // breadth + maturity: present in all four is necessary but not sufficient —
      // a 62+ brand (reputation takes years to build) keeps this from being won by
      // an early land-grab.
      const segs = new Set(p.models.filter(m=>m.active).map(m=>m.segId));
      return segs.size >= 4 && st.lastOverall >= 0.25 && st.lastProfit >= 0 && p.brand >= 0.62;
    }
    // Electric Pioneer: must actually adopt the late-era powertrains (Hybrid '97,
    // EV '01) and still hold a quarter of the market — a long-horizon tech goal.
    case 'tech':        return hasEngine(p,'hybrid') && hasEngine(p,'ev') && st.lastOverall >= 0.25;
    case 'share':
    default:            return st.lastOverall >= (o.targetShare || 0.33);
  }
}

// Banner-friendly progress readout for the current objective.
function objectiveStatus(st) {
  const p = st.companies.find(c=>c.player);
  const o = st.objective;
  const now = st.lastOverall * 100;
  const meta = OBJECTIVES[o.id] || OBJECTIVES.share;
  const tick = v => v ? '✓' : '✗';
  let detail;
  switch (o.id) {
    case 'volume':
      detail = `Cars sold <b>${(st.totalUnits/1000).toFixed(2)}M</b> / ${((o.targetUnits||7000)/1000).toFixed(0)}M`;
      break;
    case 'performance':
      detail = `Brand <b>${Math.round(p.brand*100)}</b>/70 · Coupe <b>${Math.round(coupeShareOf(st,'you')*100)}</b>%/25%`;
      break;
    case 'fullline': {
      const segs = new Set(p.models.filter(m=>m.active).map(m=>m.segId)).size;
      detail = `Segments <b>${segs}</b>/4 · Brand <b>${Math.round(p.brand*100)}</b>/62 · Share <b>${now.toFixed(1)}</b>%/25% · ${st.lastProfit>=0?'profitable':'<b>unprofitable</b>'}`;
      break;
    }
    case 'tech':
      detail = `Hybrid <b>${tick(hasEngine(p,'hybrid'))}</b> · EV <b>${tick(hasEngine(p,'ev'))}</b> · Share <b>${now.toFixed(1)}</b>%/25%`;
      break;
    default:
      detail = `Share <b>${now.toFixed(1)}</b>% / ${Math.round((o.targetShare||0.33)*100)}%`;
  }
  return { name: meta.name, detail, met: objectiveMet(st) };
}

// End-of-run recap: the best-selling nameplate, the decisive factor, and a
// one-line "story of your company". Pure data → text; rendered by the shell.
function endRecap(st) {
  const p = st.companies.find(c=>c.player);
  const active = p.models.filter(m=>m.active);
  const best = p.models.slice().sort((a,b)=>(b.totalUnits||0)-(a.totalUnits||0))[0];
  const bestSeller = best && best.totalUnits > 0
    ? { label:`${ENGINES[best.engId].name} ${getSeg(best.segId).name}`, units:Math.round(best.totalUnits) }
    : null;

  const share = st.lastOverall * 100;
  const fieldBrandMax = Math.max(...st.companies.filter(c=>!c.player).map(c=>c.brand));
  const brandLeads = p.brand >= fieldBrandMax;
  const halo = active.find(m => m.segId==='coupe' && (m.engId==='V8'||m.engId==='V12'));
  let bestSeg = null;
  SEGS.forEach(s => { const sh = segShares(s.id, st)['you']; if (sh && (!bestSeg || sh.share>bestSeg.sh)) bestSeg = { name:s.name, sh:sh.share }; });

  let decisive;
  if (st.overReason === 'bankrupt') {
    decisive = `costs outran the cars you could sell — the books went red`;
  } else if (st.overReason === 'timeout') {
    decisive = bestSeg ? `your ${bestSeg.name} carried you, but the field kept pace` : `the field kept pace`;
  } else {
    if (st.objective.id === 'volume')      decisive = `relentless volume — ${(st.totalUnits/1000).toFixed(1)}M cars out the door`;
    else if (st.objective.id === 'tech')   decisive = `an early, decisive bet on hybrid and electric`;
    else if (halo && brandLeads)           decisive = `a commanding halo brand built on your V8 coupe`;
    else if (bestSeg && bestSeg.sh > 0.42) decisive = `dominance in ${bestSeg.name} (${Math.round(bestSeg.sh*100)}% of the segment)`;
    else if (brandLeads)                   decisive = `the strongest brand in the market`;
    else                                   decisive = `a broad, well-developed full line`;
  }

  const descriptor = share>=32 ? 'market leader' : share>=26 ? 'major automaker' : share>=16 ? 'mid-tier maker' : 'niche player';
  let story;
  if (st.overReason === 'bankrupt') {
    story = `Founded in 1990, ${p.name} overreached and folded in ${st.year} — ${decisive}.`;
  } else if (st.won) {
    story = `Founded in 1990, ${p.name} grew into a ${share.toFixed(0)}% ${descriptor} by ${st.year}` +
            (bestSeller ? `, carried by the ${bestSeller.label}` : '') + `.`;
  } else {
    story = `Founded in 1990, ${p.name} stalled as a ${share.toFixed(0)}% ${descriptor} by ${st.year} — ${decisive}.`;
  }

  return { bestSeller, decisive, story };
}

// ── new game ──────────────────────────────────────────────────────────────────
function newGame(seed, objectiveId) {
  seed = ((seed||0) || Math.floor(Math.random()*0xFFFFFF)) >>> 0;
  const st = {
    seed, rngState: seed,
    year: C.startYear, quarter: 1, tick: 0,
    companies: [
      { id:'you',   name:'Your Co.',  hex:'#377BF8', player:true,  persona:'player',
        brand:0.44, cash:C.startCash, rd:{eng:0,eff:0,mfg:0}, factory:{capacity:C.capacityStart},
        models:[], launchedSegs:{}, lastShareOverall:0 },
      // Rivals are abstract incumbents — the economy never reads a rival
      // factory, so they carry no capacity field (no unused/fake data).
      { id:'velo',  name:'Velo',      hex:'#F2A33C', player:false, persona:'value',
        brand:0.38, cash:320, rd:{eng:70,eff:120,mfg:150},
        models:[], lastShareOverall:0 },
      { id:'crown', name:'Crownmark', hex:'#C45E78', player:false, persona:'premium',
        brand:0.65, cash:350, rd:{eng:200,eff:50,mfg:180},
        models:[], lastShareOverall:0 },
      { id:'nuvo',  name:'Nuvo',      hex:'#3FB8AF', player:false, persona:'performance',
        brand:0.54, cash:320, rd:{eng:320,eff:45,mfg:90},
        models:[], lastShareOverall:0 },
    ],
    history:[], log:[], lastProfit:0, lastUnits:0, lastOverall:0.25,
    lastCapFill:1, lastDemand:0, lastOverhead:0, lastDividend:0,
    demandMult:{ sedan:1, suv:1, pickup:1, coupe:1 }, costShockMult:1, lastEvents:[], lastEventTags:[],
    over:false, won:false, overReason:null, score:null,
    totalUnits:0, peakShare:0, lastHaloBonus:0, launchFlow:true,
    objective: makeObjective(objectiveId || 'share'),
  };

  // rivals seed all four segments
  st.companies.filter(c=>!c.player).forEach(co => {
    const per = PERSONAS[co.persona];
    SEGS.forEach(s => {
      const eng = per.prefEng[s.id];
      if (!eng||!ENGINES[eng].fits.includes(s.id)||st.year<ENGINES[eng].unlock) return;
      co.models.push(makeModel(s.id, eng, per.prefTrim, co.persona));
    });
    applyRD(co);
  });

  recordHistory(st);
  st.peakShare = st.lastOverall;
  st.log.push({ label:`Q1'${String(C.startYear).slice(2)}`, html:`<b>Founded.</b> Choose your launch model. Rivals are already competing in all four segments.` });
  return st;
}

return { newGame, advance, segShares, playerDesign, playerRefresh, playerRetire,
         quoteDesign, objectiveStatus, objectiveMet, makeObjective, OBJECTIVES, endRecap,
         SEGS, ENGINES, TRIMS, C };
})();
</script>
<script>
/* marque-world.js — MARQUE campus builder (PART B, v2 architecture slice)
 *
 * The WORLD owns campus state: an isometric grid of placed buildings, selection,
 * placement, and rendering. It never runs the economy and never mutates sim
 * internals. The only thing it hands the economy is a derived input bundle via
 * deriveCampusInputs(); the shell applies that to the sim at quarter advance.
 *
 * Money: the world never touches sim state. To pay for a build it asks the shell
 * through the onSpend() callback (which deducts player cash and returns success).
 *
 * Headless-safe: all campus logic is pure functions over a plain campus object,
 * and step(dt) is decoupled from requestAnimationFrame, so the campus can be
 * tested and stepped without a DOM (rAF is frozen in hidden tabs).
 *
 * Tonight's catalog: the Assembly Plant only. Its level sets production capacity,
 * which is the one campus input the sim actually consumes this build.
 */

window.MarqueWorld = (() => {
'use strict';

// ── grid + catalog ───────────────────────────────────────────────────────────
const GRID_W = 14, GRID_D = 10;     // tiles — roomy campus that sprawls over the years
const BASE_CAPACITY = 60;           // k units/q with no plants (a starter line)

const CATALOG = {
  assembly: {
    type:'assembly', name:'Assembly Plant', w:4, d:3, maxLevel:2, color:'#6E7681',
    levels: [
      null,                                 // index 0 unused (levels are 1-based)
      { capacity:120, placeCost:210, h:0.9 },   // L1 — modest
      { capacity:240, upgradeCost:180, h:1.4 }, // L2 — meaningfully higher
    ],
  },
  // The Design Studio is where models are developed. It feeds the sim NO capacity;
  // its only campus input is presence/level, reported by deriveCampusInputs and
  // consumed by the shell to gate (and sweeten) the car-design flow.
  studio: {
    type:'studio', name:'Design Studio', w:3, d:2, maxLevel:2, color:'#7C6FD6',
    levels: [
      null,
      { placeCost:140, h:0.8 },     // L1 — one project at a time, normal cost
      { upgradeCost:150, h:1.2 },   // L2 — cheaper refreshes (shell applies the perk)
    ],
  },
  // The R&D Lab boosts Powertrain research (quality + recall risk reduction).
  // It feeds the sim via rdBonuses.eng in deriveCampusInputs; the shell adds
  // that bonus to the player's quarterly Powertrain R&D spend before advance().
  // Sim is untouched — it just receives a larger rd.eng value.
  rdlab: {
    type:'rdlab', name:'R&D Lab', w:3, d:2, maxLevel:2, color:'#3B8EA5',
    levels: [
      null,
      { placeCost:180, h:0.85 },   // L1 — +30M/q Powertrain R&D equivalent
      { upgradeCost:160, h:1.25 }, // L2 — +60M/q Powertrain R&D equivalent
    ],
  },
  // Test Track — adds Eng R&D equivalent each quarter (perf boost + recall risk
  // reduction via quality). L2 amplifies the coupe halo (noted in shell).
  testtrack: {
    type:'testtrack', name:'Test Track', w:4, d:2, maxLevel:2, color:'#C87941',
    levels: [
      null,
      { placeCost:160, h:0.55 },   // L1 — +25M/q Eng R&D equivalent
      { upgradeCost:140, h:0.65 }, // L2 — +50M/q; coupe halo amplified in shell
    ],
  },
  // Quality Center — boosts Reliability R&D each quarter; presence enables a
  // per-recall warranty cash offset applied by the shell post-advance.
  qualitycenter: {
    type:'qualitycenter', name:'Quality Center', w:2, d:2, maxLevel:2, color:'#4E9A6E',
    levels: [
      null,
      { placeCost:140, h:0.7 },    // L1 — +25M/q Reliability R&D; $15M recall warranty
      { upgradeCost:130, h:1.0 },  // L2 — +50M/q; $30M recall warranty
    ],
  },
};

// ── pure campus logic (no canvas, headless-testable) ──────────────────────────
function def(type){ return CATALOG[type]; }

function freshCampus(){
  // Start with one L1 assembly plant already standing, so baseline capacity is
  // BASE_CAPACITY + 120 = 180k — exactly the sim's old capacityStart, keeping the
  // balance intact. The founding plant is free (it's the plant you start with).
  const campus = { objects:[], selectedId:null, cashSpentOnCampus:0, nextId:1 };
  campus.objects.push({ id:campus.nextId++, type:'assembly', x:1, y:2, level:1,
                        state:'operating', lastOutput:0 });
  return campus;
}

function footprintOf(o){ const d=def(o.type); return { x:o.x, y:o.y, w:d.w, d:d.d }; }
function rectsOverlap(a,b){ return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.d && a.y+a.d > b.y; }

function inBounds(type,x,y){
  const d=def(type);
  return x>=0 && y>=0 && x+d.w<=GRID_W && y+d.d<=GRID_D;
}
function collides(campus,type,x,y,ignoreId){
  const d=def(type), cand={x,y,w:d.w,d:d.d};
  return campus.objects.some(o=> o.id!==ignoreId && rectsOverlap(cand, footprintOf(o)));
}
function canPlace(campus,type,x,y){ return inBounds(type,x,y) && !collides(campus,type,x,y,null); }

function placeCostOf(type){ return def(type).levels[1].placeCost; }
function upgradeCostOf(o){
  const d=def(o.type);
  return o.level>=d.maxLevel ? null : d.levels[o.level+1].upgradeCost;
}
function capacityOf(o){
  return (o.type==='assembly' && o.state==='operating') ? def(o.type).levels[o.level].capacity : 0;
}

// THE ADAPTER (B4): campus state → sim inputs. `capacity` and `rdBonuses` (all three
// branches) are consumed by the shell; the rest are placeholders for future buildings.
function deriveCampusInputs(campus){
  let capacity = BASE_CAPACITY;
  let studioPresent = false, studioLevel = 0;
  let testTrackLevel = 0, qcLevel = 0;
  const rdBonuses = { eng:0, eff:0, mfg:0 };
  campus.objects.forEach(o => {
    capacity += capacityOf(o);
    if(o.type==='studio'){     studioPresent = true; if(o.level>studioLevel) studioLevel = o.level; }
    if(o.type==='rdlab'){
      const bonus = (o.level >= 2 ? 60 : 30);
      const focus = o.labFocus || 'eng';
      rdBonuses[focus] = (rdBonuses[focus]||0) + bonus;
    }
    if(o.type==='testtrack')    testTrackLevel = Math.max(testTrackLevel, o.level);
    if(o.type==='qualitycenter') qcLevel        = Math.max(qcLevel, o.level);
  });
  if(testTrackLevel > 0) rdBonuses.eng = (rdBonuses.eng||0) + (testTrackLevel >= 2 ? 50 : 25);
  if(qcLevel > 0)        rdBonuses.eff = (rdBonuses.eff||0) + (qcLevel >= 2 ? 50 : 25);
  return { capacity, designStudio:{ present:studioPresent, level:studioLevel },
           rdBonuses, testTrackLevel,
           qualityCenter:{ level:qcLevel, warrantyCash: qcLevel>=2 ? 30 : qcLevel>=1 ? 15 : 0 },
           segmentUnlocks:[], brandBonus:0, manufacturingBonus:0 };
}

// mutating ops — pure over (campus, cash). cashSpentOnCampus is a campus-local
// tally; the actual sim cash deduction is the shell's job via onSpend().
function place(campus, type, x, y, cash){
  if(!inBounds(type,x,y))             return { ok:false, reason:'Out of bounds.' };
  if(collides(campus,type,x,y,null))  return { ok:false, reason:'Overlaps another building.' };
  const cost = placeCostOf(type);
  if(cash < cost)                     return { ok:false, reason:'Not enough cash.' };
  const o = { id:campus.nextId++, type, x, y, level:1, state:'operating', lastOutput:0 };
  if(type==='rdlab') o.labFocus = 'eng';   // default focus: Powertrain
  campus.objects.push(o);
  campus.cashSpentOnCampus += cost;
  return { ok:true, cost, id:o.id };
}
function upgrade(campus, id, cash){
  const o = campus.objects.find(o=>o.id===id);
  if(!o)                return { ok:false, reason:'No such building.' };
  const cost = upgradeCostOf(o);
  if(cost==null)        return { ok:false, reason:'Already at max level.' };
  if(cash < cost)       return { ok:false, reason:'Not enough cash.' };
  o.level++; campus.cashSpentOnCampus += cost;
  return { ok:true, cost, level:o.level };
}
function canDemolish(campus, id){
  const o = campus.objects.find(o=>o.id===id); if(!o) return false;
  if(o.type!=='assembly') return true;   // only plants are protected; studios are free to remove
  // "demolish-if-safe": you must keep at least one assembly plant standing.
  return campus.objects.filter(x=>x.type==='assembly').length > 1;
}
function demolish(campus, id){
  if(!canDemolish(campus,id)) return { ok:false, reason:'You must keep at least one plant.' };
  campus.objects = campus.objects.filter(o=>o.id!==id);
  if(campus.selectedId===id) campus.selectedId = null;
  return { ok:true };
}

// readout only: split last quarter's built units across plants by capacity share.
function applyProduction(campus, totalUnits){
  const inputs = deriveCampusInputs(campus);
  campus.objects.forEach(o=>{
    if(o.type==='assembly'){
      o.lastOutput = inputs.capacity>0
        ? +(totalUnits * (capacityOf(o)/inputs.capacity)).toFixed(1) : 0;
    }
  });
}

// ── stateful layer (canvas + interaction) ────────────────────────────────────
let cv, ctx, W=0, H=0, DPR=1;
let campus = freshCampus();
let opts = {};                 // { menuEl, inspectorEl, getCash, onSpend, onChange, ... }
let buildType = null;          // current build-mode type, or null
let ghost = { x:0, y:0, on:false };
let hoverId = null;
let wT = 0, rafId = 0;

// ── factory animation state ──────────────────────────────────────────────────
let factorySimState = null;
const BS_COLORS_WORLD = { sedan:'#E8584B', suv:'#3F8EE0', pickup:'#46B97A', coupe:'#8E6BD8' };

// post-advance production burst: counts down for 2.5s after triggerBurst()
let burstT = 0;
let burstMag = 1;   // burst intensity, scaled by how strong production was this quarter

// ── ambient campus agents (workers + forklift + finished cars) ────────────────
// Density and motion scale with real sim output (units built, utilization): a
// booming quarter teems with workers, forklifts, and cars rolling out; a capped
// or failing one looks sparse. Presentation only — never touches sim state.
let agents = [], agentCampusStamp = -1;
let cars = [], carSpawnT = 0;

// ── iso projection (with user pan + zoom) ────────────────────────────────────
const TW=46, TH=23, ZS=20;
let view = { ox:0, oy:0, sc:1 };
let panX = 0, panY = 0, zoom = 1;              // user QoL transform layered on fit()
function effOx(){ return view.ox + panX; }
function effOy(){ return view.oy + panY; }
function effSc(){ return view.sc * zoom; }
function resize(){
  if(!cv) return;
  DPR = Math.min(window.devicePixelRatio||1, 2);
  W = cv.clientWidth; H = cv.clientHeight;
  cv.width = W*DPR; cv.height = H*DPR;
  ctx.setTransform(DPR,0,0,DPR,0,0);
}
function fit(){
  // Frame the whole iso grid. In screen space, (x-y) spans [-GRID_D, GRID_W] and
  // (x+y) spans [0, GRID_W+GRID_D]; compute the scale that fits both with margins,
  // then centre the grid's midpoint, so framing stays sensible at any grid size.
  const toolbarH = 96;   // build-menu band overlaps the canvas bottom — keep clear
  const topH = 34;       // live ticker band along the top — keep clear
  const gridWpx = (GRID_W + GRID_D) * (TW / 2);   // screen width span at scale 1
  const gridHpx = (GRID_W + GRID_D) * (TH / 2);   // screen height span at scale 1
  const availW = W * 0.94;
  const availH = (H - toolbarH - topH) * 0.94;
  view.sc = clamp(Math.min(availW / gridWpx, availH / gridHpx), 0.35, 1.5);
  const sc = effSc();
  // centre (x-y) midpoint = (GRID_W-GRID_D)/2 at W/2
  view.ox = Math.round(W * 0.5 - (GRID_W - GRID_D) * (TW / 4) * sc);
  // centre (x+y) midpoint vertically in the band between ticker and toolbar
  const gridH = (GRID_W + GRID_D) * (TH / 2) * sc;
  view.oy = Math.max(topH, Math.round(topH + (H - toolbarH - topH - gridH) / 2));
}
function iso(x,y,z){
  const sc = effSc();
  return { x: effOx() + (x-y)*(TW/2)*sc,
           y: effOy() + (x+y)*(TH/2)*sc - (z||0)*ZS*sc };
}
// screen → tile (top-left of footprint cell under the cursor)
function screenToTile(sx,sy){
  const sc = effSc();
  const a = (sx-effOx())/((TW/2)*sc), b = (sy-effOy())/((TH/2)*sc);
  return { x: Math.floor((a+b)/2), y: Math.floor((b-a)/2) };
}

// ── colour helpers ───────────────────────────────────────────────────────────
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
function shade(hex,amt){
  const n=parseInt(hex.slice(1),16);
  const r=clamp(((n>>16)&255)+amt,0,255)|0, g=clamp(((n>>8)&255)+amt,0,255)|0, b=clamp((n&255)+amt,0,255)|0;
  return `rgb(${r},${g},${b})`;
}
function quad(a,b,c,d){ ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.lineTo(c.x,c.y); ctx.lineTo(d.x,d.y); ctx.closePath(); ctx.fill(); }
function tile(x,y,fill,stroke){
  const a=iso(x,y,0),b=iso(x+1,y,0),c=iso(x+1,y+1,0),d=iso(x,y+1,0);
  ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.lineTo(c.x,c.y); ctx.lineTo(d.x,d.y); ctx.closePath();
  ctx.fillStyle=fill; ctx.fill();
  if(stroke){ ctx.strokeStyle=stroke; ctx.lineWidth=1; ctx.stroke(); }
}
function prism(x,y,w,d,h,col,opt){
  opt=opt||{};
  const top=opt.top||col, right=opt.right||shade(col,-24), left=opt.left||shade(col,-48);
  let A,B,C,D;
  A=iso(x+w,y,0); B=iso(x+w,y+d,0); C=iso(x+w,y+d,h); D=iso(x+w,y,h); ctx.fillStyle=right; quad(A,B,C,D);
  A=iso(x,y+d,0); B=iso(x+w,y+d,0); C=iso(x+w,y+d,h); D=iso(x,y+d,h); ctx.fillStyle=left; quad(A,B,C,D);
  A=iso(x,y,h); B=iso(x+w,y,h); C=iso(x+w,y+d,h); D=iso(x,y+d,h); ctx.fillStyle=top; quad(A,B,C,D);
  if(opt.outline){ ctx.strokeStyle=opt.outline; ctx.lineWidth=opt.outlineW||1.4; ctx.stroke(); }
}

// ── factory animation + ambient agents ──────────────────────────────────────
function setSimState(state){ factorySimState = state; }

// Real sim-derived activity: how hard the factory is running this quarter.
// util = units built / total capacity → 0 (idle/failing) … 1 (flat out).
function simActivity(){
  let units=0, util=0;
  if(factorySimState){
    units = factorySimState.lastUnits || 0;
    const cap = deriveCampusInputs(campus).capacity;
    util = cap>0 ? clamp(units/cap, 0, 1) : 0;
  }
  // a touch of baseline life even when idle, so the campus is never fully dead
  const busy = clamp(0.12 + util*0.88, 0, 1);
  return { units, util, busy };
}

const lerp=(a,b,t)=>a+(b-a)*t;
function plantList(){ return campus.objects.filter(o=>o.type==='assembly'); }
function tileOccupied(x,y){
  return campus.objects.some(o=>{ const d=def(o.type);
    return x>=o.x && x<o.x+d.w && y>=o.y && y<o.y+d.d; });
}
// the campus gate: cars roll out toward the right edge
function gatePoint(){ return { x: GRID_W-0.5, y: Math.round(GRID_D*0.5)+0.5 }; }
// finished-car colours: cycle the player's active-model bodystyle colours
function fleetColors(){
  const out=[];
  if(factorySimState){
    const player=factorySimState.companies&&factorySimState.companies.find(c=>c.player);
    if(player&&player.models) player.models.filter(m=>m.active).forEach(m=>{
      out.push(BS_COLORS_WORLD[m.segId]||'#377BF8');
    });
  }
  return out.length?out:['#377BF8'];
}

function stepAgents(dt){
  const act = simActivity();
  const tier = Math.round(act.busy*4);                 // 0..4 — quantised so we don't churn
  const bc = campus.objects.length;
  const stamp = bc + ':' + tier;
  if(stamp !== agentCampusStamp){
    agentCampusStamp = stamp;
    agents = [];
    // workers scale with both how built-out the campus is and how busy it is
    const workerN = Math.min(2 + bc + Math.round(act.busy*10), 38);
    for(let i=0;i<workerN;i++) agents.push({
      type:'worker', ph:Math.random()*6.28,
      x:0.5+Math.random()*(GRID_W-1), y:0.5+Math.random()*(GRID_D-1),
      tx:0.5+Math.random()*(GRID_W-1), ty:0.5+Math.random()*(GRID_D-1)
    });
    // forklifts buzz around the plants, more of them when output is high
    const plants = plantList();
    const forkN = Math.min(plants.length * (1 + Math.round(act.busy*2)), 12);
    for(let i=0;i<forkN;i++){
      const p = plants[i % plants.length] || {x:2,y:1};
      const pd = def(p.type||'assembly');
      agents.push({ type:'forklift', ph:0,
        x:p.x+Math.random()*pd.w, y:p.y+Math.random()*pd.d,
        tx:p.x+Math.random()*pd.w, ty:p.y+Math.random()*pd.d });
    }
  }
  const speedMul = 0.8 + act.busy*0.7;   // busier campus = faster motion
  agents.forEach(a=>{
    const dx=a.tx-a.x, dy=a.ty-a.y, dist=Math.hypot(dx,dy);
    if(dist<0.18){
      a.tx=0.5+Math.random()*(GRID_W-1);
      a.ty=0.5+Math.random()*(GRID_D-1);
    } else {
      const spd=(a.type==='forklift'?0.72:0.42)*speedMul;
      a.x+=dx/dist*spd*dt; a.y+=dy/dist*spd*dt;
    }
    a.ph+=dt*(a.type==='worker'?5.5:2.5)*speedMul;
  });

  // finished cars roll out of the plants toward the gate; spawn rate ∝ production,
  // and the burst right after Advance briefly floods the lot.
  const plants = plantList();
  if(plants.length && act.units>0){
    const burstBoost = burstT>0 ? (1.6 + burstMag) : 1;   // denser when the quarter's output was strong
    const interval = lerp(2.6, 0.35, act.busy) / burstBoost;
    const maxCars = Math.min(2 + Math.round(act.busy*16) + (burstT>0 ? Math.round(burstMag*6) : 0), 30);
    carSpawnT -= dt;
    if(carSpawnT<=0 && cars.length<maxCars){
      carSpawnT = interval*(0.6+Math.random()*0.8);
      const p = plants[Math.floor(Math.random()*plants.length)];
      const pd = def(p.type);
      const cols = fleetColors();
      cars.push({ type:'car',
        x:p.x+pd.w*0.5, y:p.y+pd.d*0.5,
        tx:gatePoint().x, ty:gatePoint().y,
        color:cols[Math.floor(Math.random()*cols.length)] });
    }
  }
  for(let i=cars.length-1;i>=0;i--){
    const c=cars[i], dx=c.tx-c.x, dy=c.ty-c.y, dist=Math.hypot(dx,dy);
    if(dist<0.4){ cars.splice(i,1); continue; }
    const spd=0.9*speedMul; c.x+=dx/dist*spd*dt; c.y+=dy/dist*spd*dt;
  }
}

function drawAgent(a){
  if(a.type==='worker'){
    const bob=Math.sin(a.ph)*0.014;
    const b=iso(a.x,a.y,0.06+bob), h=iso(a.x,a.y,0.23+bob);
    ctx.fillStyle='#E8B58A'; ctx.beginPath(); ctx.arc(h.x,h.y,2.2*effSc(),0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#F2B544'; ctx.beginPath(); ctx.arc(b.x,b.y,3.2*effSc(),0,Math.PI*2); ctx.fill();
  } else {
    const p=iso(a.x,a.y,0.08); const s=5*effSc();
    ctx.fillStyle='#377BF8'; ctx.fillRect(p.x-s,p.y-s*.5,s*2.1,s);
    ctx.fillStyle='#C8731A'; ctx.fillRect(p.x-s*.4,p.y-s*.5,s*.8,s*.8);
  }
}

// a small finished car (driving or parked), coloured by bodystyle
function drawSmallCar(x,y,color){
  const p=iso(x,y,0.05); const s=3.4*effSc();
  ctx.fillStyle='rgba(0,0,0,0.28)';
  ctx.beginPath(); ctx.ellipse(p.x,p.y+s*0.5,s*1.25,s*0.55,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=color; ctx.fillRect(p.x-s,p.y-s*0.62,s*2,s*1.05);
  ctx.fillStyle='rgba(255,255,255,0.30)'; ctx.fillRect(p.x-s*0.55,p.y-s*0.5,s*1.1,s*0.4);
}

// finished-goods lot: cars accumulate on the paved apron, count ∝ recent output
function drawParkedCars(){
  const act = simActivity();
  const want = Math.min(Math.round(act.units/12), 26);
  if(want<=0) return;
  const dev = developedTiles();
  const free = [];
  dev.forEach(k=>{ const [x,y]=k.split(',').map(Number); if(!tileOccupied(x,y)) free.push({x,y}); });
  free.sort((a,b)=> (a.y-b.y)||(a.x-b.x));
  const cols = fleetColors();
  let placed=0;
  for(const t of free){
    for(let s=0;s<2 && placed<want;s++){
      drawSmallCar(t.x+0.32+s*0.4, t.y+0.55, cols[placed % cols.length]);
      placed++;
    }
    if(placed>=want) break;
  }
}

// does the player have any active recall this quarter? (read-only — for warnings)
function simHasRecall(){
  if(!factorySimState) return false;
  const p = factorySimState.companies && factorySimState.companies.find(c=>c.player);
  return !!(p && p.models && p.models.some(m=>m.active && m.recallQ>0));
}

// rounded-rect path helper (canvas)
function roundRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath();
}

// in-map badge floating over the Design Studio while a car is in development (Task 2).
// The active project lives in game state (factorySimState.studioProject, read-only here).
function drawStudioBadge(o, d, lv, proj){
  const sc=effSc();
  const anchor=iso(o.x+d.w/2, o.y-0.05, lv.h+1.05);
  const name=proj.nameplate || 'New model';
  const sub=(proj.segName||'') + ' · ' + proj.quartersLeft + 'q left';
  ctx.save();
  ctx.font=`700 ${Math.round(10*sc)}px Archivo,system-ui,sans-serif`;
  const w1=ctx.measureText(name).width;
  ctx.font=`500 ${Math.round(8.5*sc)}px Archivo,system-ui,sans-serif`;
  const w2=ctx.measureText(sub).width;
  const bw=Math.max(w1,w2,54*sc)+16*sc, bh=32*sc;
  const bx=anchor.x-bw/2, by=anchor.y-bh;
  // connector stem down to the roof
  ctx.strokeStyle='rgba(124,111,214,.7)'; ctx.lineWidth=1.2*sc;
  ctx.beginPath(); ctx.moveTo(anchor.x, by+bh); ctx.lineTo(anchor.x, anchor.y+6*sc); ctx.stroke();
  // panel
  roundRect(bx,by,bw,bh,6*sc);
  ctx.fillStyle='rgba(26,29,36,.94)'; ctx.fill();
  ctx.strokeStyle='#7C6FD6'; ctx.lineWidth=1.3*sc; ctx.stroke();
  ctx.textAlign='center';
  ctx.fillStyle='#ECEEF1'; ctx.font=`700 ${Math.round(10*sc)}px Archivo,system-ui,sans-serif`;
  ctx.fillText(name, anchor.x, by+12*sc);
  ctx.fillStyle='#a89bf0'; ctx.font=`500 ${Math.round(8.5*sc)}px Archivo,system-ui,sans-serif`;
  ctx.fillText(sub, anchor.x, by+22*sc);
  // progress bar
  const pw=bw-12*sc, px=bx+6*sc, py=by+bh-5*sc;
  const prog=proj.totalQuarters ? clamp(1-proj.quartersLeft/proj.totalQuarters,0,1) : 0;
  ctx.fillStyle='rgba(255,255,255,.12)'; ctx.fillRect(px,py,pw,2.6*sc);
  ctx.fillStyle='#7C6FD6'; ctx.fillRect(px,py,pw*prog,2.6*sc);
  ctx.restore();
}

function drawBuildingAnimated(o){
  const d=def(o.type), lv=d.levels[o.level];
  if(o.type==='assembly'){
    const cap=capacityOf(o);
    const util=cap>0?Math.min(o.lastOutput/cap,1):0;
    const beltD=o.y+d.d*0.42, beltH=lv.h*0.82;

    // read sim state once
    let player=null, hasRecall=false, isCapped=false, isStale=false, carColor='#377BF8';
    if(factorySimState){
      player=factorySimState.companies&&factorySimState.companies.find(c=>c.player);
      if(player){
        const active=player.models&&player.models.filter(x=>x.active)||[];
        hasRecall=active.some(m=>m.recallQ>0);
        isStale=active.some(m=>m.novelty<0.36);
        const lastM=active.slice(-1)[0];
        if(lastM) carColor=BS_COLORS_WORLD[lastM.segId]||'#377BF8';
        isCapped=(factorySimState.lastCapFill!=null&&factorySimState.lastCapFill<0.97);
      }
    }

    // stale → desaturate car color to dusty amber
    const drawColor = isStale ? '#998870' : carColor;

    // draw util is boosted during the post-advance burst
    const inBurst = burstT > 0;
    const burstAlpha = inBurst ? Math.min(1, burstT) : 0;
    const drawUtil = inBurst ? Math.max(util, 0.18 + burstAlpha * 0.5) : util;

    if(drawUtil>0){
      // conveyor belt
      const bl=iso(o.x+0.22,beltD,beltH), br=iso(o.x+d.w-0.22,beltD,beltH);
      ctx.strokeStyle='rgba(80,90,105,0.65)'; ctx.lineWidth=2.2*effSc();
      ctx.beginPath(); ctx.moveTo(bl.x,bl.y); ctx.lineTo(br.x,br.y); ctx.stroke();

      // belt cars — more during burst, speed tied to wT
      const beltSpeed = inBurst ? 0.38 + burstAlpha*0.22 : 0.28;
      const nCars=Math.max(1, Math.round(drawUtil*(inBurst?4:3)));
      for(let i=0;i<nCars;i++){
        const ph=((wT*beltSpeed+i/nCars)%1);
        const cx=o.x+0.25+(d.w-0.5)*ph;
        const cp=iso(cx,beltD,beltH+0.09);
        const r=4.5*effSc();
        ctx.fillStyle=drawColor; ctx.strokeStyle='rgba(0,0,0,.35)'; ctx.lineWidth=0.9;
        ctx.beginPath(); ctx.arc(cp.x,cp.y,r,0,Math.PI*2); ctx.fill(); ctx.stroke();
      }

      // burst: car dots streaming OUT of belt exit toward grid edge (1–2s)
      if(inBurst && util>0){
        for(let i=0;i<3;i++){
          const ph=((2.5-burstT)*0.65+i/3)%1;
          const cx=o.x+d.w-0.15+ph*1.8, cy=beltD+ph*0.6;
          const fp=iso(cx,cy,beltH+0.09);
          const r=3.5*effSc()*(1-ph*0.55);
          ctx.fillStyle=drawColor; ctx.globalAlpha=0.85*(1-ph);
          ctx.beginPath(); ctx.arc(fp.x,fp.y,r,0,Math.PI*2); ctx.fill();
          ctx.globalAlpha=1;
        }
      }
    }

    // ── sim-state overlays (draw regardless of util) ──────────────────────

    // recall ⚠ — pulsing red glyph above the building roof
    if(hasRecall){
      const pulse=0.5+Math.sin(wT*4.8)*0.5;
      const rp=iso(o.x+d.w*0.5,o.y+d.d*0.5,lv.h+0.55);
      ctx.save();
      ctx.globalAlpha=0.6+pulse*0.35;
      ctx.fillStyle='#E5605E';
      ctx.font=`bold ${Math.round(15*effSc())}px sans-serif`;
      ctx.textAlign='center';
      ctx.fillText('⚠',rp.x,rp.y);
      ctx.restore();
    }

    // bottleneck/capped — stacked red dots piling at belt exit + "FULL" label
    if(isCapped){
      const exitP=iso(o.x+d.w-0.05,beltD+0.18,beltH+0.09);
      for(let q=0;q<3;q++){
        const qx=exitP.x+(q*4.5)*effSc(), qy=exitP.y-(q*5.5)*effSc();
        ctx.fillStyle=`rgba(229,96,94,${0.82-q*0.22})`;
        ctx.strokeStyle='rgba(0,0,0,.3)'; ctx.lineWidth=0.7;
        ctx.beginPath(); ctx.arc(qx,qy,(3.5-q*0.4)*effSc(),0,Math.PI*2);
        ctx.fill(); ctx.stroke();
      }
      const lp=iso(o.x+d.w/2,o.y-0.12,lv.h+0.72);
      ctx.fillStyle='#E5605E';
      ctx.font=`600 ${Math.round(9*effSc())}px Archivo,system-ui,sans-serif`;
      ctx.textAlign='center';
      ctx.fillText('FULL',lp.x,lp.y);
    }

    // stale — dusty motes drifting upward from the roofline
    if(isStale){
      for(let p=0;p<4;p++){
        const ph=(wT*0.32+p*0.25)%1;
        const px=o.x+0.6+p*(d.w-1.2)/3, py=o.y+d.d*0.52;
        const pp=iso(px,py,lv.h*0.72+ph*0.95);
        const r=(1.8+ph)*effSc();
        ctx.globalAlpha=0.52*(1-ph);
        ctx.fillStyle='#9A8C7E';
        ctx.beginPath(); ctx.arc(pp.x,pp.y,r,0,Math.PI*2); ctx.fill();
        ctx.globalAlpha=1;
      }
    }

  } else if(o.type==='rdlab'){
    const pulse=(Math.sin(wT*1.8)*0.5+0.5);
    const p=iso(o.x+d.w/2,o.y+d.d/2,lv.h+0.22);
    const r=(6+pulse*5)*effSc();
    ctx.strokeStyle=`rgba(59,142,165,${0.22+pulse*0.44})`; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.arc(p.x,p.y,r,0,Math.PI*2); ctx.stroke();
    ctx.strokeStyle=`rgba(59,142,165,${0.07+pulse*0.14})`; ctx.lineWidth=0.8;
    ctx.beginPath(); ctx.arc(p.x,p.y,r+5*effSc(),0,Math.PI*2); ctx.stroke();
  } else if(o.type==='studio'){
    const proj = factorySimState && factorySimState.studioProject;
    const pulse=(Math.sin(wT*(proj?3.4:2.2))*0.5+0.5);   // pulses faster while a car is in development
    const p=iso(o.x+d.w/2,o.y,lv.h+0.32);
    ctx.fillStyle=`rgba(124,111,214,${0.42+pulse*0.38})`;
    ctx.beginPath(); ctx.arc(p.x,p.y,(2.8+pulse*2.2)*effSc(),0,Math.PI*2); ctx.fill();
    if(proj) drawStudioBadge(o, d, lv, proj);
  } else if(o.type==='testtrack'){
    // Animated speed lines — a short dash sweeping left-to-right over the track
    const sc=effSc(), ctr=iso(o.x+d.w/2, o.y+d.d/2, lv.h+0.12);
    const ph=((wT*0.8) % 1);
    const trackW=d.w*TW*sc*0.72, lineW=trackW*0.28;
    const x0=ctr.x - trackW/2 + ph*trackW;
    ctx.save();
    ctx.globalAlpha=0.55;
    ctx.strokeStyle='#F0B040'; ctx.lineWidth=2.2*sc;
    ctx.beginPath(); ctx.moveTo(x0,ctr.y); ctx.lineTo(Math.min(x0+lineW,ctr.x+trackW/2),ctr.y);
    ctx.stroke();
    ctx.globalAlpha=0.28;
    ctx.strokeStyle='#F0B040'; ctx.lineWidth=1.1*sc;
    const x1=ctr.x - trackW/2 + ((ph+0.55)%1)*trackW;
    ctx.beginPath(); ctx.moveTo(x1,ctr.y+2*sc); ctx.lineTo(Math.min(x1+lineW*0.7,ctr.x+trackW/2),ctr.y+2*sc);
    ctx.stroke();
    ctx.restore();
  } else if(o.type==='qualitycenter'){
    // Slow-pulsing green glow — steady quality signal
    const pulse=(Math.sin(wT*1.2)*0.5+0.5);
    const p=iso(o.x+d.w/2,o.y+d.d/2,lv.h+0.2);
    ctx.strokeStyle=`rgba(78,154,110,${0.22+pulse*0.38})`; ctx.lineWidth=1.8;
    ctx.beginPath(); ctx.arc(p.x,p.y,(5+pulse*4)*effSc(),0,Math.PI*2); ctx.stroke();
    ctx.strokeStyle=`rgba(78,154,110,${0.08+pulse*0.12})`; ctx.lineWidth=0.9;
    ctx.beginPath(); ctx.arc(p.x,p.y,(9+pulse*5)*effSc(),0,Math.PI*2); ctx.stroke();
    // a recall this quarter → temporary red ⚠ over the Quality Center (Task 7)
    if(simHasRecall()){
      const rpulse=0.5+Math.sin(wT*4.8)*0.5;
      const rp=iso(o.x+d.w/2,o.y+d.d/2,lv.h+0.62);
      ctx.save();
      ctx.globalAlpha=0.55+rpulse*0.4;
      ctx.fillStyle='#E5605E'; ctx.textAlign='center';
      ctx.font=`bold ${Math.round(15*effSc())}px sans-serif`;
      ctx.fillText('⚠', rp.x, rp.y);
      ctx.restore();
    }
  }
}

function buildTooltipHtml(o){
  const d=def(o.type), lv=d.levels[o.level];
  const cap=capacityOf(o);
  if(o.type==='assembly'){
    const util=cap>0?Math.round(clamp(o.lastOutput/cap,0,1)*100):0;
    return `<b>${d.name} L${o.level}</b> · ${cap}k cap · ${util}% util`;
  }
  if(o.type==='studio') return `<b>${d.name} L${o.level}</b> · click to see lineup &amp; price`;
  if(o.type==='rdlab'){
    const label={eng:'Powertrain',eff:'Reliability',mfg:'Manufacturing'}[o.labFocus||'eng'];
    return `<b>${d.name} L${o.level}</b> · +$${o.level>=2?60:30}M/q ${label}`;
  }
  if(o.type==='testtrack'){
    return `<b>${d.name} L${o.level}</b> · +$${o.level>=2?50:25}M/q Eng · perf &amp; recall risk ↓`;
  }
  if(o.type==='qualitycenter'){
    const wc = o.level>=2?30:15;
    return `<b>${d.name} L${o.level}</b> · +$${o.level>=2?50:25}M/q Reliability · $${wc}M recall warranty`;
  }
  return `<b>${d.name}</b>`;
}

function getSelectedBuildingScreenPos(){
  const o=campus.objects.find(x=>x.id===campus.selectedId);
  if(!o||!ctx) return null;
  const d=def(o.type), lv=d.levels[o.level];
  const p=iso(o.x+d.w/2, o.y, lv.h+0.4);
  return { x:p.x, y:p.y };
}

// Developed ground = every building footprint plus a paved apron around it. Cached
// and only recomputed when the building layout changes, so the campus "grows" as a
// side effect of building without re-walking the grid every frame.
let _devCache = { sig:'', set:new Set() };
function developedTiles(){
  const sig = campus.objects.map(o=>o.type+o.x+','+o.y).join('|');
  if(sig === _devCache.sig) return _devCache.set;
  const set = new Set();
  const APRON = 1;   // tiles of paving around each footprint
  campus.objects.forEach(o=>{
    const d=def(o.type);
    for(let x=o.x-APRON; x<o.x+d.w+APRON; x++)
      for(let y=o.y-APRON; y<o.y+d.d+APRON; y++){
        if(x>=0 && y>=0 && x<GRID_W && y<GRID_D) set.add(x+','+y);
      }
  });
  _devCache = { sig, set };
  return set;
}

// ── render ───────────────────────────────────────────────────────────────────
function render(){
  if(!ctx) return;
  if(buildType && mouseInside) computeGhost(mouseSX, mouseSY);   // keep the ghost live
  ctx.clearRect(0,0,W,H);
  // sky/ground backdrop
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#0e1320'); g.addColorStop(1,'#141b2b');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

  // ground tiles — developed (paved campus) tiles spread around buildings, so the
  // site visibly grows from a lone startup plot into a sprawling industrial campus.
  const dev = developedTiles();
  for(let x=0;x<GRID_W;x++) for(let y=0;y<GRID_D;y++){
    if(dev.has(x+','+y)){
      const lot = (x+y)%2===0 ? '#283142' : '#2d3749';   // paved campus lot
      tile(x,y,lot,'rgba(255,255,255,.05)');
    } else {
      const raw = (x+y)%2===0 ? '#212c3e' : '#263247';   // undeveloped ground (room to grow)
      tile(x,y,raw,'rgba(255,255,255,.035)');
    }
  }

  // build/move ghost footprint highlight (under buildings)
  const _gt = ghostType(), _gd = _gt ? def(_gt) : null;
  if(_gd && ghost.on){
    const valid=ghost.valid;
    for(let gx=ghost.x; gx<ghost.x+_gd.w; gx++) for(let gy=ghost.y; gy<ghost.y+_gd.d; gy++){
      if(gx<0||gy<0||gx>=GRID_W||gy>=GRID_D) continue;
      tile(gx,gy, valid?'rgba(79,208,138,.32)':'rgba(229,96,94,.30)', valid?'rgba(79,208,138,.9)':'rgba(229,96,94,.85)');
    }
  }

  // suggested tile (Task E) — a gentle green pulse at the nearest open spot the player
  // can OPT INTO with Shift-click. Only in build mode, only when the cursor tile is bad.
  if(buildType && ghost.on && !ghost.valid && ghost.suggest){
    const s=ghost.suggest, sd=def(buildType), pulse=0.5+0.35*Math.sin(wT*4.5);
    for(let gx=s.x; gx<s.x+sd.w; gx++) for(let gy=s.y; gy<s.y+sd.d; gy++){
      if(gx<0||gy<0||gx>=GRID_W||gy>=GRID_D) continue;
      tile(gx,gy, 'rgba(79,208,138,'+(0.16+0.16*pulse).toFixed(3)+')', 'rgba(120,230,170,.95)');
    }
    const sp=iso(s.x+sd.w/2, s.y+sd.d/2, 0.3);
    ctx.fillStyle='rgba(170,240,200,.95)'; ctx.textAlign='center';
    ctx.font='600 '+(10*effSc())+'px Archivo,system-ui,sans-serif';
    ctx.fillText('⇧ here', sp.x, sp.y);
  }

  // finished-goods lot on the apron (under buildings/agents so cars sit on the ground)
  drawParkedCars();

  // buildings + agents + driving cars, depth-sorted together so nearer things overlap
  const drawList = [];
  // the building being moved is "picked up" — hide it at its origin; the ghost shows it
  campus.objects.forEach(o=>{ if(o.id===moveId) return; drawList.push({ kind:'b', z:o.x+o.y, o }); });
  agents.forEach(a=>drawList.push({ kind:'a', z:a.x+a.y, a }));
  cars.forEach(c=>drawList.push({ kind:'c', z:c.x+c.y, c }));
  drawList.sort((p,q)=>p.z-q.z);
  for(const it of drawList){
    if(it.kind==='b'){ drawBuilding(it.o); drawBuildingAnimated(it.o); }
    else if(it.kind==='a'){ drawAgent(it.a); }
    else { drawSmallCar(it.c.x, it.c.y, it.c.color); }
  }

  // ghost building silhouette + a one-line hint (why-invalid)
  if(_gd && ghost.on && inBounds(_gt,ghost.x,ghost.y)){
    const lv=_gd.levels[1], col = ghost.valid ? '#4FD08A' : '#E5605E';
    ctx.globalAlpha=0.55;
    prism(ghost.x+0.06, ghost.y+0.06, _gd.w-0.12, _gd.d-0.12, lv.h, col, {outline:col, outlineW:1.8});
    ctx.globalAlpha=1;
    const p=iso(ghost.x+_gd.w/2, ghost.y, lv.h+0.7);
    ctx.textAlign='center'; ctx.font=`600 ${10*effSc()}px Archivo,system-ui,sans-serif`;
    if(!ghost.valid && ghost.reason){ ctx.fillStyle='#ffb4b2'; ctx.fillText(ghost.reason, p.x, p.y); }
  }
}

function drawBuilding(o){
  const d=def(o.type), lv=d.levels[o.level];
  const selected = campus.selectedId===o.id, hover = hoverId===o.id;
  const base = d.color;
  const col = selected ? shade(base,28) : (hover ? shade(base,14) : base);
  // pad slightly inside the footprint so tiles read as a lot
  prism(o.x+0.08, o.y+0.08, d.w-0.16, d.d-0.16, lv.h, col,
    { outline: selected?'#377BF8':'rgba(0,0,0,.25)', outlineW: selected?2.4:1 });
  // roof detail: a sawtooth stripe + level pips
  const rz=lv.h;
  ctx.fillStyle=shade(col,-10);
  for(let s=o.x+0.4; s<o.x+d.w-0.2; s+=0.7){
    const a=iso(s,o.y+0.2,rz), b=iso(s+0.18,o.y+0.2,rz), c=iso(s+0.18,o.y+d.d-0.2,rz), e=iso(s,o.y+d.d-0.2,rz);
    quad(a,b,c,e);
  }
  // label
  const p=iso(o.x+d.w/2, o.y+d.d/2, rz+0.5);
  ctx.fillStyle = selected?'#377BF8':'#cdd3db';
  ctx.font=`600 ${11*effSc()}px Archivo,system-ui,sans-serif`; ctx.textAlign='center';
  ctx.fillText(`${d.name.split(' ')[0]} L${o.level}`, p.x, p.y);
  // utilization bar floating above when operating
  const cap=capacityOf(o);
  if(cap>0){
    const util=clamp(o.lastOutput/cap,0,1);
    const bw=34*effSc(), bx=p.x-bw/2, by=p.y+5*effSc();
    ctx.fillStyle='rgba(0,0,0,.45)'; ctx.fillRect(bx,by,bw,4*effSc());
    ctx.fillStyle = util>0.92?'#E5605E':'#4FD08A'; ctx.fillRect(bx,by,bw*util,4*effSc());
  }
}

// ── interaction: armed click-to-place (RCT/SimCity style) + forgiving pan/zoom ──
// The build tool is "armed" (buildType set); a single CLICK places at the ghost — no
// dragging. Panning only happens on a clear drag (>PAN_THRESH) that starts on empty
// space, or any space-bar drag; a small movement is always a click and never pans.
const PAN_THRESH = 6;
let mouseDown=false, panEligible=false, wasPan=false;
let downX=0, downY=0, downPanX=0, downPanY=0;
let mouseSX=0, mouseSY=0, mouseInside=false, spaceHeld=false;
let moveId=null;   // id of the building being repositioned (move tool), or null

function relPos(ev){ const r=cv.getBoundingClientRect(); return { x:ev.clientX-r.left, y:ev.clientY-r.top }; }

// the type currently driving the ghost — the armed build tool, or the building being
// moved. Lets the build ghost and the move ghost share one render + geometry path.
function ghostType(){
  if(buildType) return buildType;
  if(moveId!=null){ const o=campus.objects.find(x=>x.id===moveId); return o?o.type:null; }
  return null;
}

// nearest valid top-left tile to (cx,cy) for `type`, or null if the grid is full.
// Used ONLY as an opt-in suggestion (Shift-click) — never a silent relocation.
