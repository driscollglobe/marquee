function nearestOpen(type, cx, cy){
  const d=def(type); let best=null, bd=Infinity;
  for(let y=0; y<=GRID_D-d.d; y++) for(let x=0; x<=GRID_W-d.w; x++){
    if(!canPlace(campus,type,x,y)) continue;
    const dx=x-cx, dy=y-cy, dd=dx*dx+dy*dy;
    if(dd<bd){ bd=dd; best={x,y}; }
  }
  return best;
}

// build ghost from screen coords — sits EXACTLY on the cursor tile; NEVER silently
// relocates. On an occupied tile it reads red + reason and points at a glowing
// suggested tile the player can OPT INTO with Shift-click (handled in onClick).
function computeGhost(sx,sy){
  if(!buildType){ ghost.on=false; return; }
  const d=def(buildType), t=screenToTile(sx,sy);
  const x=clamp(t.x,0,GRID_W-d.w), y=clamp(t.y,0,GRID_D-d.d);
  ghost.on=true; ghost.reason=''; ghost.x=x; ghost.y=y; ghost.suggest=null;
  const cost=placeCostOf(buildType);
  if(opts.getCash && opts.getCash() < cost){ ghost.valid=false; ghost.reason="Can't afford ($"+cost+"M)"; return; }
  ghost.valid = canPlace(campus,buildType,x,y);
  if(!ghost.valid){
    ghost.suggest = nearestOpen(buildType, x, y);
    ghost.reason = ghost.suggest ? 'Occupied — ⇧ Shift-click the glowing tile' : 'No room — demolish to free space';
  }
}

// move ghost — repositioning the selected building, ignoring its own footprint so it
// can slide over where it currently sits. Same cursor-tile rule as the build ghost.
function computeMoveGhost(sx,sy){
  const o=campus.objects.find(x=>x.id===moveId);
  if(!o){ moveId=null; ghost.on=false; return; }
  const d=def(o.type), t=screenToTile(sx,sy);
  const x=clamp(t.x,0,GRID_W-d.w), y=clamp(t.y,0,GRID_D-d.d);
  ghost.on=true; ghost.reason=''; ghost.x=x; ghost.y=y; ghost.suggest=null;
  ghost.valid = inBounds(o.type,x,y) && !collides(campus,o.type,x,y,moveId);
  if(!ghost.valid) ghost.reason = 'Occupied — pick an open tile';
}

// pure move: validate + reposition a building, ignoring its own footprint. Exported
// for headless tests; the on-map move tool (onClick) routes through this.
function moveBuilding(campus, id, x, y){
  const o=campus.objects.find(ob=>ob.id===id);
  if(!o)                              return { ok:false, reason:'No such building.' };
  if(!inBounds(o.type,x,y))           return { ok:false, reason:'Out of bounds.' };
  if(collides(campus,o.type,x,y,id))  return { ok:false, reason:'Overlaps another building.' };
  o.x=x; o.y=y;
  return { ok:true };
}

function setCursor(){
  if(!cv) return;
  cv.style.cursor = wasPan ? 'grabbing'
    : (buildType || moveId!=null) ? 'crosshair'
    : spaceHeld ? 'grab'
    : (hoverId ? 'pointer' : 'grab');
}
function disarm(){ buildType=null; ghost.on=false; wasPan=false; renderPanels(); setCursor(); }
// move tool: pick up the selected building and drop it on a new tile (free reposition)
function startMove(id){
  const o=campus.objects.find(x=>x.id===id); if(!o) return;
  if(buildType) buildType=null;              // can't build and move at once
  moveId=id; campus.selectedId=id; wasPan=false;
  ghost.on=false;
  renderPanels(); setCursor();
  if(mouseInside) computeMoveGhost(mouseSX,mouseSY);
}
function moveSelected(){ if(campus.selectedId!=null) startMove(campus.selectedId); }
function cancelMove(){ moveId=null; ghost.on=false; renderPanels(); setCursor(); }

function onDown(ev){
  if(!cv || ev.button!==0) return;
  mouseDown=true; wasPan=false;
  downX=ev.clientX; downY=ev.clientY; downPanX=panX; downPanY=panY;
  const pos=relPos(ev), t=screenToTile(pos.x,pos.y);
  // pan starts only from empty space (or whenever space is held) — never from a click on a building
  panEligible = spaceHeld || (pickAt(t.x,t.y)==null);
}
function onUp(){ mouseDown=false; setCursor(); }
function onMove(ev){
  if(!cv) return;
  const pos=relPos(ev); mouseSX=pos.x; mouseSY=pos.y; mouseInside=true;
  if(mouseDown){
    const dx=ev.clientX-downX, dy=ev.clientY-downY;
    if(!wasPan && panEligible && Math.hypot(dx,dy)>PAN_THRESH) wasPan=true;
    if(wasPan){ panX=downPanX+dx; panY=downPanY+dy; setCursor(); return; }
  }
  if(buildType){ computeGhost(mouseSX,mouseSY); }
  else if(moveId!=null){ computeMoveGhost(mouseSX,mouseSY); }
  else {
    const t=screenToTile(mouseSX,mouseSY); const id=pickAt(t.x,t.y); hoverId=id;
    if(opts.onHoverTip){
      if(id){ const ho=campus.objects.find(x=>x.id===id); opts.onHoverTip(ho?buildTooltipHtml(ho):null,mouseSX,mouseSY); }
      else opts.onHoverTip(null,0,0);
    }
  }
  setCursor();
}
function onLeave(){
  ghost.on=false; hoverId=null; mouseDown=false; wasPan=false; mouseInside=false;
  if(opts.onHoverTip) opts.onHoverTip(null,0,0);
}
function onWheel(ev){
  if(!cv) return;
  ev.preventDefault();
  const pos=relPos(ev), mx=pos.x, my=pos.y;
  const target = clamp(zoom * (ev.deltaY < 0 ? 1.12 : 0.89), 0.6, 2.4);
  const k = target / zoom;
  panX = (mx - (mx - effOx())*k) - view.ox;
  panY = (my - (my - effOy())*k) - view.oy;
  zoom = target;
}
function onContext(ev){ ev.preventDefault(); if(buildType) disarm(); else if(moveId!=null) cancelMove(); }  // right-click cancels
function onKeyDown(ev){
  if(ev.code==='Space'){ spaceHeld=true; setCursor(); }
  else if(ev.key==='Escape'){
    if(buildType){ disarm(); }
    else if(moveId!=null){ cancelMove(); }
    else if(campus.selectedId!=null){ deselect(); }
  }
}
// clear the current building selection (used by Esc, the inspector × button, and
// clicking empty map). Never leaves a selection the player can't dismiss.
function deselect(){
  if(moveId!=null){ moveId=null; ghost.on=false; }   // dropping selection cancels a pending move
  if(campus.selectedId==null){ setCursor(); return; }
  campus.selectedId=null;
  renderPanels();
  notifySelect();
  setCursor();
}
// select a building by id and open its docked inspector (used by the shell to open
// the Studio panel on-map, and by unique-building placement auto-select).
function selectBuilding(id){
  campus.selectedId = id;
  renderPanels();
  notifySelect();
}
function onKeyUp(ev){ if(ev.code==='Space'){ spaceHeld=false; setCursor(); } }

function pickAt(tx,ty){
  // topmost (last drawn) building whose footprint contains the tile
  let found=null;
  campus.objects.forEach(o=>{ const f=footprintOf(o); if(tx>=f.x&&tx<f.x+f.w&&ty>=f.y&&ty<f.y+f.d) found=o.id; });
  return found;
}
function onClick(ev){
  if(!cv) return;
  if(wasPan){ wasPan=false; return; }          // that was a pan, not a click
  const pos=relPos(ev);
  if(moveId!=null){
    computeMoveGhost(pos.x, pos.y);
    if(!ghost.valid){ flash(ghost.reason || 'Invalid spot'); return; }
    const res = moveBuilding(campus, moveId, ghost.x, ghost.y);
    if(!res.ok){ flash(res.reason); return; }
    const id=moveId; moveId=null; ghost.on=false;
    campus.selectedId=id; changed(); setCursor();
    return;
  }
  if(buildType){
    computeGhost(pos.x, pos.y);
    const shift = ev.shiftKey;
    let px=ghost.x, py=ghost.y;
    if(!ghost.valid){
      // never silently relocate: the suggested tile is opt-in via Shift-click only
      if(shift && ghost.suggest){ px=ghost.suggest.x; py=ghost.suggest.y; }
      else { flash(ghost.reason || 'Invalid spot'); return; }
    }
    const cash = opts.getCash? opts.getCash():Infinity;
    const res = place(campus, buildType, px, py, cash);
    if(res.ok){
      if(opts.onSpend) opts.onSpend(res.cost);
      if(opts.onAction) opts.onAction('place', { type: buildType, obj: campus.objects.find(o=>o.id===res.id) });
      const canAffordNext = !(opts.getCash && opts.getCash() < placeCostOf(buildType));
      // Only the Assembly Plant is repeatable, and only while Shift is held (Task F).
      // Every other (unique) building disarms and auto-selects so its inspector opens.
      if(buildType==='assembly' && shift && canAffordNext){
        campus.selectedId=null;              // rapid placement — don't steal focus
        changed(); computeGhost(pos.x, pos.y); setCursor();
      } else {
        buildType=null; ghost.on=false; ghost.suggest=null;
        campus.selectedId=res.id;            // auto-select + open the new building's inspector
        changed(); setCursor();
      }
    } else { flash(res.reason); }
  } else {
    const t=screenToTile(pos.x,pos.y);
    const id = pickAt(t.x,t.y) || null;
    campus.selectedId = id;
    renderPanels();
    notifySelect();
  }
}
let flashMsg='', flashT=0;
function flash(msg){ flashMsg=msg; flashT=2.2; renderPanels(); }

// tell the shell which plant is selected so it can focus the factory interior
function notifySelect(){
  if(!opts.onSelect) return;
  opts.onSelect(campus.objects.find(o => o.id === campus.selectedId) || null);
}

function changed(){
  renderPanels();
  notifySelect();
  if(opts.onChange) opts.onChange();   // shell re-applies capacity to sim + autosaves
}

// ── DOM: build menu + inspector (owned by the world, rendered into shell slots)─
function renderPanels(){
  renderMenu();
  renderInspector();
}
const BUILDABLE = ['assembly','studio','rdlab','testtrack','qualitycenter'];
const CORE_BUILDS  = ['assembly','studio','rdlab'];       // the everyday levers
const EXTRA_BUILDS = ['testtrack','qualitycenter'];        // optional depth, behind "More"
let showExtraBuilds = false;
function toggleExtraBuilds(){ showExtraBuilds=!showExtraBuilds; renderMenu(); }
function buttonFor(type, cash){
  const d=def(type), cost=placeCostOf(type), can=cash>=cost, armed=buildType===type;
  return `<button class="wbuild-btn${armed?' on':''}" ${(can||armed)?'':'disabled'}
     onclick="MarqueWorld.toggleBuild('${type}')">
     ${armed?'✕ Cancel' : '+ '+d.name} <span>$${cost}M</span>
   </button>`;
}
function renderMenu(){
  if(!opts.menuEl) return;
  if(opts.onArmChange) opts.onArmChange(!!buildType || moveId!=null);
  const cash = opts.getCash? Math.round(opts.getCash()):0;
  const inputs = deriveCampusInputs(campus);
  let btns = CORE_BUILDS.map(t=>buttonFor(t,cash)).join('');
  if(showExtraBuilds) btns += EXTRA_BUILDS.map(t=>buttonFor(t,cash)).join('');
  btns += `<button class="wbuild-more" onclick="MarqueWorld.toggleExtraBuilds()">${showExtraBuilds?'– Fewer':'+ More'}</button>`;
  const hint = buildType
    ? `<b style="color:var(--amber)">● Armed</b> — click a tile to build. Hold <b>⇧ Shift</b> to place several / to snap to the nearest open tile. <b>Esc</b> or right-click cancels.`
    : moveId!=null
    ? `<b style="color:#7C6FD6">✥ Moving</b> — click an open tile to drop the building. <b>Esc</b> or right-click to cancel.`
    : `Plants add capacity (now <b>${inputs.capacity}k</b>/q). <b style="color:#a89bf0">Studio</b> = design. <b style="color:#3B8EA5">R&amp;D Lab</b> = research.${showExtraBuilds?` <b style="color:#C87941">Test Track</b> = performance. <b style="color:#4E9A6E">Quality Center</b> = reliability.`:''}`;
  opts.menuEl.innerHTML = btns +
    `<div class="wbuild-hint">${hint}${flashT>0?` <span style="color:var(--red)">· ${flashMsg}</span>`:''}</div>`;
}
function renderInspector(){
  if(!opts.inspectorEl) return;
  const o = campus.objects.find(x=>x.id===campus.selectedId);
  if(!o){ opts.inspectorEl.innerHTML = `<div class="winsp-empty">Select a building to inspect it.</div>`;
    if(opts.onInspectorUpdated) opts.onInspectorUpdated(null); return; }
  if(o.type==='rdlab'){
    const d=def(o.type);
    const upCost=upgradeCostOf(o);
    const cash = opts.getCash? opts.getCash():0;
    const canUp = upCost!=null && cash>=upCost;
    const bonus = o.level>=2 ? 60 : 30;
    const focus = o.labFocus || 'eng';
    const focusLabels = { eng:'Powertrain', eff:'Reliability', mfg:'Manufacturing' };
    const focusEffects = { eng:'Quality ↑ · recall risk ↓', eff:'Efficiency bonus ↑', mfg:'Unit cost ↓' };
    const focusBtns = ['eng','eff','mfg'].map(k=>
      `<button class="btn${focus===k?' primary':''}" style="padding:5px 9px;font-size:10px"
         onclick="MarqueWorld.setLabFocus(${o.id},'${k}')">${focusLabels[k]}</button>`
    ).join('');
    opts.inspectorEl.innerHTML =
      `<div class="winsp-name">${d.name} <span class="winsp-lvl">Level ${o.level}</span></div>
       <div class="winsp-grid">
         <div><span class="wk">R&D boost</span><span class="wv">+$${bonus}M/q</span></div>
         <div><span class="wk">Focus</span><span class="wv" style="color:var(--amber)">${focusLabels[focus]}</span></div>
         <div><span class="wk">Effect</span><span class="wv" style="font-size:11px">${focusEffects[focus]}</span></div>
         <div><span class="wk">Footprint</span><span class="wv">${d.w}×${d.d}</span></div>
       </div>
       <div style="margin-bottom:12px">
         <div style="font-family:var(--sans);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);margin-bottom:5px">Allocate focus:</div>
         <div style="display:flex;gap:6px">${focusBtns}</div>
       </div>
       <div class="winsp-actions">
         ${upCost!=null
           ? `<button class="btn primary" ${canUp?'':'disabled'} onclick="MarqueWorld.upgradeSelected()">Upgrade to L${o.level+1} · $${upCost}M</button>`
           : `<button class="btn" disabled>Max level</button>`}
         <button class="btn" onclick="MarqueWorld.moveSelected()">Move</button>
         <button class="btn danger" onclick="MarqueWorld.demolishSelected()">Demolish</button>
       </div>`;
    if(opts.onInspectorUpdated) opts.onInspectorUpdated(o.id);
    return;
  }
  if(o.type==='studio'){
    const d=def(o.type);
    const upCost=upgradeCostOf(o);
    const cash = opts.getCash? opts.getCash():0;
    const canUp = upCost!=null && cash>=upCost;
    // The whole design/redesign flow now lives INLINE in this docked panel — no
    // full-screen studio modal. The shell renders the body (models + design form).
    const body = opts.studioBody ? opts.studioBody() : '';
    opts.inspectorEl.innerHTML =
      `<div class="winsp-name">${d.name} <span class="winsp-lvl">Level ${o.level}</span></div>
       ${body}
       <div class="winsp-actions" style="margin-top:10px">
         ${upCost!=null
           ? `<button class="btn" ${canUp?'':'disabled'} onclick="MarqueWorld.upgradeSelected()">Upgrade · $${upCost}M</button>`
           : `<button class="btn" disabled>Max level</button>`}
         <button class="btn" onclick="MarqueWorld.moveSelected()">Move</button>
         <button class="btn danger" onclick="MarqueWorld.demolishSelected()">Demolish</button>
       </div>`;
    if(opts.onInspectorUpdated) opts.onInspectorUpdated(o.id);
    return;
  }
  if(o.type==='testtrack'){
    const d=def(o.type);
    const upCost=upgradeCostOf(o);
    const cash = opts.getCash? opts.getCash():0;
    const canUp = upCost!=null && cash>=upCost;
    const engBonus = o.level>=2 ? 50 : 25;
    opts.inspectorEl.innerHTML =
      `<div class="winsp-name">${d.name} <span class="winsp-lvl">Level ${o.level}</span></div>
       <div class="winsp-grid">
         <div><span class="wk">Eng R&amp;D boost</span><span class="wv">+$${engBonus}M/q</span></div>
         <div><span class="wk">Effect</span><span class="wv" style="font-size:11px">Perf ↑ · recall risk ↓</span></div>
         <div><span class="wk">Coupe halo</span><span class="wv">${o.level>=2?'Amplified':'Standard'}</span></div>
         <div><span class="wk">Footprint</span><span class="wv">${d.w}×${d.d}</span></div>
       </div>
       <div class="winsp-actions">
         ${upCost!=null
           ? `<button class="btn primary" ${canUp?'':'disabled'} onclick="MarqueWorld.upgradeSelected()">Upgrade to L${o.level+1} · $${upCost}M</button>`
           : `<button class="btn" disabled>Max level</button>`}
         <button class="btn" onclick="MarqueWorld.moveSelected()">Move</button>
         <button class="btn danger" onclick="MarqueWorld.demolishSelected()">Demolish</button>
       </div>`;
    if(opts.onInspectorUpdated) opts.onInspectorUpdated(o.id);
    return;
  }
  if(o.type==='qualitycenter'){
    const d=def(o.type);
    const upCost=upgradeCostOf(o);
    const cash = opts.getCash? opts.getCash():0;
    const canUp = upCost!=null && cash>=upCost;
    const effBonus = o.level>=2 ? 50 : 25;
    const wc = o.level>=2 ? 30 : 15;
    opts.inspectorEl.innerHTML =
      `<div class="winsp-name">${d.name} <span class="winsp-lvl">Level ${o.level}</span></div>
       <div class="winsp-grid">
         <div><span class="wk">Eff R&amp;D boost</span><span class="wv">+$${effBonus}M/q</span></div>
         <div><span class="wk">Effect</span><span class="wv" style="font-size:11px">Reliability ↑ · recall risk ↓</span></div>
         <div><span class="wk">Warranty</span><span class="wv" style="color:var(--green)">$${wc}M/recall covered</span></div>
         <div><span class="wk">Footprint</span><span class="wv">${d.w}×${d.d}</span></div>
       </div>
       <div class="winsp-actions">
         ${upCost!=null
           ? `<button class="btn primary" ${canUp?'':'disabled'} onclick="MarqueWorld.upgradeSelected()">Upgrade to L${o.level+1} · $${upCost}M</button>`
           : `<button class="btn" disabled>Max level</button>`}
         <button class="btn" onclick="MarqueWorld.moveSelected()">Move</button>
         <button class="btn danger" onclick="MarqueWorld.demolishSelected()">Demolish</button>
       </div>`;
    if(opts.onInspectorUpdated) opts.onInspectorUpdated(o.id);
    return;
  }
  const d=def(o.type), cap=capacityOf(o), util=cap>0?Math.round(clamp(o.lastOutput/cap,0,1)*100):0;
  const upCost=upgradeCostOf(o);
  const cash = opts.getCash? opts.getCash():0;
  const canUp = upCost!=null && cash>=upCost;
  const canDem = canDemolish(campus,o.id);
  opts.inspectorEl.innerHTML =
    `<div class="winsp-name">${d.name} <span class="winsp-lvl">Level ${o.level}</span></div>
     <div class="winsp-grid">
       <div><span class="wk">Capacity</span><span class="wv">${cap}k/q</span></div>
       <div><span class="wk">Last output</span><span class="wv">${Math.round(o.lastOutput)}k</span></div>
       <div><span class="wk">Utilization</span><span class="wv" style="color:${util>92?'var(--red)':'var(--green)'}">${util}%</span></div>
       <div><span class="wk">Footprint</span><span class="wv">${d.w}×${d.d}</span></div>
     </div>
     <div class="winsp-actions">
       ${upCost!=null
         ? `<button class="btn primary" ${canUp?'':'disabled'} onclick="MarqueWorld.upgradeSelected()">Upgrade to L${o.level+1} · $${upCost}M</button>`
         : `<button class="btn" disabled>Max level</button>`}
       <button class="btn" onclick="MarqueWorld.moveSelected()">Move</button>
       <button class="btn danger" ${canDem?'':'disabled'} onclick="MarqueWorld.demolishSelected()" title="${canDem?'':'Keep at least one plant'}">Demolish</button>
     </div>`;
  if(opts.onInspectorUpdated) opts.onInspectorUpdated(o.id);
}

// ── public actions wired to DOM ──────────────────────────────────────────────
function toggleBuild(type){
  moveId=null;                       // arming a build cancels any pending move
  buildType = (buildType===type) ? null : type;
  ghost.on=false;
  if(buildType && mouseInside) computeGhost(mouseSX, mouseSY);
  renderPanels(); setCursor();
}
function upgradeSelected(){
  const id=campus.selectedId; if(id==null) return;
  const cash=opts.getCash?opts.getCash():Infinity;
  const res=upgrade(campus,id,cash);
  if(res.ok){
    if(opts.onSpend) opts.onSpend(res.cost);
    const o = campus.objects.find(ob=>ob.id===id);
    if(opts.onAction) opts.onAction('upgrade', { type: o ? o.type : null, obj: o });
    changed();
  } else flash(res.reason);
}
function demolishSelected(){
  const id=campus.selectedId; if(id==null) return;
  const res=demolish(campus,id);
  if(res.ok) changed(); else flash(res.reason);
}
function studioAction(){ if(opts.onStudioOpen) opts.onStudioOpen(); }
function setLabFocus(id, focus){
  const o = campus.objects.find(o=>o.id===id);
  if(!o || o.type!=='rdlab') return;
  if(!['eng','eff','mfg'].includes(focus)) return;
  o.labFocus = focus;
  changed();
}

// ── lifecycle ────────────────────────────────────────────────────────────────
function triggerBurst(){ burstMag = 0.6 + simActivity().busy*1.6; burstT = 2.5; }   // stronger production → denser burst

function step(dt){
  wT += dt;
  if(burstT > 0) burstT = Math.max(0, burstT - dt);
  if(flashT>0){ flashT-=dt; if(flashT<=0){ flashT=0; renderMenu(); } }
  stepAgents(dt);
}
let last=0;
function loop(now){
  if(!cv) return;
  let dt=(now-last)/1000; last=now; dt=Math.min(dt,0.05);
  step(dt); render();
  rafId=requestAnimationFrame(loop);
}

function init(canvasEl, options){
  opts = options||{};
  if(canvasEl){
    cv=canvasEl; ctx=cv.getContext('2d');
    resize(); fit();
    window.addEventListener('resize', ()=>{ resize(); fit(); });
    cv.addEventListener('mousedown', onDown);
    window.addEventListener('mouseup', onUp);
    cv.addEventListener('mousemove', onMove);
    cv.addEventListener('mouseleave', onLeave);
    cv.addEventListener('click', onClick);
    cv.addEventListener('wheel', onWheel, { passive:false });
    cv.addEventListener('contextmenu', onContext);
    window.addEventListener('keydown', onKeyDown);
    window.addEventListener('keyup', onKeyUp);
    cv.style.cursor = 'grab';
    last=performance.now();
    if(rafId) cancelAnimationFrame(rafId);
    rafId=requestAnimationFrame(loop);
  }
  renderPanels();
}

function getCampus(){ return campus; }
function loadCampus(state){
  if(state && Array.isArray(state.objects)){
    campus = state;
    if(campus.nextId==null) campus.nextId = Math.max(0,...campus.objects.map(o=>o.id))+1;
  } else {
    campus = freshCampus();
  }
  buildType=null; moveId=null; ghost.on=false; panX=0; panY=0; zoom=1;
  renderPanels();
}
function resetCampus(){ campus = freshCampus(); buildType=null; moveId=null; panX=0; panY=0; zoom=1; renderPanels(); }

return {
  // logic (also used by headless tests)
  freshCampus, deriveCampusInputs, canPlace, place, upgrade, demolish, moveBuilding,
  canDemolish, applyProduction, placeCostOf, upgradeCostOf, capacityOf,
  CATALOG, GRID_W, GRID_D, BASE_CAPACITY,
  // lifecycle / shell wiring
  init, getCampus, loadCampus, resetCampus, step, render, renderPanels,
  toggleBuild, upgradeSelected, demolishSelected, studioAction, setLabFocus,
  // move tool
  startMove, moveSelected, cancelMove,
  // new in rebuild
  setSimState, getSelectedBuildingScreenPos, triggerBurst, deselect, toggleExtraBuilds,
  selectBuilding,
  // presentation helpers exposed for headless tests
  developedTiles, simActivity,
};

})();
</script>

  .dim{color:var(--dim)} .up{color:var(--green)} .down{color:var(--red)}

  /* ── header ── */

    border-bottom:1px solid var(--line);padding-bottom:14px;margin-bottom:14px}

  .brandmark .nm{font-weight:800;font-size:26px;letter-spacing:.06em;text-transform:uppercase;line-height:1}

    border:1px solid var(--line);border-radius:6px;padding:6px 10px;letter-spacing:.1em}
  .clock b{color:var(--amber);font-weight:600}

  .gauge{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:12px 14px}
  .gauge .lbl{font-family:var(--sans);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--dim)}
  .gauge .val{font-family:var(--sans);font-size:22px;font-weight:600;margin-top:5px;line-height:1}
  .gauge .delta{font-family:var(--sans);font-size:11px;margin-top:5px}

  /* ── layout ── */
  @media(max-width:900px){.cluster{grid-template-columns:repeat(2,1fr)}}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:18px}
  .panel h2{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--dim);margin:0 0 14px;font-weight:600;font-family:var(--sans)}

  /* ── segment cards ── */
  .seg{border:1px solid var(--line);border-radius:10px;padding:14px;margin-bottom:12px;background:var(--panel2)}
  .seg:last-child{margin-bottom:0}
  .seg-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px}
  .seg--empty{opacity:.7;padding:9px 12px}
  .seg--empty .seg-head{margin-bottom:5px;gap:8px;flex-wrap:nowrap}
  .seg--empty .seg-name{font-size:13px;font-weight:600;white-space:nowrap}
  .seg--empty .seg-meta{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .seg--empty .sharebar{margin-top:5px}
  .seg--empty .leg{display:none}
  .seg-name{font-weight:700;font-size:15px}
  .seg-meta{font-family:var(--sans);font-size:11px;color:var(--dim)}

  .model-row{display:flex;gap:14px;align-items:flex-start;flex-wrap:wrap}
  .model-badge{background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:9px 12px;min-width:130px}
  .model-badge .eng{font-family:var(--sans);font-size:20px;font-weight:600;color:var(--amber);line-height:1}
  .model-badge .trm{font-family:var(--sans);font-size:11px;color:var(--dim);margin-top:2px}
  .nov-bar{height:3px;background:var(--line);border-radius:2px;margin-top:8px;overflow:hidden}
  .nov-bar i{display:block;height:100%;border-radius:2px}
  .nov-lbl{font-family:var(--sans);font-size:9px;color:var(--dimmer);margin-top:3px;letter-spacing:.1em;text-transform:uppercase}
  .recall-badge{font-family:var(--sans);font-size:9px;color:var(--red);letter-spacing:.1em;text-transform:uppercase;margin-top:4px;display:block}
  .halo-badge{font-family:var(--sans);font-size:9px;color:#F2B544;letter-spacing:.08em;text-transform:uppercase;margin-top:4px}

  .price-ctl{flex:1;min-width:180px}
  .price-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px}
  .price-row .k{font-family:var(--sans);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--dim)}
  .price-row .v{font-family:var(--sans);font-size:20px;font-weight:600;color:var(--amber)}
  input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:4px;background:var(--line);border-radius:2px;outline:none}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--amber);cursor:pointer;border:2px solid var(--bg);box-shadow:0 0 0 1px var(--amber)}
  input[type=range]::-moz-range-thumb{width:16px;height:16px;border-radius:50%;background:var(--amber);cursor:pointer;border:2px solid var(--bg)}
  .share-proj{font-family:var(--sans);font-size:11px;color:var(--dim);margin-top:7px}
  .share-proj b{color:var(--hi)}
  .margin-note{color:var(--dimmer);font-size:10px}
  .share-proj b{color:var(--hi);font-weight:600}

  .seg-actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
  .btn{font-family:var(--sans);font-size:11px;letter-spacing:.06em;background:transparent;
    color:var(--dim);border:1px solid var(--line);border-radius:7px;padding:6px 10px;cursor:pointer;transition:.12s}
  .btn:hover{color:var(--hi);border-color:rgba(255,255,255,.25)} .btn:active{transform:translateY(1px)}
  .btn:disabled{opacity:.3;cursor:not-allowed;pointer-events:none}
  .btn.primary{background:var(--amber);color:#fff;border-color:var(--amber);font-weight:600}
  .btn.primary:hover{filter:brightness(1.08)}
  .btn.danger{color:var(--red);border-color:rgba(229,96,94,.3)}
  .btn.danger:hover{border-color:var(--red);background:rgba(229,96,94,.08)}

  /* ── car icons ── */
  .cars{display:flex;flex-wrap:wrap;gap:3px;margin-top:10px;min-height:14px;align-items:center}
  .cars svg{width:18px;height:9px;opacity:.9}
  .cars .units{font-family:var(--sans);font-size:10px;color:var(--dim);margin-left:6px}


  /* ── share bar ── */
  .sharebar{display:flex;height:7px;border-radius:4px;overflow:hidden;margin-top:12px;background:var(--bg)}
  .sharebar span{display:block;height:100%;transition:width .18s}
  .leg{display:flex;gap:10px;flex-wrap:wrap;margin-top:7px}
  .leg .it{display:flex;align-items:center;gap:5px;font-family:var(--sans);font-size:10px;color:var(--dim)}
  .leg .sw{width:8px;height:8px;border-radius:2px;display:inline-block;flex-shrink:0}

  .no-model{font-family:var(--sans);font-size:12px;color:var(--dimmer);padding:6px 0 2px}

  /* ── R&D ── */
  .rd{margin-bottom:14px}
  .rd .row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px}
  .rd .row .k{font-size:13px;font-weight:600}
  .rd .row .k small{font-family:var(--sans);font-weight:400;color:var(--dim);font-size:10px;display:block;margin-top:1px}
  .rd .row .v{font-family:var(--sans);font-size:15px;color:var(--amber);font-weight:600}
  .statbar{height:4px;background:var(--line);border-radius:2px;margin-top:7px;overflow:hidden}
  .statbar i{display:block;height:100%;background:var(--amber);border-radius:2px;transition:width .3s}
  .rd-effect{font-family:var(--sans);font-size:9px;color:var(--dimmer);margin-top:4px;letter-spacing:.05em}
  .rd-total{display:flex;justify-content:space-between;font-family:var(--sans);font-size:12px;
    border-top:1px solid var(--line);padding-top:12px;margin-top:4px}
  .rd-total b{font-weight:600}

  /* ── factory brief (compact capacity line in lineup tab) ── */
  .factory-brief{font-family:var(--sans);font-size:11px;color:var(--dim);
    padding:0 0 12px;border-bottom:1px solid var(--line);margin-bottom:14px}

  /* ── chart ── */
  svg.chart{width:100%;height:150px;display:block}

  /* ── log ── */
  .log{font-family:var(--sans);font-size:12px;line-height:1.55}
  .log .e{padding:7px 0;border-bottom:1px solid var(--line);color:var(--dim)}
  .log .e:last-child{border-bottom:none}
  .log .e b{color:var(--hi);font-weight:600}
  .log .e .q{color:var(--dimmer);margin-right:8px}

  /* ── advance ── */
  .advance{flex:0 0 auto;z-index:5}
  .advisor-card{background:rgba(55,123,248,.07);border:1px solid rgba(55,123,248,.3);
    border-radius:10px;padding:9px 13px;font-size:12px;font-family:var(--sans);
    color:var(--fg);margin-bottom:8px;line-height:1.5}
  .advisor-card::before{content:'▶  ';color:var(--amber);font-size:9px}
  .advisor-card.actionable{cursor:pointer;transition:background .15s,border-color .15s}
  .advisor-card.actionable:hover{background:rgba(55,123,248,.14);border-color:rgba(55,123,248,.6)}
  .advisor-card.actionable::after{content:' →';color:var(--amber);font-size:10px;opacity:.7}
  #advBtn{width:100%;font-family:var(--sans);font-weight:800;font-size:16px;
    letter-spacing:.08em;text-transform:uppercase;color:#fff;background:var(--amber);
    border:none;border-radius:12px;padding:16px;cursor:pointer;
    box-shadow:0 6px 22px rgba(55,123,248,.28)}
  #advBtn:hover{filter:brightness(1.06)} #advBtn:active{transform:translateY(1px)}
  .gameover{text-align:center;padding:24px;border:1px solid var(--red);border-radius:12px;background:rgba(229,96,94,.08)}
  .gameover h3{margin:0 0 6px;color:var(--red);letter-spacing:.05em}
  .restart-btn{margin-top:14px;font-family:var(--sans);font-size:12px;background:transparent;
    color:var(--hi);border:1px solid var(--line);border-radius:8px;padding:9px 16px;cursor:pointer}
  .restart-btn:hover{border-color:var(--amber);color:var(--amber)}
  .hint{font-family:var(--sans);font-size:11px;color:var(--dimmer);margin-top:12px;line-height:1.65}

  /* ── goal banner ── */
  #goalBanner{font-family:var(--sans);font-size:11px;color:var(--dim);
    padding:0 0 14px;border-bottom:1px solid var(--line);margin-bottom:18px}
  #goalBanner b{font-weight:600}

  /* ── end screen ── */
  .endcard{border-radius:12px;padding:22px 24px;border:1px solid var(--line)}
  .endcard.win{border-color:var(--green);background:rgba(79,208,138,.06)}
  .endcard.bankrupt{border-color:var(--red);background:rgba(229,96,94,.06)}
  .endcard.timeout{border-color:var(--dimmer);background:rgba(92,99,110,.06)}
  .endcard h3{margin:0 0 4px;font-size:22px;font-weight:800;letter-spacing:.04em}
  .endcard .sub{font-family:var(--sans);font-size:11px;color:var(--dim);margin-bottom:16px}
  .score-val{font-family:var(--sans);font-size:36px;font-weight:600;color:var(--amber);
    line-height:1;margin-bottom:16px}
  .score-val small{font-size:13px;color:var(--dim);font-weight:400;margin-left:4px}
  .stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px 16px;
    margin-bottom:18px;font-family:var(--sans);font-size:11px}
  .stat-grid .sk{color:var(--dim);margin-bottom:2px}
  .stat-grid .sv{font-size:14px;font-weight:600;color:var(--hi)}
  .endstory{font-family:var(--sans);font-size:14px;font-style:italic;color:var(--hi);
    line-height:1.5;margin:4px 0 16px;padding-left:12px;border-left:2px solid var(--amber)}
  .enddecisive{font-family:var(--sans);font-size:11px;color:var(--dim);margin:-6px 0 16px}
  .enddecisive span{color:var(--amber);text-transform:uppercase;letter-spacing:.1em;font-size:9px;margin-right:6px}
  .end-actions{display:flex;gap:8px;flex-wrap:wrap}
  .end-actions button{font-family:var(--sans);font-size:12px;border-radius:8px;
    padding:10px 16px;cursor:pointer;border:1px solid var(--line);background:transparent;
    color:var(--hi);transition:.12s}
  .end-actions button:hover{border-color:var(--amber);color:var(--amber)}
  .end-actions .primary-end{background:var(--amber);color:#fff;border-color:var(--amber);font-weight:700}
  .end-actions .primary-end:hover{filter:brightness(1.08);color:#fff}

  /* ── world view — the single unified live surface ── */
  /* ── main play layout: persistent world + dashboard side panel (Nav restructure) ── */
  .app{display:flex;gap:14px;align-items:stretch;flex:1 1 auto;min-height:0}
  .app-main{flex:1 1 auto;min-width:0;display:flex;flex-direction:column;gap:8px}
  .app-side{flex:0 0 384px;display:flex;flex-direction:column;min-height:0}
  .app-side .dashboard{flex:1 1 auto;min-height:0;display:flex;flex-direction:column;margin-bottom:0}

  .world-view{position:relative;width:100%;flex:1 1 auto;min-height:240px;
    border-radius:12px;overflow:hidden;background:#0C0F15;border:1px solid var(--line)}
  .world-view.world-armed{border-color:rgba(55,123,248,.65)!important;
    box-shadow:0 0 0 3px rgba(55,123,248,.18)}
  #worldCanvas{position:absolute;inset:0;width:100%;height:100%;display:block}
  .world-toolbar{position:absolute;bottom:0;left:0;right:0;
    background:rgba(21,23,28,.86);backdrop-filter:blur(6px);
    padding:9px 14px;border-top:1px solid var(--line);
    display:flex;gap:8px;align-items:center;flex-wrap:wrap;z-index:3}

  /* ── live broadcast ticker (Task 3) ── */
  .ticker-band{position:absolute;top:0;left:0;right:0;height:26px;z-index:5;pointer-events:none;
    background:linear-gradient(90deg,rgba(12,14,20,.96),rgba(18,22,32,.93));
    border-bottom:1px solid rgba(55,123,248,.25);overflow:hidden;
    display:flex;align-items:center;font-family:var(--sans);font-size:11px;white-space:nowrap;
    -webkit-mask-image:linear-gradient(90deg,transparent,#000 4%,#000 97%,transparent);
    mask-image:linear-gradient(90deg,transparent,#000 4%,#000 97%,transparent)}
  .ticker-band::before{content:'● LIVE';position:absolute;left:0;top:0;bottom:0;z-index:2;
    display:flex;align-items:center;padding:0 9px;color:#E5605E;font-weight:700;font-size:9px;
    letter-spacing:.1em;background:rgba(10,12,18,.99);border-right:1px solid rgba(55,123,248,.3)}
  .ticker-track{display:inline-flex;align-items:center;will-change:transform;padding-left:62px}
  .tk-item{display:inline-flex;align-items:center;gap:6px;padding:0 16px;
    border-right:1px solid rgba(255,255,255,.07);color:var(--dim)}
  .tk-k{color:var(--dimmer);letter-spacing:.05em;font-size:9px;text-transform:uppercase}
  .tk-v{color:var(--hi);font-weight:700}
  .tk-up{color:var(--green)} .tk-down{color:var(--red)} .tk-flat{color:var(--dim)}
  .tk-stock .tk-v{color:var(--amber)}
  .tk-recall{color:#E5605E;font-weight:700;animation:tkBlink 1s steps(2,jump-none) infinite}
  @keyframes tkBlink{50%{opacity:.35}}

  /* ── rival scoreboard (Task 4) ── */
  /* ── THE matchup: your car vs the field (world HUD centerpiece) ── */
  .world-scoreboard{position:absolute;top:34px;right:10px;z-index:4;width:216px;
    background:rgba(14,17,24,.92);backdrop-filter:blur(6px);
    border:1px solid rgba(55,123,248,.35);border-radius:10px;padding:9px 11px;
    font-family:var(--sans);pointer-events:none;box-shadow:0 6px 20px rgba(0,0,0,.45)}
  .mu-title{font-size:8.5px;letter-spacing:.12em;color:var(--amber);text-transform:uppercase;
    margin-bottom:7px;font-weight:700}
  .mu-row{display:flex;align-items:center;gap:6px;padding:3px 0}
  .mu-row.mu-you{background:rgba(55,123,248,.10);border-radius:5px;
    margin:1px -4px;padding:3px 4px}
  .mu-name{font-weight:700;font-size:10px;width:74px;flex-shrink:0;white-space:nowrap;
    overflow:hidden;text-overflow:ellipsis}
  .mu-eng{font-size:8px;color:var(--dimmer);font-weight:400}
  .mu-crown{font-size:9px}
  .mu-barwrap{flex:1 1 auto;height:7px;background:rgba(255,255,255,.06);border-radius:4px;overflow:hidden}
  .mu-bar{display:block;height:100%;border-radius:4px;transition:width .5s ease}
  .mu-pct{font-weight:700;font-size:11px;color:var(--hi);width:30px;text-align:right;flex-shrink:0}
  .mu-foot{margin-top:7px;padding-top:6px;border-top:1px solid rgba(255,255,255,.08);
    font-size:9.5px;text-align:center}
  .mu-win{color:var(--green);font-weight:700}
  .mu-chase{color:var(--dim)}

  /* ── valuation readout + sparkline (Task 5) ── */
  .world-valuation{position:absolute;top:34px;left:10px;z-index:4;
    background:rgba(14,17,24,.84);backdrop-filter:blur(6px);
    border:1px solid var(--line);border-radius:10px;padding:8px 11px;
    font-family:var(--sans);pointer-events:none;min-width:132px}
  .wv-k{font-size:8px;letter-spacing:.14em;color:var(--dimmer);text-transform:uppercase}
  .wv-price{font-size:20px;font-weight:800;color:var(--amber);line-height:1.05;margin-top:2px}
  .wv-trend{font-size:10px;font-weight:700;margin-left:5px;vertical-align:middle}
  .wv-sub{font-size:8.5px;color:var(--dimmer);margin-top:1px}
  .wv-spark{margin-top:5px;display:block}

  /* ── world inspector popup + hover tooltip (fixed overlays) ── */
  /* Docked building inspector — anchors to the right edge of the world view so it
     never covers the board centre; always has a × and is dismissable three ways. */
  .world-inspector{position:absolute;top:40px;right:8px;width:226px;
    background:#1A1D24;border:1px solid var(--line);border-radius:11px;
    padding:13px 14px;font-family:var(--sans);font-size:11px;z-index:9;pointer-events:auto;
    box-shadow:0 8px 26px rgba(0,0,0,.6);overflow-y:auto;max-height:calc(100% - 150px)}
  .winsp-close{position:absolute;top:6px;right:8px;background:none;border:none;
    color:var(--dim);font-size:20px;line-height:1;cursor:pointer;padding:2px 4px;z-index:2}
  .winsp-close:hover{color:var(--hi)}
  /* while inspecting, hide the scoreboard (same corner) so panels don't overlap */
  .world-view.inspecting .world-scoreboard{display:none!important}
  .world-tooltip{position:fixed;background:#1A1D24;border:1px solid var(--line);
    border-radius:6px;padding:5px 9px;font-family:var(--sans);font-size:10px;
    pointer-events:none;z-index:210;white-space:nowrap}
  @media(max-width:860px){
    /* on mobile the inspector docks along the bottom of the world, above the build bar */
    .world-inspector{top:auto;bottom:58px;right:6px;left:6px;width:auto;max-height:46%}
  }

  /* ── campus builder UI (build toolbar + inspector) ── */
  .wbuild-btn{font-family:var(--sans);font-size:12px;font-weight:600;
    display:inline-flex;align-items:center;gap:6px;
    background:var(--amber);color:#fff;border:none;border-radius:8px;padding:8px 12px;
    cursor:pointer;transition:.12s;white-space:nowrap}
  .wbuild-btn.on{background:transparent;color:var(--amber);border:1px solid var(--amber)}
  .wbuild-btn:hover{filter:brightness(1.05)}
  .wbuild-btn:disabled{opacity:.35;cursor:not-allowed}
  .wbuild-btn span{font-weight:400;font-size:11px}
  .wbuild-more{font-family:var(--sans);font-size:11px;color:var(--dim);background:none;
    border:1px dashed var(--line);border-radius:8px;padding:8px 10px;cursor:pointer}
  .wbuild-more:hover{color:var(--hi);border-color:rgba(255,255,255,.3)}
  .wbuild-hint{font-family:var(--sans);font-size:10px;color:var(--dimmer);line-height:1.6;flex:1;min-width:160px}
  .wbuild-hint b{color:var(--hi)}
  .winsp-empty{font-family:var(--sans);font-size:11px;color:var(--dimmer);padding:6px 0}
  .winsp-name{font-weight:700;font-size:14px;margin-bottom:10px}
  .winsp-lvl{font-family:var(--sans);font-size:10px;color:var(--amber);margin-left:6px}
  .winsp-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px 12px;margin-bottom:12px}
  .winsp-grid>div{display:flex;flex-direction:column}
  .winsp-grid .wk{font-family:var(--sans);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--dim)}
  .winsp-grid .wv{font-family:var(--sans);font-size:15px;font-weight:600;color:var(--hi);margin-top:2px}
  .winsp-actions{display:flex;gap:6px;flex-wrap:wrap}
  .winsp-note{font-family:var(--sans);font-size:9px;color:var(--dimmer);margin-top:9px;letter-spacing:.04em}

  /* ── docked Studio design panel (lives inside the studio inspector, no modal) ── */
  .std-perk{font-family:var(--sans);font-size:9px;color:var(--dim);margin-bottom:8px}
  .std-perk.ok{color:var(--green)}
  .std-list{display:flex;flex-direction:column;gap:6px}
  .std-row{border-top:1px solid var(--line);padding-top:7px}
  .std-row.std-empty{display:flex;align-items:center;justify-content:space-between;gap:6px}
  .std-rowhead{font-family:var(--sans);font-size:11px;color:var(--hi);margin-bottom:5px}
  .std-rowhead .wk{font-size:9px;color:var(--dim)}
  .std-rowbtns{display:flex;gap:5px}
  .std-rowbtns .btn{flex:1;padding:4px 0;font-size:10px}
  .std-form{border-top:1px solid var(--line);padding-top:8px}
  .std-formhead{font-family:var(--sans);font-size:11px;font-weight:700;color:var(--amber);margin-bottom:8px}
  .std-lbl{font-family:var(--sans);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);margin:6px 0 4px}
  .std-opts{display:flex;flex-wrap:wrap;gap:5px}
  .std-opt{font-family:var(--sans);font-size:11px;background:var(--panel2);color:var(--dim);
    border:1px solid var(--line);border-radius:7px;padding:5px 9px;cursor:pointer;display:flex;gap:5px;align-items:baseline}
  .std-opt span{font-size:8px;color:var(--dimmer)}
  .std-opt:hover{color:var(--hi);border-color:rgba(255,255,255,.2)}
  .std-opt.sel{background:rgba(55,123,248,.14);color:var(--amber);border-color:var(--amber)}
  .std-cost{font-family:var(--sans);font-size:11px;color:var(--hi);margin:9px 0 7px;font-weight:600}
  /* in-development project panel (docked studio inspector) */
  .std-project{border-top:1px solid var(--line);padding-top:9px}
  .std-projname{font-family:var(--sans);font-size:16px;font-weight:800;color:var(--hi);line-height:1.1}
  .std-projsub{font-family:var(--sans);font-size:10px;color:#a89bf0;margin:2px 0 8px;text-transform:capitalize}

  /* ── floater feedback ── */

  /* ── model review card (Motor1-style, shown on launch/redesign) ── */

  @keyframes rvSlideIn{from{transform:translateX(115%)}to{transform:translateX(0)}}

  .rv-brand{font-size:8px;letter-spacing:.24em;text-transform:uppercase;color:var(--amber);margin-bottom:10px}

  /* ── launch screen ── */

  .lnch-price-v{font-family:var(--sans);font-size:22px;font-weight:600;color:var(--amber)}

  /* ── tutorial card ── */

</style>

<body>
<header>
  <div class="brandmark">
    <div class="nm">Marque<span class="dot">.</span></div>
    <div class="sub">Auto Company Sim · 1990–2010</div>
  </div>
  <div class="clock" id="clock">Q1 · 1990</div>
  <div class="run-ctl">
    <button id="newRunBtn">↻ New Run</button>
    <button id="continueBtn">Continue Run</button>
  </div>
  <div class="cluster" id="cluster"></div>
</header>
<!-- main play area: world stays visible while the player works the dashboard -->
<div class="app">
  <div class="app-main">
    <!-- unified world canvas — the primary build and watch surface -->
    <div class="world-view" id="worldView">
      <canvas id="worldCanvas"></canvas>
      <!-- live broadcast ticker (Task 3) — rotates real sim-derived items, animates between quarters -->
      <div class="ticker-band" id="tickerBand"><div class="ticker-track" id="tickerTrack"></div></div>
      <!-- valuation readout + sparkline (Task 5) -->
      <div class="world-valuation" id="worldValuation"></div>
      <!-- rival scoreboard (Task 4) -->
      <div class="world-scoreboard" id="worldScoreboard"></div>
      <!-- docked building inspector — never floats over the map centre; always dismissable -->
      <div class="world-inspector" id="worldInspectorWrap" style="display:none">
        <button class="winsp-close" title="Close (Esc)" onclick="closeInspector()">×</button>
        <div id="worldInspector"></div>
      </div>
      <div class="world-toolbar" id="worldMenu"></div>
    </div>
    <div class="advance">
      <button id="advBtn">Advance Quarter ▸</button>
    </div>
  </div>

  <!-- dashboard: fixed side panel on desktop, collapsible bottom tray on mobile -->
  <aside class="app-side" id="appSide">
    <div id="goalBanner"></div>
    <div class="dashboard" id="dashboard">
      <div class="dash-tabs">
        <button class="dash-tab active" data-tab="lineup" onclick="setDashTab('lineup')">Lineup</button>
        <button class="dash-tab" data-tab="rd" onclick="setDashTab('rd')">R&amp;D</button>
        <button class="dash-tab" data-tab="market" onclick="setDashTab('market')">Market</button>
        <button class="dash-tab" data-tab="log" onclick="setDashTab('log')">Log</button>
        <button class="tray-toggle" id="trayToggle" onclick="toggleTray()" aria-label="Expand or collapse panel">▾</button>
      </div>
      <div class="dash-body">
        <div class="dash-panel" id="dashLineup">
          <div class="factory-brief" id="factoryBrief"></div>
          <div id="segments"></div>
          <div class="hint">Design a car per segment: pick engine + trim, set price, advance each quarter. Engine matters: V8 wins Coupe buyers on performance; I4 wins Sedan on efficiency. Rivals react every quarter. Refresh to reset novelty before it fades.</div>
        </div>
        <div class="dash-panel" id="dashRD" style="display:none"><div id="rd"></div></div>
        <div class="dash-panel" id="dashMarket" style="display:none">
          <svg class="chart" id="chart" viewBox="0 0 320 150" preserveAspectRatio="none"></svg>
          <div class="leg" id="chartleg"></div>
          <div id="rivalCards" style="margin-top:16px;display:flex;flex-direction:column;gap:8px"></div>
        </div>
        <div class="dash-panel" id="dashLog" style="display:none">
          <div class="log" id="log"></div>
        </div>
      </div>
    </div>
  </aside>
</div>

<!-- launch screen overlay — shown on new game, hidden after first car is designed -->
<div id="launchOverlay"></div>
<!-- first-run tutorial checklist — dismissible, localStorage-persisted -->
<div id="tutCard" style="display:none"></div>
<!-- world hover tooltip — fixed-position, follows cursor -->
<div class="world-tooltip" id="worldTooltip" style="display:none"></div>
<!-- Motor1-style review card — non-blocking side slide-in, auto-dismisses -->
<div id="reviewCard" style="display:none"></div>

<script>
/* ── global state ─────────────────────────────────────────────────────────── */
let st;
let pendingRD = { eng:50, eff:30, mfg:40 };
let pendingFactory = false;
let studioSel = null;   // { segId, engId, trimId } while a design is in progress in the Studio overlay
let launchSel = { segId:'sedan', engId:'I4', trimId:'mid' };
let launchObjId = 'share';
let launchSandbox = false;
let launchAdvanced = false;   // difficulty/goal/mode stay hidden behind this reveal
let _lastCash = 0, _lastShare = 0, _lastBrand = 0;
const SAVE_KEY = 'marque.save.v4';

const { newGame, advance, segShares, playerDesign, playerRefresh, playerRetire,
        quoteDesign, objectiveStatus, makeObjective, OBJECTIVES, endRecap,
        SEGS, ENGINES, TRIMS, C } = MarqueSim;

/* ── model nameplates ─────────────────────────────────────────────────────── */
const NAME_TABLE = {
  sedan:  { I4:'Sentry',  V6:'Meridian', V8:'Regent',  Hybrid:'Aero',    EV:'Nexus'    },
  suv:    { I4:'Terrain', V6:'Venture',  V8:'Summit',  Hybrid:'Range',   EV:'Volta'    },
  pickup: { I4:'Scout',   V6:'Frontier', V8:'Titan',   Hybrid:'Relay',   EV:'Atlas'    },
  coupe:  { I4:'Comet',   V6:'Vantage',  V8:'Apex',    Hybrid:'Eclipse', EV:'Spark'    },
};
function modelName(segId, engId){ return (NAME_TABLE[segId]||{})[engId] || `${engId} ${segId}`; }
function getSeg(id){ return SEGS.find(s=>s.id===id)||{name:id}; }

function ensureNameplates(st){
  const p = st.companies && st.companies.find(c=>c.player);
  if(p) p.models.forEach(m=>{ if(!m.nameplate) m.nameplate = modelName(m.segId, m.engId); });
}

/* Replace "your Sedan"/"your coupe"/"Your Coupe" and "the V8 coupe" in
   log/recap text with the actual nameplate so prose feels personal. */
function localizeHtml(html){
  if(!st) return html;
  const p = st.companies && st.companies.find(c=>c.player);
  if(!p) return html;
  let out = html;
  p.models.forEach(m=>{
    if(!m.nameplate) return;
    const seg = getSeg(m.segId).name;                   // e.g. "Sedan"
    const eng = ENGINES[m.engId] ? ENGINES[m.engId].name : '';
    // Match "your"/"Your" + optional inline tag + seg (handles "your <b>Sedan</b>")
    out = out.replace(
      new RegExp(`\\b(Y|y)our (<[^>]+>)?(${seg}|${seg.toLowerCase()})(</[^>]+>)?\\b`, 'g'),
      (_, cap, ot, _s, ct) => `${cap==='Y'?'The':'the'} ${ot||''}${m.nameplate}${ct||''}`
    );
    if(eng) out = out.replace(
      new RegExp(`\\bthe ${eng} ${seg.toLowerCase()}\\b`, 'gi'),
      `the ${m.nameplate}`
    );
  });
  return out;
}

/* ── rival personalities ─────────────────────────────────────────────────── */
const RIVAL_PERSONA = {
  velo:  { tagline:'Volume play — cheap, lean, undercutting', trait:'undercuts on price' },
  crown: { tagline:'Premium-first — brand-building, fat margins', trait:'holds premium pricing' },
  nuvo:  { tagline:'Performance-obsessed — V8-heavy, efficiency gap', trait:'bets on performance engines' },
};

/* ── Motor1-style review card ────────────────────────────────────────────── */
let _reviewDismissTimer = null;
let _reviewCount = 0;              // first review shows a touch longer than later ones
let _reviewClickHandler = null;

function buildReviewCard(m){
  const seg = SEGS.find(s=>s.id===m.segId)||{name:m.segId,refPrice:25,spread:5,w:{}};
  const eng = ENGINES[m.engId]||{name:m.engId,perf:0.4,eff:0.5,costAdd:0};
  const trim = TRIMS[m.trimId]||{name:m.trimId,featAdd:0.1,priceAdd:0};
  const w = seg.w||{};

  // price position
  const pDelta = (m.price - seg.refPrice) / seg.refPrice;
  const pricePos = pDelta < -0.08 ? 'value' : pDelta > 0.12 ? 'premium' : 'competitive';

  // verdict — three words covering price, powertrain, character
  const priceWord = pricePos==='value' ? 'Affordable' : pricePos==='premium' ? 'Premium' : 'Competitive';
  const engWord   = eng.perf>0.60 ? 'muscular' : eng.eff>0.72 ? 'efficient' : 'capable';
  const charWord  = trim.featAdd>0.22 ? 'refined' : trim.featAdd>0.1 ? 'practical' : 'anonymous';
  const verdict   = `"${priceWord}, ${engWord}, ${charWord}."`;

  // strength / weakness — highest/lowest weighted score
  const scored = [
    { name:'price value', s:(w.price||0.2) * (1 - Math.max(0,(m.price-seg.refPrice)/(seg.refPrice+1))) },
    { name:'efficiency',  s:(w.eff||0.1)  * eng.eff },
    { name:'performance', s:(w.perf||0.1) * eng.perf },
    { name:'features',    s:(w.feat||0.1) * (0.5 + trim.featAdd) },
    { name:'brand fit',   s:(w.brand||0.1)* (st.companies.find(c=>c.player).brand) },
  ].sort((a,b)=>b.s-a.s);
  const strength = scored[0].name;
  const weakness = scored[scored.length-1].name;

  // projected buyer archetype
  const buyerMap = {
    sedan:  { value:'economy commuters', competitive:'family buyers', premium:'executive commuters' },
    suv:    { value:'practical families', competitive:'active families', premium:'premium SUV buyers' },
    pickup: { value:'budget haulers', competitive:'work truck drivers', premium:'lifestyle truck buyers' },
    coupe:  { value:'young enthusiasts', competitive:'performance buyers', premium:'prestige collectors' },
  };
  const buyer = ((buyerMap[m.segId]||{})[pricePos]) || 'mainstream buyers';

  // rival threat — highest-share rival in this segment
  const shares = segShares(m.segId, st);
  const topRival = st.companies.filter(c=>!c.player)
    .map(c=>({ c, pct:Math.round(((shares[c.id]||{share:0}).share)*100) }))
    .sort((a,b)=>b.pct-a.pct)[0];
  const persona = topRival ? (RIVAL_PERSONA[topRival.c.id]||{trait:'holds share'}) : null;
  const rivalLine = topRival && topRival.pct > 5
    ? `${topRival.c.name} ${topRival.pct}% — ${persona.trait}`
    : 'No dominant rival yet';

  return { verdict, strength, weakness, buyer, rivalLine };
}

function showReviewCard(m){
  if(!m || !m.nameplate) return;
  const { verdict, strength, weakness, buyer, rivalLine } = buildReviewCard(m);
  const seg = SEGS.find(s=>s.id===m.segId)||{name:m.segId};
  const eng = ENGINES[m.engId]||{name:m.engId};
  const trim = TRIMS[m.trimId]||{name:m.trimId};

  const card = document.getElementById('reviewCard');
  if(!card) return;

  // Non-blocking side card: rests collapsed on the right, never captures map clicks.
  // Click the card → expand + pin; the × (or the auto-timeout while collapsed) hides it.
  card.innerHTML = `
    <button class="rv-x" title="Dismiss" onclick="dismissReviewCard()">×</button>
    <div class="rv-brand">Motor1 Review · ${st.year}</div>
    <div class="rv-name">${m.nameplate}</div>
    <div class="rv-spec">${eng.name} ${seg.name} · ${trim.name} · $${m.price.toFixed(1)}k</div>
    <div class="rv-verdict">${verdict}</div>
    <div class="rv-details">
      <div class="rv-row"><span class="rv-lbl">★ Strength</span><span class="rv-val">${strength}</span></div>
      <div class="rv-row"><span class="rv-lbl">✗ Weakness</span><span class="rv-val">${weakness}</span></div>
      <div class="rv-row"><span class="rv-lbl">Projects to</span><span class="rv-val">${buyer}</span></div>
      <div class="rv-row"><span class="rv-lbl">Rival threat</span><span class="rv-val rv-rival">${rivalLine}</span></div>
    </div>
    <div class="rv-more">▸ tap for the full read</div>`;

  card.classList.remove('rv-out','rv-expanded');
  card.classList.add('rv-collapsed');
  card.style.display = 'block';
  card.classList.remove('rv-in'); void card.offsetWidth; card.classList.add('rv-in');  // replay entrance

  // click the card body → expand + pin (does NOT dismiss; only the × / timeout hides)
  card.onclick = (e)=>{ if(e.target.closest('.rv-x')) return; expandReviewCard(); };

  // auto-dismiss ONLY while still collapsed: first review 4s, later ones 2s
  const ms = _reviewCount===0 ? 4000 : 2000;
  _reviewCount++;
  if(_reviewDismissTimer) clearTimeout(_reviewDismissTimer);
  _reviewDismissTimer = setTimeout(()=>{
    const c=document.getElementById('reviewCard');
    if(c && !c.classList.contains('rv-expanded')) dismissReviewCard();
  }, ms);
}

// clicking the card expands it to the full read and pins it open (cancels auto-dismiss)
function expandReviewCard(){
  const card = document.getElementById('reviewCard');
  if(!card || card.style.display==='none') return;
  card.classList.remove('rv-collapsed'); card.classList.add('rv-expanded');
  if(_reviewDismissTimer){ clearTimeout(_reviewDismissTimer); _reviewDismissTimer = null; }
}

function dismissReviewCard(){
  const card = document.getElementById('reviewCard');
  if(card && card.style.display!=='none'){
    card.classList.remove('rv-in'); card.classList.add('rv-out');
    setTimeout(()=>{ if(card.classList.contains('rv-out')) card.style.display='none'; }, 300);
  }
  if(_reviewDismissTimer){ clearTimeout(_reviewDismissTimer); _reviewDismissTimer = null; }
}

/* ── floating feedback ────────────────────────────────────────────────────── */
function showFloater(text, color){
  color = color || 'var(--amber)';
  const el = document.createElement('div');
  el.className = 'floater';
  el.style.color = color;
  el.style.bottom = '90px';  // viewport-stable: above the advance button
  el.textContent = text;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(), 2300);
}
// toast: non-blocking replacement for alert() — a brief message, no OK button.
function toast(text, kind){
  showFloater(text, kind==='error' ? 'var(--red)' : kind==='ok' ? 'var(--green)' : 'var(--amber)');
}
// inlineConfirm: non-blocking replacement for confirm() — a small docked panel
// with Cancel / Confirm, never a browser dialog, never blocks the board.
function inlineConfirm(message, onYes, yesLabel, danger){
  dismissInlineConfirm();
  const el = document.createElement('div');
  el.id = 'inlineConfirm'; el.className = 'inline-confirm';
  el.innerHTML = `<div class="ic-msg">${message}</div>
    <div class="ic-actions">
      <button class="btn" id="icNo">Cancel</button>
      <button class="btn ${danger?'danger':'primary'}" id="icYes">${yesLabel||'Confirm'}</button>
    </div>`;
  document.body.appendChild(el);
  document.getElementById('icNo').onclick = dismissInlineConfirm;
  document.getElementById('icYes').onclick = ()=>{ dismissInlineConfirm(); if(onYes) onYes(); };
}
function dismissInlineConfirm(){ const e=document.getElementById('inlineConfirm'); if(e) e.remove(); }

function floaterForBuildAction(actionType, obj){
  if(!obj) return;
  const CATALOG_DESC = {
    assembly: { place:'Capacity +120k/q', upgrade:'Capacity +120k/q (now 240k/plant)' },
    studio:   { place:'Model development unlocked', upgrade:'Refreshes 30% cheaper · novelty to 94%' },
    rdlab:    { place:null, upgrade:null }, // dynamic — depends on focus
  };
  if(obj.type === 'rdlab'){
    const focus = obj.labFocus || 'eng';
    const branch = focus==='eng'?'Powertrain':focus==='eff'?'Reliability':'Manufacturing';
    const bonus = actionType==='upgrade' ? '+$30M/q (total +$60M/q)' : '+$30M/q';
    showFloater(`${branch} R&D ${bonus}`, 'var(--teal,#3B8EA5)');
  } else {
    const msg = (CATALOG_DESC[obj.type]||{})[actionType];
    if(msg) showFloater(msg, obj.type==='studio'?'#7C6FD6':'var(--amber)');
  }
}

/* ── save / load (A7) ─────────────────────────────────────────────────────── */
function saveGame(){
  try {
    const campus = (typeof MarqueWorld!=='undefined') ? MarqueWorld.getCampus() : null;
    localStorage.setItem(SAVE_KEY, JSON.stringify({ st, campus, schemaVersion:4 }));
  } catch(e){}
  refreshRunButtons();
}
function hasSave(){ try { return !!localStorage.getItem(SAVE_KEY); } catch(e){ return false; } }
function loadGame(){
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if(!raw) return false;
    const data = JSON.parse(raw);
    if(!data || data.schemaVersion !== 4) return false;   // wrong schema → start fresh
    st = data.st;
    ensureNameplates(st);
    if(typeof MarqueWorld!=='undefined') MarqueWorld.loadCampus(data.campus || null);
    studioSel = null; pendingFactory = false;
    if(st.difficulty) launchDiff = st.difficulty;
    resetValuation();   // sparkline rebuilds across this session
    applyCampusToSim();
    _lastCash = st.companies.find(c=>c.player).cash;
    _lastShare = st.lastOverall*100;
    _lastBrand = st.companies.find(c=>c.player).brand*100;
    if(typeof MarqueWorld!=='undefined') MarqueWorld.setSimState(st);
    render();
    return true;
  } catch(e){ console.error('loadGame error', e); return false; }
}

/* ── campus ↔ sim bridge (PART B, the explicit input hook) ─────────────────── */
function applyCampusToSim(){
  if(typeof MarqueWorld==='undefined' || !st) return;
  const inputs = MarqueWorld.deriveCampusInputs(MarqueWorld.getCampus());
  st.companies.find(c=>c.player).factory.capacity = inputs.capacity;
}
// campus → design gating. The world reports studio presence/level; the shell reads
// it to decide whether in-game design/redesign is allowed (and how cheap refreshes are).
function studioInfo(){
  if(typeof MarqueWorld==='undefined') return { present:false, level:0 };
  return MarqueWorld.deriveCampusInputs(MarqueWorld.getCampus()).designStudio;
}
function hasStudio(){ return studioInfo().present; }
function studioLevel(){ return studioInfo().level; }
function initCampus(){
  MarqueWorld.init(document.getElementById('worldCanvas'), {
    menuEl: document.getElementById('worldMenu'),
    inspectorEl: document.getElementById('worldInspector'),
    getCash: () => st ? st.companies.find(c=>c.player).cash : 0,
    onSpend: (amt) => { if(st) st.companies.find(c=>c.player).cash -= amt; },
    onChange: () => { applyCampusToSim(); render(); saveGame(); },
    onArmChange: (armed) => document.getElementById('worldView').classList.toggle('world-armed', armed),
    onStudioOpen: () => openStudio(studioSel ? studioSel.segId : null),
    getStudioStatus: () => studioSel ? ('Designing ' + (SEGS.find(s=>s.id===studioSel.segId)?.name||'')) : 'Idle',
    studioBody: () => studioBody(),   // docked studio design panel (no modal)
    getActiveModels: () => {
      if(!st) return [];
      const player = st.companies.find(c=>c.player);
      return player.models.filter(m=>m.active).map(m=>{
        const s = SEGS.find(sg=>sg.id===m.segId)||{name:m.segId,refPrice:25};
        return { segId:m.segId, name:s.name, price:m.price,
                 floor:+(m.cost*1.02).toFixed(1), ceil:+(s.refPrice*1.65).toFixed(1),
                 nov:Math.round(m.novelty*100) };
      });
    },
    onHoverTip: (html, cx, cy) => {
      const tt = document.getElementById('worldTooltip');
      if(!html){ tt.style.display='none'; return; }
      const rect = document.getElementById('worldCanvas').getBoundingClientRect();
      tt.innerHTML = html; tt.style.display='block';
      tt.style.left = (rect.left+cx+14)+'px';
      tt.style.top  = (rect.top+cy-28)+'px';
    },
    onInspectorUpdated: (selId) => updateInspectorPopup(selId),
    onAction: (actionType, payload) => floaterForBuildAction(actionType, payload.obj),
  });
}
// arm the Design Studio build tool and bring the campus into view (the one-click
// path offered by the locked state in segment cards)
function armStudioBuild(){
  if(typeof MarqueWorld!=='undefined') MarqueWorld.toggleBuild('studio');
  const wv = document.getElementById('worldView');
  if(wv) wv.scrollIntoView({ behavior:'smooth', block:'center' });
}
function advisorAction(route){
  if(!route) return;
  const [type, param] = route.split(':');
  if(type === 'plant'){
    // the buildable catalog type is 'assembly' (there is no 'plant' type)
    if(typeof MarqueWorld!=='undefined') MarqueWorld.toggleBuild('assembly');
    const wv = document.getElementById('worldView');
    if(wv) wv.scrollIntoView({ behavior:'smooth', block:'center' });
  } else if(type === 'redesign' || type === 'design'){
    openStudio(param||null);
  } else if(type === 'seg'){
    const card = document.querySelector(`.seg-card[data-seg="${param}"]`);
    if(card) card.scrollIntoView({ behavior:'smooth', block:'center' });
  } else if(type === 'rd'){
    setDashTab('rd');
    const dt = document.getElementById('dashTabs');
    if(dt) dt.scrollIntoView({ behavior:'smooth', block:'nearest' });
  }
}
function refreshRunButtons(){
  const cont = document.getElementById('continueBtn');
  if(cont) cont.disabled = !hasSave();
}

/* ── dashboard tab switching ────────────────────────────────────────────── */
function setDashTab(tab){
  document.querySelectorAll('.dash-tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));
  ['dashLineup','dashRD','dashMarket','dashLog'].forEach(id=>{
    const el=document.getElementById(id); if(el) el.style.display='none';
  });
  const map={lineup:'dashLineup',rd:'dashRD',market:'dashMarket',log:'dashLog'};
  const target=document.getElementById(map[tab]||'dashLineup');
  if(target) target.style.display='block';
  // on mobile, tapping a tab raises the bottom tray so its panel is visible
  const side=document.getElementById('appSide');
  if(side) side.classList.add('tray-open');
}
// collapse/expand the mobile dashboard tray (no-op affordance on desktop)
function toggleTray(){
  const side=document.getElementById('appSide');
  if(side) side.classList.toggle('tray-open');
}

/* ── world inspector popup positioning ──────────────────────────────────── */
function updateInspectorPopup(selId){
  // The inspector is docked to the world view via CSS; here we only toggle its
  // visibility and mark the world as "inspecting" (which hides the scoreboard so
  // the two right-corner panels never overlap). Never floats over the board centre.
  const wrap = document.getElementById('worldInspectorWrap');
  const wv = document.getElementById('worldView');
  const open = !!selId && typeof MarqueWorld!=='undefined';
  // if we've navigated away from the studio, drop any in-progress design
  if(open){
    const o = MarqueWorld.getCampus().objects.find(x=>x.id===selId);
    if(!o || o.type!=='studio') studioSel = null;
  } else {
    studioSel = null;
  }
  if(wrap) wrap.style.display = open ? 'block' : 'none';
  if(wv) wv.classList.toggle('inspecting', open);
}
function closeInspector(){
  if(typeof MarqueWorld!=='undefined') MarqueWorld.deselect();
  updateInspectorPopup(null);
}

function worldSetModelPrice(segId, price){

/* ── formatting ─────────────────────────────────────────────────────────── */
function fmtM(v){
  const a=Math.abs(v);
  return a>=1000 ? (v/1000).toFixed(2).replace(/\.?0+$/,'')+'B' : Math.round(v)+'M';
}
function deltaHtml(now, prev, money){
  const d=now-prev; if(Math.abs(d)<0.01) return `<span class="dim">—</span>`;
  const cls=d>0?'up':'down', ar=d>0?'▲':'▼';
  const txt=money?'$'+fmtM(Math.abs(d)):Math.abs(d).toFixed(1);
  return `<span class="${cls}">${ar} ${txt}</span>`;
}
function carSVG(hex){
  return `<svg viewBox="0 0 40 20" fill="${hex}"><path d="M2 14 Q3 9 9 8 L13 4 Q15 2 20 2 L27 2 Q31 2 33 6 L37 8 Q39 9 38 13 L38 15 Q38 16 36 16 L4 16 Q2 16 2 14 Z"/><circle cx="11" cy="16" r="3" fill="#15171C"/><circle cx="30" cy="16" r="3" fill="#15171C"/></svg>`;
}
function engHP(e){ return Math.round(120 + e.perf * 400); }
function engFuel(e){
  if(e.name==='EV') return '~110 MPGe';
  return Math.round(17 + e.eff * 22) + ' mpg';
}

function toggleLaunchAdvanced(){ launchAdvanced=!launchAdvanced; renderLaunchScreen(); }

function setLaunchSel(segId, engId, trimId){
  if(segId !== null){
    launchSel.segId = segId;
    // reset engine to first valid for new bodystyle if current doesn't fit
    const valid = Object.keys(ENGINES).filter(id => ENGINES[id].fits.includes(segId) && C.startYear >= ENGINES[id].unlock);
    if(!valid.includes(launchSel.engId)) launchSel.engId = valid[0] || 'I4';
  }
  if(engId  !== null) launchSel.engId  = engId;
  if(trimId !== null) launchSel.trimId = trimId;
  renderLaunchScreen();
}

function setLaunchSandbox(val){
  launchSandbox = val;
  renderLaunchScreen();
}
function setLaunchObj(id){
  launchObjId = id;
  st.objective = makeObjective(id);
  applyDifficulty(st, launchDiff);   // re-apply: objective change resets targetShare
  renderLaunchScreen();
}

function confirmLaunch(){
  const pr = document.getElementById('lnchPr');
  const price = pr ? parseFloat(pr.value) : null;
  st.objective = makeObjective(launchObjId);
  st.sandbox = launchSandbox;
  const result = playerDesign(st, launchSel.segId, launchSel.engId, launchSel.trimId, price);
  if(!result.ok){
    // shouldn't happen at launch (player always has enough cash) but guard
    toast(result.reason, 'error'); return;
  }
  ensureNameplates(st);
  const newM = st.companies.find(c=>c.player).models.find(m=>m.segId===launchSel.segId&&m.active);
  const isHalo = newM && newM.segId==='coupe' && (newM.engId==='V8'||newM.engId==='V12');
  showFloater(isHalo ? `${newM.nameplate||'Coupe'} launched · halo brand boost active` : `${newM ? (newM.nameplate||launchSel.segId) : launchSel.segId} launched`, 'var(--green)');
  if(newM) showReviewCard(newM);
  st.launchFlow = false;
  document.getElementById('launchOverlay').style.display = 'none';
  if(typeof MarqueWorld!=='undefined') MarqueWorld.setSimState(st);
  render();
  saveGame();
}

/* ── render ─────────────────────────────────────────────────────────────── */

// RCT-style progressive disclosure: the first quarter shows only the car, the
// rivals, and the one next action. R&D, capacity math, and the build menu wait
// until the player is past the first loop. Nothing is deleted — just deferred.
function applyProgressiveDisclosure(){
  if(!st) return;
  const early = earlyGame();
  const rdTab = document.querySelector('.dash-tab[data-tab="rd"]');
  if(rdTab) rdTab.style.display = early ? 'none' : '';
  const fb = document.getElementById('factoryBrief');
  if(fb) fb.style.display = early ? 'none' : '';
  const menu = document.getElementById('worldMenu');
  if(menu) menu.style.display = early ? 'none' : '';
}

/* ── segment cards ─────────────────────────────────────────────────────── */
function renderSegments(){
  const player = st.companies.find(c=>c.player);
  const wrap = document.getElementById('segments');
  wrap.innerHTML = '';

  SEGS.forEach(s => {
    const pm = player.models.find(m=>m.segId===s.id&&m.active);

    const div = document.createElement('div');
    div.className = pm ? 'seg' : 'seg seg--empty';
    div.dataset.seg = s.id;
    let html;

    /* current model block */

      const sh = shares['you'];
      const shPct = sh ? Math.round(sh.share*100) : 0;

      const nov = Math.round(pm.novelty*100);
      const novColor = nov>60?'var(--green)':nov>35?'var(--amber)':'var(--red)';
      const floorPrice = +(pm.cost*1.02).toFixed(1);
      const ceilPrice  = +(s.refPrice*1.65).toFixed(1);
      const isHalo = pm.segId==='coupe' && (pm.engId==='V8'||pm.engId==='V12');
      html = `<div class="seg-head">
        <div class="seg-name">${s.name}</div>
        <div class="seg-meta">${s.demand}k units/q · ref $${s.refPrice}k</div>
      </div>
      <div class="model-row">
        <div class="model-badge">
          <div class="eng">${pm.nameplate || ENGINES[pm.engId].name}</div>
          <div class="trm">${ENGINES[pm.engId].name} · ${TRIMS[pm.trimId].name} · $${pm.cost}k/unit</div>
          <div class="nov-bar"><i style="width:${nov}%;background:${novColor}"></i></div>
          <div class="nov-lbl">Novelty ${nov}%</div>
          ${pm.recallQ>0?`<span class="recall-badge">⚠ Recall (${pm.recallQ}q)</span>`:''}
          ${isHalo?`<div class="halo-badge">★ Halo · +brand/q</div>`:''}
        </div>
        <div class="price-ctl">
          <div class="price-row"><span class="k">Your price</span>
            <span class="v" id="pv-${s.id}">$${pm.price.toFixed(1)}k</span></div>
          <input type="range" id="pr-${s.id}"

          <div class="share-proj" id="sp-${s.id}">

          </div>
        </div>
      </div>`;

      /* car icons row */
      const myE = shares['you'];
      const units = myE ? Math.round(s.demand * myE.share) : 0;
      const nCars = Math.min(Math.round(units/8), 16);

      for(let i=0;i<nCars;i++) carsHtml += carSVG('#377BF8');

      const refreshCost = refreshCostFor(s);
      const redesignBtn = studioHere
        ? `<button class="btn" onclick="openStudio('${s.id}')">Redesign in Studio ▸</button>`
        : `<button class="btn locked" onclick="armStudioBuild()" title="Build a Design Studio to redesign">🔒 Build a Studio to redesign</button>`;
      html += `<div class="seg-actions">
        ${redesignBtn}
        <button class="btn" onclick="doRefresh('${s.id}')" ${player.cash<refreshCost?'disabled':''}>
          Refresh $${refreshCost}M</button>
        <button class="btn danger" onclick="doRetire('${s.id}')">Retire</button>
      </div>`;
    } else {
      const isNewSeg = !(player.launchedSegs && player.launchedSegs[s.id]);
      const toolCost = isNewSeg ? ` · $${C.segmentLaunchCost}M to enter` : ' · tooled, re-entry';
      const enterBtn = studioHere
        ? `<button class="btn" style="padding:3px 10px;font-size:11px" onclick="openStudio('${s.id}')">Enter ▸</button>`
        : `<button class="btn" style="padding:3px 10px;font-size:11px" onclick="armStudioBuild()">+ Studio first</button>`;
      html = `<div class="seg-head">
        <div class="seg-name">${s.name}</div>
        <div class="seg-meta">${s.demand}k units/q · ref $${s.refPrice}k${toolCost}</div>
        ${enterBtn}
      </div>`;
    }

    /* competitor share bar */
    const ordered = [...st.companies].sort((a,b)=>a.player?-1:b.player?1:0);
    html += `<div class="sharebar" id="sharebar-${s.id}">
      ${ordered.map(co=>{
        const e=shares[co.id]; const pct=e?(e.share*100).toFixed(1):'0';

    </div>
    <div class="leg" id="leg-${s.id}">
      ${ordered.map(co=>{
        const e=shares[co.id]; const pct=e?Math.round(e.share*100):0;

        return `<span class="it"><span class="sw" style="background:${co.hex}"></span>${co.name} ${pct}%${m&&!co.player?' ('+ENGINES[m.engId].name+')':''}</span>`;

    div.innerHTML = html;

    /* bind price slider — syncs projection text, sharebar, legend, car icons */
    const slider = div.querySelector(`#pr-${s.id}`);

        const ord2 = [...st.companies].sort((a,b)=>a.player?-1:b.player?1:0);

        if(sbEl) sbEl.innerHTML = ord2.map(co=>{

}

/* ── R&D ──────────────────────────────────────────────────────────────── */
function rdLabBonuses(){
  if(typeof MarqueWorld==='undefined') return { eng:0, eff:0, mfg:0 };
  const b = MarqueWorld.deriveCampusInputs(MarqueWorld.getCampus()).rdBonuses;
  return { eng:b.eng||0, eff:b.eff||0, mfg:b.mfg||0 };
}
function renderRD(){
  const player = st.companies.find(c=>c.player);
  const labBonuses = rdLabBonuses();
  const branches = [
    { k:'eng', name:'Powertrain',
      sub:'performance + quality · reduces recall risk',
      pct: () => (1-Math.exp(-player.rd.eng/C.rdEffort)),
      effect: () => {
        const prog = 1-Math.exp(-player.rd.eng/C.rdEffort);
        const q = Math.round((0.50 + C.qualityCap*prog)*100);
        return `Quality ${q}% · recall risk ↓ with quality`;
      }
    },
    { k:'eff', name:'Reliability',
      sub:'fuel economy and range across all models',
      pct: () => (1-Math.exp(-player.rd.eff/C.rdEffort)),
      effect: () => {
        const prog = 1-Math.exp(-player.rd.eff/C.rdEffort);
        const bonus = Math.round(C.effBonusCap*prog*100);
        return `Efficiency bonus +${bonus}%`;
      }
    },
    { k:'mfg', name:'Manufacturing',
      sub:'lowers unit production cost per car',
      pct: () => (1-Math.exp(-player.rd.mfg/C.rdEffort)),
      effect: () => {
        const prog = 1-Math.exp(-player.rd.mfg/C.rdEffort);
        const cut = Math.round(C.mfgCostCut*prog*100);
        return `Cost reduction ${cut}%`;
      }
    },
  ];
  const wrap = document.getElementById('rd'); wrap.innerHTML = '';
  branches.forEach(b => {
    const div = document.createElement('div'); div.className = 'rd';
    const pct = Math.round(b.pct()*100);
    const branchBonus = labBonuses[b.k] || 0;
    const labLine = branchBonus>0
      ? `<div class="rd-effect" style="color:var(--green)">+$${branchBonus}M/q from R&D Lab</div>` : '';
    div.innerHTML = `
      <div class="row">
        <span class="k">${b.name}<small>${b.sub}</small></span>
        <span class="v" id="rdv-${b.k}">$${pendingRD[b.k]}M</span>
      </div>
      <input type="range" id="rds-${b.k}" min="0" max="130" step="5" value="${pendingRD[b.k]}">
      <div class="statbar"><i style="width:${pct}%"></i></div>
      <div class="rd-effect">${b.effect()}</div>${labLine}`;
    wrap.appendChild(div);
    div.querySelector(`#rds-${b.k}`).addEventListener('input', e => {
      pendingRD[b.k] = parseInt(e.target.value);
      document.getElementById(`rdv-${b.k}`).textContent = `$${pendingRD[b.k]}M`;
      const el = document.getElementById('rdtot');
      if(el){
        const manual = pendingRD.eng+pendingRD.eff+pendingRD.mfg;
        const totalLab = labBonuses.eng+labBonuses.eff+labBonuses.mfg;
        el.textContent = `$${manual+totalLab}M`;
      }
    });
  });
  const tot = document.createElement('div'); tot.className = 'rd-total';
  const rdManual = pendingRD.eng+pendingRD.eff+pendingRD.mfg;
  const totalLabBonus = labBonuses.eng+labBonuses.eff+labBonuses.mfg;
  const rdGrandTotal = rdManual + totalLabBonus;
  tot.innerHTML = `<span class="dim">Total this quarter</span>`
    + `<b id="rdtot">$${rdGrandTotal}M</b>`
    + (totalLabBonus>0 ? `<span class="dim" style="font-size:10px;margin-left:8px">($${rdManual}M manual + $${totalLabBonus}M lab)</span>` : '');
  wrap.appendChild(tot);
}

/* ── factory brief — compact summary at top of Lineup tab ─────────────── */
function renderFactory(){
  const el = document.getElementById('factoryBrief');
  if(!el || !st) return;
  const player = st.companies.find(c=>c.player);
  const cap = player.factory.capacity;
  const projDemand = SEGS.reduce((sum,s)=>{
    const sh = segShares(s.id,st)['you']; return sum+(sh?sh.units:0);
  },0);
  const bottleneck = projDemand > cap*0.92;
  const activeCount = player.models.filter(m=>m.active).length;
  const overhead = Math.round(C.overheadBase + C.overheadPerModel*activeCount + Math.round(C.capacityCarry*cap));
  el.innerHTML = `Factory: <b>${cap}k</b>/q · Proj: <b style="color:${bottleneck?'var(--red)':'var(--hi)'}">${Math.round(projDemand)}k</b>`
    + ` · Overhead: <b>$${overhead}M</b>/q`
    + (bottleneck?` &nbsp;<span style="color:var(--red)">⚠ capacity throttling sales</span>`:'')
    + ` &nbsp;<span style="color:var(--dimmer)">— build/upgrade Assembly Plants to expand</span>`;
}

/* ── chart ────────────────────────────────────────────────────────────── */
function renderChart(){
  const svg = document.getElementById('chart');
  const W=320,H=150,pad=4,n=st.history.length;
  if(n<1){svg.innerHTML='';return;}
  let out='';
  [.25,.5,.75].forEach(g=>{
