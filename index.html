/* ── live broadcast layer: ticker + scoreboard + valuation (Tasks 3-5) ──────
   All PRESENTATION. These functions read sim state and never mutate it. The
   ticker scrolls and the valuation jitters on their own rAF loop so the world
   stays visibly "live" between quarters; real repricing happens only on Advance. */

// Derived company valuation ("share price"): a sensible blend of cash, overall
// share, brand, and recent share momentum. Pure read of state.
function companyValuation(state){
  state = state || st;
  const player = state.companies && state.companies.find(c=>c.player);
  if(!player) return 0;
  const sharePct = (state.lastOverall||0)*100;
  const brand = player.brand*100;
  const cash = player.cash;
  let mom = 0;
  const h = state.history;
  if(h && h.length>=2) mom = ((h[h.length-1]['you']||0) - (h[h.length-2]['you']||0))*100;
  const price = 12 + cash*0.02 + sharePct*1.7 + brand*0.35 + mom*5;
  return Math.max(1, price);
}

// per-run valuation history (shell-local, presentation only — not in the sim save)
let valHist = [];
function recordValuation(){ valHist.push(companyValuation(st)); if(valHist.length>24) valHist.shift(); }
function resetValuation(){ valHist = []; }

// share trend for a company vs the previous quarter (from sim history)
function shareTrend(coId){
  const h = st.history; if(!h || h.length<2) return 0;
  return (h[h.length-1][coId]||0) - (h[h.length-2][coId]||0);
}
function arrowSpan(delta, eps){ eps = eps||0.002;
  if(delta >  eps) return '<span class="tk-up">▲</span>';
  if(delta < -eps) return '<span class="tk-down">▼</span>';
  return '<span class="tk-flat">·</span>';
}

// a short, in-character "latest move" for a rival, derived from their lineup
function rivalTopModel(co){
  let best=null; (co.models||[]).filter(m=>m.active).forEach(m=>{ if(!best||(m.lastShare||0)>(best.lastShare||0)) best=m; });
  return best;
}
function rivalMoveText(co){
  const persona = RIVAL_PERSONA[co.id]||{trait:'holding position'};
  const m = rivalTopModel(co);
  if(!m) return persona.trait;
  const seg = getSeg(m.segId).name;
  const eng = (ENGINES[m.engId]||{name:m.engId}).name;
  const price = m.price!=null ? '$'+m.price.toFixed(0)+'k' : '';
  if(co.id==='velo')  return `Undercutting ${seg} at ${price}`;
  if(co.id==='crown') return `Holding premium ${seg}, ${price}`;
  if(co.id==='nuvo')  return `Pushing ${eng} ${seg}, ${price}`;
  return `Leads with ${seg} ${eng}`;
}

// build the rotating ticker item set from real state
function tickerData(){
  const items = [];
  const player = st.companies.find(c=>c.player);
  const val = companyValuation(st);
  const prevVal = valHist.length>=2 ? valHist[valHist.length-2] : val;
  const vd = val - prevVal, vpct = prevVal ? vd/prevVal*100 : 0;
  items.push({cls:'tk-stock', html:`<span class="tk-k">MRQE</span> <span class="tk-v tk-stock-val">$${val.toFixed(2)}</span> ${arrowSpan(vd,0.01)} <span class="${vd>=0?'tk-up':'tk-down'}">${vd>=0?'+':''}${vpct.toFixed(1)}%</span>`});
  items.push({cls:'', html:`<span class="tk-k">Your Share</span> <span class="tk-v">${((st.lastOverall||0)*100).toFixed(1)}%</span> ${arrowSpan(shareTrend('you'))}`});
  items.push({cls:'', html:`<span class="tk-k">Brand</span> <span class="tk-v">${Math.round(player.brand*100)}</span>`});
  if(st.tick>0){ const p=st.lastProfit; items.push({cls:'', html:`<span class="tk-k">Last Q</span> <span class="${p>=0?'tk-up':'tk-down'}">${p>=0?'+':'-'}$${Math.abs(Math.round(p))}M</span>`}); }
  st.companies.filter(c=>!c.player).forEach(co=>{
    items.push({cls:'', html:`<span class="tk-k" style="color:${co.hex}">${co.name}</span> <span class="tk-v">${Math.round((co.lastShareOverall||0)*100)}%</span> ${arrowSpan(shareTrend(co.id))} <span style="color:var(--dimmer)">${rivalMoveText(co)}</span>`});
  });
  (player.models||[]).filter(m=>m.active&&m.recallQ>0).forEach(m=>{
    items.push({cls:'', html:`<span class="tk-recall">⚠ RECALL</span> <span style="color:var(--dim)">${getSeg(m.segId).name} defect — brand &amp; cash hit</span>`});
  });
  if(st.lastEvents && st.lastEvents.length){
    const txt = String(st.lastEvents[st.lastEvents.length-1]).replace(/<[^>]+>/g,'');
    if(txt.trim()) items.push({cls:'', html:`<span class="tk-k">News</span> <span style="color:var(--dim)">${txt}</span>`});
  }
  return items;
}

let tickerX=0, tickerHalf=0, tickerBaseVal=0;
function buildTicker(){
  const track = document.getElementById('tickerTrack'); if(!track) return;
  const one = tickerData().map(it=>`<span class="tk-item ${it.cls}">${it.html}</span>`).join('');
  track.innerHTML = one + one;     // two identical copies → seamless wrap
  tickerHalf = 0;                  // force recompute on next frame
}

// ── THE matchup: your car vs the three rivals in your main segment ──────────
// This is the centerpiece — always visible on the world HUD, no tab required.
function playerPrimarySeg(){
  const player = st.companies.find(c=>c.player);
  const actives = (player.models||[]).filter(m=>m.active);
  if(!actives.length) return null;
  let best=null;
  actives.forEach(m=>{
    const sh = segShares(m.segId, st)['you'];
    const units = sh ? sh.share*getSeg(m.segId).demand : 0;
    if(!best || units>best.units) best={segId:m.segId, units};
  });
  return best ? best.segId : actives[0].segId;
}
function renderMatchup(){
  const el = document.getElementById('worldScoreboard'); if(!el) return;
  if(!st || st.launchFlow){ el.style.display='none'; return; }
  const segId = playerPrimarySeg();
  if(!segId){ el.style.display='none'; return; }
  el.style.display='block';
  const seg = getSeg(segId);
  const shares = segShares(segId, st);
  const rows = st.companies.map(co=>{
    const e=shares[co.id];
    const m=co.models.find(x=>x.segId===segId&&x.active);
    return { co, share:e?e.share:0, eng:m?ENGINES[m.engId].name:null, active:!!m };
  }).filter(r=>r.active).sort((a,b)=>b.share-a.share);
  if(!rows.length){ el.style.display='none'; return; }
  const leader = rows[0];
  const youRow = rows.find(r=>r.co.player);
  const youRank = youRow ? rows.indexOf(youRow)+1 : rows.length;
  const maxShare = Math.max(...rows.map(r=>r.share), 0.001);
  const foot = youRank===1
    ? `<span class="mu-win">▲ You lead ${seg.name}</span>`
    : `<span class="mu-chase">#${youRank} · chasing ${leader.co.name}</span>`;
  el.innerHTML = `<div class="mu-title">${seg.name} · You vs the Field</div>` +
    rows.map(r=>{
      const pct=Math.round(r.share*100), w=Math.round(r.share/maxShare*100);
      return `<div class="mu-row${r.co.player?' mu-you':''}">
        <span class="mu-name" style="color:${r.co.hex}">${r.co.player?'You':r.co.name}${r.eng?` <span class="mu-eng">${r.eng}</span>`:''}${r===leader?' <span class="mu-crown">👑</span>':''}</span>
        <span class="mu-barwrap"><i class="mu-bar" style="width:${w}%;background:${r.co.hex}"></i></span>
        <span class="mu-pct">${pct}%</span>
      </div>`;
    }).join('') +
    `<div class="mu-foot">${foot}</div>`;
}

// overtake beat: remember which rivals were ahead of you in your main segment,
// then celebrate when you pass one after an Advance.
let _prevSeg=null, _prevBehind={};
function snapshotMatchup(){
  _prevSeg = playerPrimarySeg(); _prevBehind={};
  if(!_prevSeg) return;
  const shares = segShares(_prevSeg, st);
  const you = shares['you'] ? shares['you'].share : 0;
  st.companies.filter(c=>!c.player).forEach(co=>{
    const e=shares[co.id]; if(e && e.share>you) _prevBehind[co.id]=true;
  });
}
function checkOvertakes(){
  const segId = playerPrimarySeg();
  if(!segId || segId!==_prevSeg) return;
  const shares = segShares(segId, st);
  const you = shares['you'] ? shares['you'].share : 0;
  st.companies.filter(c=>!c.player).forEach(co=>{
    const e=shares[co.id]; const theirs=e?e.share:0;
    if(_prevBehind[co.id] && you>theirs){
      showFloater(`You passed ${co.name} in ${getSeg(segId).name}! ▲`, 'var(--green)');
    }
  });
}

function sparkline(arr){
  const w=120,h=22;
  if(!arr || arr.length<2) return `<svg class="wv-spark" width="${w}" height="${h}"></svg>`;
  const n=arr.length, min=Math.min(...arr), max=Math.max(...arr), rng=(max-min)||1;
  const pts=arr.map((v,i)=>`${(i/(n-1)*w).toFixed(1)},${(h-((v-min)/rng)*h).toFixed(1)}`).join(' ');
  const up=arr[n-1]>=arr[0];
  return `<svg class="wv-spark" width="${w}" height="${h}"><polyline points="${pts}" fill="none" stroke="${up?'var(--green)':'var(--red)'}" stroke-width="1.4" stroke-linejoin="round" stroke-linecap="round"/></svg>`;
}
function renderValuation(){
  const el = document.getElementById('worldValuation'); if(!el) return;
  if(!st || st.launchFlow){ el.style.display='none'; return; }
  el.style.display='block';
  const val = companyValuation(st);
  const prev = valHist.length>=2 ? valHist[valHist.length-2] : val;
  const d = val - prev, pct = prev ? d/prev*100 : 0, cls = d>=0?'tk-up':'tk-down';
  el.innerHTML = `<div class="wv-k">Marque Valuation</div>
    <div><span class="wv-price" id="wvPrice">$${val.toFixed(2)}</span><span class="wv-trend ${cls}">${d>=0?'▲':'▼'} ${Math.abs(pct).toFixed(1)}%</span></div>
    <div class="wv-sub">per share · ${valHist.length} q tracked</div>
    ${sparkline(valHist)}`;
}

// Is this the very first quarter (before the first Advance)? During it we keep the
// finance layer (ticker + valuation) hidden so the only story is car-vs-rivals.
function earlyGame(){ return st && !st.launchFlow && (st.tick||0) < 1; }

// rebuild the whole broadcast layer (called from render(), i.e. after each Advance).
// The matchup (your car vs the field) is ALWAYS on; the finance ticker/valuation
// stay hidden until the player is past the first loop.
function renderBroadcast(){
  const band = document.getElementById('tickerBand');
  const val = document.getElementById('worldValuation');
  renderMatchup();                       // the centerpiece — always current
  if(!st || st.launchFlow || st.over || earlyGame()){
    if(band) band.style.display='none';
    if(val) val.style.display='none';
    return;
  }
  if(valHist.length===0) recordValuation();
  if(band) band.style.display='flex';
  tickerBaseVal = companyValuation(st);
  buildTicker();
  renderValuation();
}

// continuous rAF loop: scrolls the ticker and jitters the valuation between
// quarters so the world feels live even when the player isn't advancing.
let broadcastStarted=false, lastBroadcastTs=0;
function startBroadcast(){ if(broadcastStarted) return; broadcastStarted=true; requestAnimationFrame(broadcastLoop); }
function broadcastLoop(ts){
  if(!lastBroadcastTs) lastBroadcastTs=ts;
  const dt = Math.min((ts-lastBroadcastTs)/1000, 0.05); lastBroadcastTs=ts;
  const track = document.getElementById('tickerTrack');
  if(track && st && !st.launchFlow && !st.over){
    if(tickerHalf<=0) tickerHalf = track.scrollWidth/2;
    tickerX -= 42*dt;
    if(tickerHalf>0 && tickerX <= -tickerHalf) tickerX += tickerHalf;
    track.style.transform = `translateX(${tickerX}px)`;
    if(tickerBaseVal>0){
      const jit = tickerBaseVal*(1+(Math.random()-0.5)*0.004);
      const txt = '$'+jit.toFixed(2);
      document.querySelectorAll('.tk-stock-val').forEach(s=>{ s.textContent=txt; });
      const wp = document.getElementById('wvPrice'); if(wp) wp.textContent=txt;
    }
  }
  requestAnimationFrame(broadcastLoop);
}

/* ── log ─────────────────────────────────────────────────────────────── */

/* ── Design Studio overlay — the home of in-game design/redesign ─────────── */
// Gated on a built Design Studio. The founding launch uses its own overlay and is
// never gated; everything after it routes through here, opened from the studio
// building (click or inspector) or from the segment-card pointers.
function defaultDesignFor(segId){
  const player = st.companies.find(c=>c.player);
  const pm = player.models.find(m=>m.segId===segId&&m.active);
  const validEngs = Object.keys(ENGINES).filter(id=>ENGINES[id].fits.includes(segId)&&st.year>=ENGINES[id].unlock);
  return { segId,
           engId:  pm ? pm.engId  : validEngs[Math.floor(validEngs.length/2)],
           trimId: pm ? pm.trimId : 'mid' };
}
// Open the Studio ON THE MAP: select the studio building so its docked inspector
// shows the design panel. No full-screen modal.
function openStudio(segId){
  if(!hasStudio()){ armStudioBuild(); return; }   // safety: no studio → route to building one
  const selStudio = ()=>{ if(typeof MarqueWorld!=='undefined'){
    const studio = MarqueWorld.getCampus().objects.find(o=>o.type==='studio');
    if(studio) MarqueWorld.selectBuilding(studio.id); } };
  if(st.studioProject){   // one project at a time — open the panel so they see progress
    selStudio(); toast('The Studio is busy developing '+(st.studioProject.nameplate||'a car')+'.', 'error');
    render(); return;
  }
  studioSel = segId ? defaultDesignFor(segId) : null;
  selStudio();
  render();
}
function studioPickSeg(segId){ studioSel = defaultDesignFor(segId); refreshStudioPanel(); }
function studioSetDesign(engId, trimId){
  if(!studioSel) return;
  studioSel.engId = engId; studioSel.trimId = trimId;
  refreshStudioPanel();
}
function studioBackToSegs(){ studioSel = null; refreshStudioPanel(); }
// re-render the docked studio inspector in place (no overlay)
function refreshStudioPanel(){ if(typeof MarqueWorld!=='undefined') MarqueWorld.renderPanels(); }
// Studio projects: designing/redesigning takes time and shows on the Studio building
// (Tasks 2–3). New models take 2 quarters; a redesign reuses the platform, so 1.
function projectQuarters(isRedesign){ return isRedesign ? 1 : 2; }
function activeStudioProject(){ return st ? st.studioProject : null; }

// Start a project instead of launching instantly. Cost is charged at completion
// (playerDesign), so we verify affordability now and re-check when it rolls out.
function studioConfirm(){
  if(!studioSel) return;
  if(st.studioProject){ toast('The Studio is already developing '+(st.studioProject.nameplate||'a car')+'.', 'error'); return; }
  const s = SEGS.find(x=>x.id===studioSel.segId);
  const player = st.companies.find(c=>c.player);
  const q = quoteDesign(st, studioSel.segId, studioSel.engId, studioSel.trimId);
  if(player.cash < q.total){ toast('Need $'+q.total+'M to start this project.', 'error'); return; }
  const existing = player.models.find(m=>m.segId===studioSel.segId&&m.active);
  const isRedesign = !!existing;
  const nameplate = (isRedesign && existing.nameplate) ? existing.nameplate : modelName(studioSel.segId, studioSel.engId);
  const qn = projectQuarters(isRedesign);
  st.studioProject = { segId:studioSel.segId, engId:studioSel.engId, trimId:studioSel.trimId,
                       segName:s.name, nameplate, isRedesign, quartersLeft:qn, totalQuarters:qn };
  showFloater(`${nameplate} — ${isRedesign?'redesign':'design'} started · ${qn}q in the Studio`, '#7C6FD6');
  studioSel = null;
  if(typeof MarqueWorld!=='undefined') MarqueWorld.setSimState(st);   // badge appears immediately
  render();          // docked studio panel now shows the in-development project
  saveGame();
}

// Called from doAdvance: tick the active project; when ready, commit it to the economy.
function completeStudioProject(){
  const proj = st.studioProject;
  if(!proj) return;
  proj.quartersLeft = Math.max(0, proj.quartersLeft - 1);
  if(proj.quartersLeft > 0) return;                 // still in development
  const result = playerDesign(st, proj.segId, proj.engId, proj.trimId);
  if(!result.ok){ proj.quartersLeft = 1; toast(`${proj.nameplate}: ${result.reason} — held in the Studio.`, 'error'); return; }
  ensureNameplates(st);
  const dm = st.companies.find(c=>c.player).models.find(m=>m.segId===proj.segId&&m.active);
  if(dm) dm.nameplate = proj.nameplate;             // keep the name the badge showed
  const halo = dm && dm.segId==='coupe' && (dm.engId==='V8'||dm.engId==='V12');
  showFloater(halo ? `${proj.nameplate} rolls out · halo active` : `${proj.nameplate} rolls out of the Studio`, 'var(--green)');
  st.studioProject = null;
  if(dm) showReviewCard(dm);                        // non-blocking side card on completion
}

// The docked Studio panel body (rendered inside the studio building's inspector by
// world.js via opts.studioBody). Holds the entire design/redesign flow — no modal.
function studioBody(){
  const player = st.companies.find(c=>c.player);
  const lvl = studioLevel();
  const perk = lvl>=2
    ? `<div class="std-perk ok">L2 · refreshes 30% cheaper, restore to 94%</div>`
    : `<div class="std-perk">L1 · upgrade for cheaper refreshes</div>`;

  // an active project takes over the panel (one project at a time)
  const proj = st.studioProject;
  if(proj){
    const prog = proj.totalQuarters ? Math.round((1-proj.quartersLeft/proj.totalQuarters)*100) : 0;
    return perk + `<div class="std-project">
      <div class="std-formhead">In development</div>
      <div class="std-projname">${proj.nameplate}</div>
      <div class="std-projsub">${proj.segName} · ${proj.isRedesign?'redesign':'new model'}</div>
      <div class="std-projbar"><i style="width:${prog}%"></i></div>
      <div class="std-projq">${proj.quartersLeft} quarter${proj.quartersLeft===1?'':'s'} left — completes on Advance</div>
    </div>`;
  }

  if(studioSel){
    const s = SEGS.find(sg=>sg.id===studioSel.segId);
    const validEngs = Object.entries(ENGINES).filter(([id,e])=>e.fits.includes(s.id)&&st.year>=e.unlock);
    if(!validEngs.find(([id])=>id===studioSel.engId)) studioSel.engId = validEngs[0][0];
    const q = quoteDesign(st, s.id, studioSel.engId, studioSel.trimId);
    const canAfford = player.cash >= q.total;
    const existing = player.models.find(m=>m.segId===s.id&&m.active);
    return perk + `<div class="std-form">
      <div class="std-formhead">${existing?'Redesign':'Design'} · ${s.name}</div>
      <div class="std-lbl">Engine</div>
      <div class="std-opts">
        ${validEngs.map(([id,e])=>`<button class="std-opt${studioSel.engId===id?' sel':''}"
          onclick="studioSetDesign('${id}','${studioSel.trimId}')">${e.name}<span>${engHP(e)}hp</span></button>`).join('')}
      </div>
      <div class="std-lbl">Trim</div>
      <div class="std-opts">
        ${Object.entries(TRIMS).map(([id,t])=>`<button class="std-opt${studioSel.trimId===id?' sel':''}"
          onclick="studioSetDesign('${studioSel.engId}','${id}')">${t.name}</button>`).join('')}
      </div>
      <div class="std-cost">$${q.total}M${q.launchCost>0?` · incl. $${q.launchCost}M tooling`:''}</div>
      <button class="btn primary" style="width:100%" ${canAfford?'':'disabled'}
        onclick="studioConfirm()">${existing?'Redesign':'Develop'} ${s.name} ▸</button>
      <button class="btn" style="width:100%;margin-top:5px" onclick="studioBackToSegs()">← Back to models</button>
    </div>`;
  }

  const rows = SEGS.map(s=>{
    const m = player.models.find(mm=>mm.segId===s.id&&mm.active);
    if(m){
      const refreshCost = refreshCostFor(s);
      return `<div class="std-row">
        <div class="std-rowhead"><b>${m.nameplate||s.name}</b> <span class="wk">${ENGINES[m.engId].name} · ${TRIMS[m.trimId].name}</span></div>
        <div class="std-rowbtns">
          <button class="btn" onclick="doRefresh('${s.id}')" ${player.cash<refreshCost?'disabled':''}>Refresh $${refreshCost}M</button>
          <button class="btn" onclick="studioPickSeg('${s.id}')">Redesign</button>
        </div>
      </div>`;
    }
    const tool = !(player.launchedSegs&&player.launchedSegs[s.id]) ? `+$${C.segmentLaunchCost}M` : 're-entry';
    return `<div class="std-row std-empty">
      <div class="std-rowhead">${s.name} <span class="wk">empty · ${tool}</span></div>
      <button class="btn" onclick="studioPickSeg('${s.id}')">Design ▸</button>
    </div>`;
  }).join('');
  return perk + `<div class="std-list">${rows}</div>`;
}

/* ── refresh cost (with Design Studio L2 discount) ──────────────────────── */
function refreshCostFor(s){
  const base = Math.round(C.refreshBase * s.refPrice/22);
  return studioLevel()>=2 ? Math.round(base*0.70) : base;
}
function doRefresh(segId){
  const s = SEGS.find(x=>x.id===segId);
  // charge the exact price the UI shows (incl. any Studio-L2 discount) up front —
  // one pricing path, so the affordability check matches the displayed cost.
  const cost = refreshCostFor(s);
  const result = playerRefresh(st, segId, cost);
  if(!result.ok){ toast(result.reason, 'error'); return; }
  const rm = st.companies.find(c=>c.player).models.find(m=>m.segId===segId&&m.active);
  showFloater(`${rm ? (rm.nameplate||s.name) : s.name} refreshed · novelty restored`, 'var(--green)');
  if(studioLevel()>=2){
    // L2 perk: restore novelty to 94% instead of sim's default 86%
    const m = st.companies.find(c=>c.player).models.find(m=>m.segId===segId&&m.active);
    if(m) m.novelty = 0.94;
  }
  render();
  saveGame();
}
function doRetire(segId){
  inlineConfirm('Retire this model? You will have no presence in this segment.', () => {
    playerRetire(st, segId);
    render();
    saveGame();
  }, 'Retire', true);
}
/* Prepends a player-specific dramatic opener to the Q1 and Q2 log entries.
   Runs after advance() so all share/profit data is live. Shell-only. */
function dramatizeEarlyLog(st){
  if(st.tick > 2) return;
  const p = st.companies.find(c=>c.player);
  const fm = p.models.find(m=>m.active);
  if(!fm) return;
  const seg = getSeg(fm.segId);
  const name = fm.nameplate || ENGINES[fm.engId].name;
  const segShrs = segShares(fm.segId, st);
  const myShare = segShrs['you'] ? Math.round(segShrs['you'].share*100) : 0;
  const rivals = Object.entries(segShrs).filter(([k])=>k!=='you').sort((a,b)=>b[1].share-a[1].share);
  const topRival = rivals[0];
  const entry = st.log[0];  // log uses unshift: newest is at index 0
  if(!entry) return;

  let opener;
  if(st.tick===1){
    const rvText = topRival
      ? ` <b>${st.companies.find(c=>c.id===topRival[0])?.name||'A rival'}</b> leads with ${Math.round(topRival[1].share*100)}%.`
      : '';
    opener = `<b>The ${name} is in market.</b> `
      + (myShare > 0
        ? `${myShare}% of ${seg.name} buyers chose you at $${fm.price.toFixed(1)}k.`
        : `Your ${seg.name} is live — first revenue incoming.`)
      + rvText;
  } else {
    const prev = st.history.length>=2 ? (st.history[st.history.length-2]['you']||0) : 0;
    const cur  = st.lastOverall;
    const diff = Math.round((cur-prev)*100*10)/10;
    if(diff > 0.3){
      opener = `<b>The ${name} is gaining ground</b> — share climbed ${diff.toFixed(1)} pts. Rivals are adjusting prices.`;
    } else if(diff < -0.3){
      opener = `<b>The ${name} lost ground</b> — share slipped ${Math.abs(diff).toFixed(1)} pts. Time to respond.`;
    } else {
      opener = `<b>The ${name} holds steady</b> — ${Math.round(cur*100)}% overall share. The field is watching.`;
    }
  }
  entry.html = opener + ' ' + entry.html;
}

function doAdvance(){
  try {
    snapshotMatchup();    // remember who's ahead of us so we can celebrate overtakes
    applyCampusToSim();   // input hook: campus-derived capacity feeds the sim
    // campus buildings add R&D bonuses and other effects each quarter
    const campusInputs = (typeof MarqueWorld!=='undefined')
      ? MarqueWorld.deriveCampusInputs(MarqueWorld.getCampus())
      : { rdBonuses:{eng:0,eff:0,mfg:0}, qualityCenter:{warrantyCash:0}, testTrackLevel:0 };
    const campusRD = campusInputs.rdBonuses || {};
    advance(st, { rd:{ eng: pendingRD.eng + (campusRD.eng||0),
                       eff: pendingRD.eff + (campusRD.eff||0),
                       mfg: pendingRD.mfg + (campusRD.mfg||0) },
                  factoryUpgrade:false });
    // Sandbox mode: never end on win or timeout (only bankrupt can end)
    if(st.sandbox && st.over && st.overReason !== 'bankrupt'){
      st.over = false; st.won = false; st.overReason = null;
    }
    // Quality Center warranty: partial recall cost coverage, applied post-advance
    const wc = campusInputs.qualityCenter && campusInputs.qualityCenter.warrantyCash;
    if(wc && st.lastEvents && st.lastEvents.some(e=>e.includes('Recall'))){
      const player = st.companies.find(c=>c.player);
      player.cash += wc;
      if(st.log[0]) st.log[0].html += ` <span style="color:var(--green)">Quality Center covered $${wc}M of recall costs.</span>`;
    }
    // Test Track L2 amplifies coupe halo: apply extra brand bump post-advance
    if(campusInputs.testTrackLevel >= 2 && st.lastHaloBonus > 0){
      const player = st.companies.find(c=>c.player);
      const extra = 0.005;
      player.brand = Math.min(1, player.brand + extra);
      if(st.log[0]) st.log[0].html += ` <span style="color:var(--amber)">Test Track amplified your coupe halo (+${Math.round(extra*100)} brand).</span>`;
    }
    dramatizeEarlyLog(st);
    completeStudioProject();   // tick the Studio project; a finished car rolls out if ready
    studioSel=null;
    recordValuation();   // reprice the company for real this quarter (ticker/sparkline)
    if(typeof MarqueWorld!=='undefined') MarqueWorld.setSimState(st);
    if(typeof MarqueWorld!=='undefined'){
      MarqueWorld.applyProduction(MarqueWorld.getCampus(), st.lastUnits);
      MarqueWorld.triggerBurst();
      MarqueWorld.renderPanels();
    }
    render();
    checkOvertakes();     // "You passed Velo in Sedan! ▲"
    saveGame();
  } catch(e){
    console.error('Advance error:', e);
    toast('Something went wrong advancing the quarter — try reloading.', 'error');
  }
}
function renderGoalBanner(){
  const el = document.getElementById('goalBanner');
  if(st.sandbox){
    el.innerHTML = `<span style="color:var(--dim);font-family:var(--sans);font-size:11px">SANDBOX — no victory condition · play forever</span>`;
    return;
  }
  const obj = st.objective;
  const stat = objectiveStatus(st);
  const deadline = (obj.deadlineYear - C.startYear)*4 + obj.deadlineQuarter;
  const current  = (st.year - C.startYear)*4 + st.quarter;
  const qleft = Math.max(0, deadline - current);
  const color = stat.met ? 'var(--green)' : (qleft <= 4 ? 'var(--red)' : 'var(--amber)');
  el.innerHTML =
    `Goal — <b style="color:var(--hi)">${stat.name}</b> by Q${obj.deadlineQuarter}&nbsp;${obj.deadlineYear}`
    + ` &nbsp;·&nbsp; <span style="color:${color}">${stat.detail}</span>`
    + ` &nbsp;·&nbsp; ${qleft} quarter${qleft!==1?'s':''} left`;
}

function renderEndScreen(){
  const player = st.companies.find(c=>c.player);
  const obj = st.objective;
  const reason = st.overReason;
  const cls = reason==='win'?'win':reason==='bankrupt'?'bankrupt':'timeout';
  const objName = (OBJECTIVES[obj.id]||OBJECTIVES.share).name;
  const headline = reason==='win' ? 'Goal achieved.' : reason==='bankrupt' ? 'Insolvent.' : 'Time\'s up.';
  const diffLabel = (st.difficulty && DIFFICULTY[st.difficulty]) ? ` · ${DIFFICULTY[st.difficulty].label}` : '';
  const sub = reason==='win'
    ? `You completed ${objName}${diffLabel} by Q${st.quarter} ${st.year}.`
    : reason==='bankrupt'
    ? `Cash hit zero in Q${st.quarter} ${st.year}${diffLabel}. The board wound the company down.`
    : `Deadline reached without completing ${objName}${diffLabel}.`;
  const headColor = reason==='win'?'var(--green)':reason==='bankrupt'?'var(--red)':'var(--dim)';
  const keepBtn = st.won ? `<button onclick="keepBuilding()">Keep building →</button>` : '';
  const recap = endRecap(st);
  const bestSellerNameplate = recap.bestSeller ? (() => {
    const p2 = player; const bm = p2.models.find(m=>m.nameplate && getSeg(m.segId).name===recap.bestSeller.label.split(' ').pop());
    return bm ? bm.nameplate : recap.bestSeller.label;
  })() : null;
  const bestSellerVal = recap.bestSeller
    ? `${bestSellerNameplate} <small style="color:var(--dim)">${(recap.bestSeller.units/1000).toFixed(2)}M</small>` : '—';
  return `<div class="endcard ${cls}">
    <h3 style="color:${headColor}">${headline}</h3>
    <div class="sub">${sub}</div>
    <div class="endstory">"${localizeHtml(recap.story)}"</div>
    <div class="score-val">${st.score.toLocaleString()}<small>score</small></div>
    <div class="stat-grid">
      <div><div class="sk">Final share</div><div class="sv">${(st.lastOverall*100).toFixed(1)}%</div></div>
      <div><div class="sk">Peak share</div><div class="sv">${(st.peakShare*100).toFixed(1)}%</div></div>
      <div><div class="sk">Cash</div><div class="sv">$${fmtM(player.cash)}</div></div>
      <div><div class="sk">Cars built</div><div class="sv">${(st.totalUnits/1000).toFixed(2)}M</div></div>
      <div><div class="sk">Brand</div><div class="sv">${Math.round(player.brand*100)}</div></div>
      <div><div class="sk">Best-seller</div><div class="sv" style="font-size:12px">${bestSellerVal}</div></div>
    </div>
    <div class="enddecisive"><span>Decisive factor</span> ${localizeHtml(recap.decisive)}.</div>
    <div class="end-actions">
      <button class="primary-end" onclick="startNew()">Play again</button>
      ${keepBtn}
      <button id="copyResultBtn" onclick="copyResult()">Copy result</button>
    </div>
  </div>`;
}

function keepBuilding(){ st.over = false; render(); saveGame(); }

  if(!el || !st) return;
  if(st.over){ el.style.display='none'; return; }   // never clutter the end screen
  const allDone = TUTORIAL_STEPS.every(s=>s.check());
  if(allDone){ setTimeout(dismissTutorial, 1100); return; }
  const items = TUTORIAL_STEPS.map(s=>{
    const done=s.check();
    return `<div class="tut-item${done?' tut-done':''}"><span class="tut-check">${done?'✓':'○'}</span>${s.label}</div>`;
  }).join('');
  el.style.display='block';
  el.innerHTML=`<div class="tut-head">Getting started
    <button class="tut-dismiss" onclick="dismissTutorial()" title="Dismiss">✕</button></div>${items}`;
}

/* ── end-of-run result card ─────────────────────────────────────────────── */
function buildResultText(){
  const player = st.companies.find(c=>c.player);
  const obj = OBJECTIVES[(st.objective&&st.objective.id)] || OBJECTIVES.share;
  const reason = st.overReason;
  const outcome = reason==='win'?'WIN':reason==='bankrupt'?'BANKRUPT':'TIMEOUT';
  const recap = endRecap(st);
  const peakPct = (st.peakShare*100).toFixed(1);
  const bestLabel = recap.bestSeller ? (() => {
    const bm = player.models.find(m=>m.nameplate && getSeg(m.segId).name===recap.bestSeller.label.split(' ').pop());
    return bm ? bm.nameplate : recap.bestSeller.label;
  })() : null;
  const best = bestLabel ? `${bestLabel} (${(recap.bestSeller.units/1000).toFixed(1)}M units)` : '—';
  const diffLabel = (st.difficulty && DIFFICULTY[st.difficulty])
    ? ' · '+DIFFICULTY[st.difficulty].label : '';
  const plain = h => h.replace(/<[^>]+>/g,'');
  return [
    `MARQUE · ${player.name} · ${obj.name}${diffLabel}`,
    `${outcome} in Q${st.quarter} ${st.year} · Peak share ${peakPct}%`,
    `Best-seller: ${best}`,
    `${plain(localizeHtml(recap.decisive))}.`,
    `"${plain(localizeHtml(recap.story))}"`,
  ].join('\n');
}
function copyResult(){
  const text = buildResultText();
  const done = ()=>{ const btn=document.getElementById('copyResultBtn');
    if(btn){ btn.textContent='Copied!'; setTimeout(()=>{ btn.textContent='Copy result'; },2000); } };
  // no browser prompt: fall back to a legacy hidden-textarea copy, then a toast
  const fallback = ()=>{
    try{
      const ta=document.createElement('textarea'); ta.value=text;
      ta.style.position='fixed'; ta.style.opacity='0'; document.body.appendChild(ta);
      ta.focus(); ta.select();
      const ok=document.execCommand('copy'); document.body.removeChild(ta);
      ok ? done() : toast('Could not copy automatically — select the result text to copy it.', 'error');
    }catch(e){ toast('Could not copy automatically — select the result text to copy it.', 'error'); }
  };
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(done).catch(fallback);
  } else { fallback(); }
}

/* ── difficulty ─────────────────────────────────────────────────────────── */
let launchDiff = 'standard';
const DIFFICULTY = {
  relaxed:  { label:'Relaxed',  startCash:600, shareTarget:0.28, desc:'More cash · 28% share goal' },
  standard: { label:'Standard', startCash:450, shareTarget:0.33, desc:'Balanced · 33% share goal' },
  hard:     { label:'Hard',     startCash:380, shareTarget:0.37, desc:'Lean budget · 37% share goal' },
};
function applyDifficulty(state, diff){
  const d = DIFFICULTY[diff] || DIFFICULTY.standard;
  const player = state.companies.find(c=>c.player);
  player.cash = d.startCash;
  if(state.objective && state.objective.targetShare != null) state.objective.targetShare = d.shareTarget;
  state.difficulty = diff;
}
function setDifficulty(id){
  launchDiff = id;
  applyDifficulty(st, id);
  renderLaunchScreen();
}

function startNew(){
  studioSel=null; pendingFactory=false;
  pendingRD={eng:50,eff:30,mfg:40};
  _lastCash=0; _lastShare=0; _lastBrand=0;
  launchSel={ segId:'sedan', engId:'I4', trimId:'mid' };
  launchObjId='share';
  st=newGame();
  applyDifficulty(st, launchDiff);
  if(typeof MarqueWorld!=='undefined') MarqueWorld.resetCampus();
  resetValuation();
  applyCampusToSim();
  render();
}

/* boot — resume the saved run if there is one, otherwise start fresh */
initCampus();
if(!loadGame()) startNew();
refreshRunButtons();
startBroadcast();   // begin the continuous live ticker / valuation loop

document.getElementById('newRunBtn').onclick = () => {
  if(st && !st.over && !st.launchFlow){
    inlineConfirm('Start a new run? Your current run stays saved until you launch the new one.', startNew, 'New run');
  } else {
    startNew();
  }
};
document.getElementById('continueBtn').onclick = () => {
  if(!loadGame()) toast('No saved run found.', 'error');
};
</script>
